<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>COMUTECH · Panel Gerente</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f0f4f8;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        .card-header {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 16px;
            border-left: 4px solid #2c7a4d;
            padding-left: 16px;
            color: #2c7a4d;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }
        .stat-number { font-size: 1.8rem; font-weight: 700; color: #2c7a4d; }
        .stat-label { font-size: 0.7rem; color: #64748b; margin-top: 5px; }
        
        .tabs {
            display: flex;
            gap: 4px;
            background: #f1f5f9;
            padding: 8px 12px 0 12px;
            border-radius: 12px 12px 0 0;
            border-bottom: 1px solid #e2e8f0;
            flex-wrap: wrap;
        }
        .tab {
            padding: 10px 20px;
            background: #e2e8f0;
            border: none;
            border-radius: 10px 10px 0 0;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85rem;
            color: #475569;
        }
        .tab.active {
            background: white;
            color: #2c7a4d;
            border-top: 2px solid #2c7a4d;
        }
        .tab-content {
            background: white;
            border: 1px solid #e2e8f0;
            border-top: none;
            border-radius: 0 0 12px 12px;
            padding: 20px;
        }
        
        .sub-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 8px;
            flex-wrap: wrap;
        }
        .sub-tab {
            background: none;
            border: none;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 0.8rem;
            color: #64748b;
            border-radius: 20px;
        }
        .sub-tab.active {
            background: #e8f4e8;
            color: #2c7a4d;
            font-weight: 600;
        }
        
        .row-flex { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 16px; }
        .grupo { flex: 1; min-width: 200px; }
        label { font-size: 0.7rem; font-weight: 600; color: #475569; margin-bottom: 4px; display: block; }
        input, select, textarea {
            width: 100%;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            font-size: 0.85rem;
        }
        button {
            background: #2c7a4d;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #1e5a3a; }
        .btn-danger { background: #c2410c; }
        .btn-info { background: #0284c7; }
        .btn-sm { padding: 6px 12px; font-size: 0.7rem; }
        
        .tabla {
            width: 100%;
            border-collapse: collapse;
        }
        .tabla th, .tabla td {
            padding: 10px 8px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
            font-size: 0.85rem;
        }
        .tabla th { background: #f8fafc; color: #2c7a4d; }
        
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .badge-pendiente { background: #fff3cd; color: #856404; }
        .badge-curso { background: #cce5ff; color: #004085; }
        .badge-completada { background: #d4edda; color: #155724; }
        .badge-activo { background: #d4edda; color: #155724; }
        
        .mensaje {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2c7a4d;
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            z-index: 1000;
            animation: fadeOut 3s ease forwards;
        }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 24px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .required::after { content: " *"; color: #c2410c; }
        
        hr { margin: 16px 0; border: none; border-top: 1px solid #e2e8f0; }
    </style>
</head>
<body>
<div class="container">
    <!-- Login -->
    <div id="loginPanel" class="card">
        <div class="card-header">🏢 COMUTECH · Panel Gerente</div>
        <p style="font-size:0.8rem; margin-bottom:12px; color:#64748b;">Puedes usar email o nick para acceder</p>
        <input type="text" id="identificador" placeholder="Email o Nick">
        <input type="password" id="password" placeholder="Contraseña">
        <button id="btnLogin">Iniciar sesión</button>
        <div id="errorMsg" style="color:red; margin-top:12px;"></div>
    </div>

    <!-- Dashboard -->
    <div id="dashboardPanel" style="display: none;">
        <div class="card" style="background: linear-gradient(135deg, #1e4663 0%, #2c7a4d 100%); color: white;">
            <div style="display: flex; justify-content: space-between;">
                <div>
                    <div style="font-size: 0.8rem;">👨‍💼 Gerente</div>
                    <div style="font-size: 1.3rem; font-weight: 700;" id="nombreGerente">Cargando...</div>
                    <div style="font-size: 0.8rem;" id="emailGerente"></div>
                </div>
                <button id="btnLogout" style="background: rgba(255,255,255,0.2);">🚪 Salir</button>
            </div>
        </div>

        <div class="stats-grid" id="statsPanel"></div>

        <div class="card">
            <div class="tabs">
                <button class="tab active" data-tab="tareas">📋 TAREAS</button>
                <button class="tab" data-tab="personal">👨‍🔧 PERSONAL</button>
                <button class="tab" data-tab="gastos">💰 GASTOS</button>
            </div>
            <div class="tab-content">
                
                <!-- TAB TAREAS -->
                <div id="tabTareas">
                    <div class="sub-tabs">
                        <button class="sub-tab active" data-sub="lista">📋 Lista</button>
                        <button class="sub-tab" data-sub="crear">➕ Crear tarea</button>
                    </div>
                    
                    <div id="subLista">
                        <div style="margin-bottom: 16px;">
                            <select id="filtroEstado" style="width: auto; display: inline-block;">
                                <option value="">Todos</option>
                                <option value="PENDIENTE">Pendientes</option>
                                <option value="EN_CURSO">En curso</option>
                                <option value="COMPLETADA">Completadas</option>
                            </select>
                            <button id="btnFiltrar" class="btn-sm btn-info">🔍 Filtrar</button>
                            <button id="btnRefrescar" class="btn-sm btn-info">🔄 Refrescar</button>
                        </div>
                        <table class="tabla">
                            <thead><tr><th>ID</th><th>Tipo</th><th>Activo</th><th>Técnico</th><th>Estado</th><th>Acciones</th></tr></thead>
                            <tbody id="tareasBody"></tbody>
                        </table>
                    </div>
                    
                    <div id="subCrear" style="display: none;">
                        <div class="row-flex">
                            <div class="grupo"><label>Tipo</label>
                                <select id="tareaTipo">
                                    <option value="MANTENIMIENTO">Mantenimiento</option>
                                    <option value="URGENCIA">Urgencia</option>
                                    <option value="AVERIA">Avería</option>
                                </select>
                            </div>
                            <div class="grupo"><label>Servicio</label>
                                <select id="tareaServicio">
                                    <option value="PISCINA">PISCINA</option>
                                    <option value="JARDIN">JARDIN</option>
                                </select>
                            </div>
                            <div class="grupo"><label>Activo</label>
                                <select id="tareaActivo"></select>
                            </div>
                        </div>
                        <div class="row-flex">
                            <div class="grupo"><label>Técnico</label>
                                <select id="tareaTecnico"></select>
                            </div>
                            <div class="grupo"><label>Fecha</label>
                                <input type="date" id="tareaFecha" value="2026-05-25">
                            </div>
                        </div>
                        <div class="grupo">
                            <label>📋 Orden de trabajo</label>
                            <textarea id="tareaOrden" rows="4" placeholder="Instrucciones para el técnico..."></textarea>
                        </div>
                        <button id="btnCrearTarea" class="btn-success">✅ Crear tarea</button>
                    </div>
                </div>

                <!-- TAB PERSONAL - Con datos legales completos -->
                <div id="tabPersonal" style="display: none;">
                    <div class="sub-tabs">
                        <button class="sub-tab active" data-sub="tecnicos">👥 Técnicos</button>
                        <button class="sub-tab" data-sub="crearTecnico">➕ Nuevo técnico</button>
                    </div>
                    
                    <div id="subTecnicos">
                        <div style="overflow-x: auto;">
                            <table class="tabla">
                                <thead>
                                    <tr><th>Nombre</th><th>NIF/NIE</th><th>Email</th><th>Teléfono</th><th>Fecha alta</th><th>Estado</th><th>Acciones</th>
                                </thead>
                                <tbody id="tecnicosBody"></tbody>
                            </table>
                        </div>
                    </div>
                    
                    <div id="subCrearTecnico" style="display: none;">
                        <form id="formTecnico">
                            <div class="row-flex">
                                <div class="grupo"><label class="required">👤 Nombre completo</label><input type="text" id="nuevoNombre" placeholder="Nombre y apellidos"></div>
                                <div class="grupo"><label class="required">📧 Email</label><input type="email" id="nuevoEmail" placeholder="email@tecnico.com"></div>
                            </div>
                            <div class="row-flex">
                                <div class="grupo"><label class="required">🔐 Contraseña</label><input type="password" id="nuevoPassword" placeholder="Contraseña (mínimo 6 caracteres)"></div>
                                <div class="grupo"><label class="required">📞 Teléfono</label><input type="tel" id="nuevoTelefono" placeholder="Teléfono de contacto"></div>
                            </div>
                            <div class="row-flex">
                                <div class="grupo"><label class="required">🆔 NIF / NIE</label><input type="text" id="nuevoNif" placeholder="12345678A"></div>
                                <div class="grupo"><label class="required">📅 Fecha nacimiento</label><input type="date" id="nuevoFechaNacimiento"></div>
                            </div>
                            <div class="row-flex">
                                <div class="grupo"><label class="required">📍 Dirección</label><input type="text" id="nuevoDireccion" placeholder="Calle, número, piso, código postal, ciudad"></div>
                                <div class="grupo"><label class="required">🔢 Nº Seguridad Social</label><input type="text" id="nuevoSS" placeholder="XX/XXXXXXXXXX"></div>
                            </div>
                            <div class="row-flex">
                                <div class="grupo"><label class="required">🏦 IBAN (Cuenta bancaria)</label><input type="text" id="nuevoIban" placeholder="ES00 0000 0000 0000 0000 0000"></div>
                                <div class="grupo"><label>🏷️ Tipo contrato</label>
                                    <select id="nuevoTipoContrato">
                                        <option value="INDEFINIDO">Indefinido</option>
                                        <option value="TEMPORAL">Temporal</option>
                                        <option value="POR_OBRA">Por obra/servicio</option>
                                        <option value="FORMACION">Formación</option>
                                    </select>
                                </div>
                            </div>
                            <div class="row-flex">
                                <div class="grupo"><label>⏱️ Jornada</label>
                                    <select id="nuevoJornada">
                                        <option value="COMPLETA">Completa (40h/semana)</option>
                                        <option value="PARCIAL_50">Parcial 50%</option>
                                        <option value="PARCIAL_75">Parcial 75%</option>
                                        <option value="PARCIAL_25">Parcial 25%</option>
                                    </select>
                                </div>
                                <div class="grupo"><label>🔧 Puesto</label>
                                    <select id="nuevoPuesto">
                                        <option value="TECNICO_BASE">Técnico base</option>
                                        <option value="TECNICO_ESPECIALISTA">Técnico especialista</option>
                                        <option value="SUPERVISOR">Supervisor</option>
                                        <option value="APRENDIZ">Aprendiz</option>
                                    </select>
                                </div>
                            </div>
                            <div class="row-flex">
                                <div class="grupo"><label>📅 Fecha de alta (contrato)</label><input type="date" id="nuevoFechaAlta" value="2026-05-24"></div>
                                <div class="grupo"><label>👤 Nick (alias)</label><input type="text" id="nuevoNick" placeholder="Usuario para login"></div>
                            </div>
                            <hr>
                            <p style="font-size:0.7rem; color:#64748b; margin-bottom:16px;">* Campos obligatorios para el contrato laboral</p>
                            <button id="btnCrearTecnico" class="btn-success">✅ Dar de alta técnico</button>
                        </form>
                    </div>
                </div>

                <!-- TAB GASTOS -->
                <div id="tabGastos" style="display: none;">
                    <div class="sub-tabs">
                        <button class="sub-tab active" data-sub="pendientes">⏳ Pendientes</button>
                        <button class="sub-tab" data-sub="aprobados">✅ Aprobados</button>
                    </div>
                    
                    <div id="subPendientes">
                        <table class="tabla">
                            <thead><tr><th>Fecha</th><th>Tarea</th><th>Concepto</th><th>Importe</th><th>Acciones</th></tr></thead>
                            <tbody id="gastosPendientesBody"></tbody>
                        </table>
                    </div>
                    
                    <div id="subAprobados" style="display: none;">
                        <table class="tabla">
                            <thead><tr><th>Fecha</th><th>Tarea</th><th>Concepto</th><th>Importe</th><th>Estado</th></tr></thead>
                            <tbody id="gastosAprobadosBody"></tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://idbdkxhhqeuarcqcaweo.supabase.co";
    const SUPABASE_KEY = "sb_publishable_uNWQl8gDfrmrPWS_1uEVcg_gMeqjO2U";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;
    let currentEmpresaId = null;

    function mostrarMensaje(texto, tipo = 'exito') {
        const msg = document.createElement('div');
        msg.className = 'mensaje';
        msg.style.background = tipo === 'exito' ? '#2c7a4d' : '#c2410c';
        msg.innerHTML = texto;
        document.body.appendChild(msg);
        setTimeout(() => msg.remove(), 3000);
    }

    // ========== LOGIN con email o nick ==========
    async function hacerLogin() {
        const identificador = document.getElementById('identificador').value.trim();
        const password = document.getElementById('password').value;
        if (!identificador || !password) { document.getElementById('errorMsg').innerText = "Introduce email/nick y contraseña"; return false; }
        
        // Determinar si es email o nick
        let email = identificador;
        if (!identificador.includes('@')) {
            // Es nick, buscar el email correspondiente
            const { data: perfil } = await sb.from('perfiles').select('email').eq('nick', identificador).maybeSingle();
            if (!perfil) {
                document.getElementById('errorMsg').innerText = "Usuario no encontrado";
                return false;
            }
            email = perfil.email;
        }
        
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) { document.getElementById('errorMsg').innerText = error.message; return false; }
        
        const { data: perfil } = await sb.from('perfiles').select('*, empresas!inner(*)').eq('id', data.user.id).maybeSingle();
        if (!perfil || perfil.rol !== 'gerente') { 
            await sb.auth.signOut(); 
            document.getElementById('errorMsg').innerText = "Acceso no autorizado. Solo gerentes."; 
            return false; 
        }
        
        currentUser = data.user;
        currentEmpresaId = perfil.empresa_id;
        document.getElementById('nombreGerente').innerHTML = perfil.nombre || 'Gerente';
        document.getElementById('emailGerente').innerHTML = currentUser.email;
        return true;
    }

    // ========== CARGAR STATS ==========
    async function cargarStats() {
        const { data: tareas } = await sb.from('tareas').select('*').eq('cliente_id', currentEmpresaId);
        const { data: tecnicos } = await sb.from('perfiles').select('*').eq('empresa_id', currentEmpresaId).eq('rol', 'tecnico');
        document.getElementById('statsPanel').innerHTML = `
            <div class="stat-card"><div class="stat-number">${tareas?.length || 0}</div><div class="stat-label">Total Tareas</div></div>
            <div class="stat-card"><div class="stat-number">${tareas?.filter(t => t.estado === 'PENDIENTE').length || 0}</div><div class="stat-label">Pendientes</div></div>
            <div class="stat-card"><div class="stat-number">${tecnicos?.length || 0}</div><div class="stat-label">Técnicos</div></div>
        `;
    }

    // ========== CARGAR TAREAS ==========
    async function cargarTareas() {
        const estado = document.getElementById('filtroEstado')?.value || '';
        let query = sb.from('tareas').select('*, activos(nombre), perfiles!tecnico_id(nombre)').eq('cliente_id', currentEmpresaId).order('created_at', { ascending: false });
        if (estado) query = query.eq('estado', estado);
        const { data, error } = await query;
        if (error) { console.error(error); return; }
        
        const tbody = document.getElementById('tareasBody');
        if (!data || data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6">No hay tareas</td></tr>';
            return;
        }
        
        const estadoClass = { 'PENDIENTE': 'badge-pendiente', 'EN_CURSO': 'badge-curso', 'COMPLETADA': 'badge-completada' };
        tbody.innerHTML = data.map(t => `
            <tr>
                <td>${t.id.substring(0, 12)}...</td>
                <td>${t.tipo}</td>
                <td>${t.activos?.nombre || '-'}</td>
                <td>${t.perfiles?.nombre || '-'}</td>
                <td><span class="badge ${estadoClass[t.estado]}">${t.estado}</span></td>
                <td><button class="btn-sm btn-info ver-tarea" data-id="${t.id}">👁️ Ver</button></td>
            </tr>
        `).join('');
        
        document.querySelectorAll('.ver-tarea').forEach(btn => {
            btn.onclick = () => verDetalleTarea(btn.dataset.id);
        });
    }

    async function verDetalleTarea(id) {
        const { data: tarea } = await sb.from('tareas').select('*, activos(*)').eq('id', id).single();
        if (!tarea) return;
        alert(`📋 TAREA\nID: ${tarea.id}\nTipo: ${tarea.tipo}\nActivo: ${tarea.activos?.nombre}\nEstado: ${tarea.estado}\n\n📝 Orden:\n${tarea.orden_trabajo?.substring(0, 200)}...`);
    }

    // ========== CREAR TAREA ==========
    async function crearTarea() {
        const tipo = document.getElementById('tareaTipo').value;
        const servicio = document.getElementById('tareaServicio').value;
        const activoId = document.getElementById('tareaActivo').value;
        const tecnicoId = document.getElementById('tareaTecnico').value;
        const fecha = document.getElementById('tareaFecha').value;
        const orden = document.getElementById('tareaOrden').value;
        
        if (!activoId) { mostrarMensaje("Selecciona un activo", 'error'); return; }
        if (!tecnicoId) { mostrarMensaje("Selecciona un técnico", 'error'); return; }
        
        const prioridad = tipo === 'URGENCIA' ? 1 : tipo === 'AVERIA' ? 2 : 3;
        const tareaId = `COMUTECH${Date.now()}${Math.floor(Math.random() * 1000)}`;
        
        const { error } = await sb.from('tareas').insert({
            id: tareaId,
            tipo: tipo,
            prioridad: prioridad,
            cliente_id: currentEmpresaId,
            tecnico_id: tecnicoId,
            activo_id: activoId,
            servicio_tipo: servicio,
            descripcion: `Tarea de ${tipo}`,
            orden_trabajo: orden,
            fecha_asignacion: fecha,
            estado: 'PENDIENTE',
            creada_por: currentUser.id
        });
        
        if (error) { mostrarMensaje("Error: " + error.message, 'error'); return; }
        mostrarMensaje("✅ Tarea creada correctamente");
        document.getElementById('tareaOrden').value = '';
        cargarTareas();
        cargarStats();
    }

    // ========== CARGAR ACTIVOS ==========
    async function cargarActivos() {
        const { data } = await sb.from('activos').select('*').eq('empresa_id', currentEmpresaId).order('nombre');
        const select = document.getElementById('tareaActivo');
        if (select && data) {
            select.innerHTML = '<option value="">-- Seleccionar --</option>' + data.map(a => `<option value="${a.id}">${a.nombre}</option>`).join('');
        }
    }

    // ========== CARGAR TÉCNICOS (con datos completos) ==========
    async function cargarTecnicos() {
        const { data } = await sb.from('perfiles').select('*').eq('empresa_id', currentEmpresaId).eq('rol', 'tecnico');
        const select = document.getElementById('tareaTecnico');
        if (select && data) {
            select.innerHTML = '<option value="">-- Seleccionar --</option>' + data.map(t => `<option value="${t.id}">${t.nombre || t.nick}</option>`).join('');
        }
        
        const tbody = document.getElementById('tecnicosBody');
        if (tbody) {
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7">No hay técnicos</td></tr>';
                return;
            }
            tbody.innerHTML = data.map(t => `
                <tr>
                    <td>${t.nombre || t.nick}</td>
                    <td>${t.nif || '-'}</td>
                    <td>${t.email}</td>
                    <td>${t.telefono || '-'}</td>
                    <td>${t.fecha_alta || '-'}</td>
                    <td><span class="badge ${t.activo ? 'badge-activo' : 'badge-pendiente'}">${t.activo ? 'Activo' : 'Inactivo'}</span></td>
                    <td><button class="btn-sm btn-danger eliminar-tecnico" data-id="${t.id}" data-nombre="${t.nombre}">🗑️</button></td>
                </tr>
            `).join('');
        }
        
        document.querySelectorAll('.eliminar-tecnico').forEach(btn => {
            btn.onclick = async () => {
                if (confirm(`¿Eliminar técnico "${btn.dataset.nombre}"? Esta acción eliminará todos sus datos.`)) {
                    await sb.from('perfiles').delete().eq('id', btn.dataset.id);
                    mostrarMensaje("✅ Técnico eliminado");
                    cargarTecnicos();
                }
            };
        });
    }

    // ========== CREAR TÉCNICO (con todos los datos legales) ==========
    async function crearTecnico() {
        const nombre = document.getElementById('nuevoNombre').value.trim();
        const email = document.getElementById('nuevoEmail').value.trim();
        const password = document.getElementById('nuevoPassword').value;
        const telefono = document.getElementById('nuevoTelefono').value.trim();
        const nif = document.getElementById('nuevoNif').value.trim();
        const fechaNacimiento = document.getElementById('nuevoFechaNacimiento').value;
        const direccion = document.getElementById('nuevoDireccion').value.trim();
        const numSS = document.getElementById('nuevoSS').value.trim();
        const iban = document.getElementById('nuevoIban').value.trim();
        const tipoContrato = document.getElementById('nuevoTipoContrato').value;
        const jornada = document.getElementById('nuevoJornada').value;
        const puesto = document.getElementById('nuevoPuesto').value;
        const fechaAlta = document.getElementById('nuevoFechaAlta').value;
        const nick = document.getElementById('nuevoNick').value.trim() || nombre.split(' ')[0].toLowerCase();
        
        // Validaciones obligatorias
        if (!nombre) { mostrarMensaje("❌ Nombre completo obligatorio", 'error'); return; }
        if (!email) { mostrarMensaje("❌ Email obligatorio", 'error'); return; }
        if (!password || password.length < 6) { mostrarMensaje("❌ Contraseña (mínimo 6 caracteres)", 'error'); return; }
        if (!nif) { mostrarMensaje("❌ NIF/NIE obligatorio", 'error'); return; }
        if (!fechaNacimiento) { mostrarMensaje("❌ Fecha de nacimiento obligatoria", 'error'); return; }
        if (!direccion) { mostrarMensaje("❌ Dirección obligatoria", 'error'); return; }
        if (!numSS) { mostrarMensaje("❌ Nº Seguridad Social obligatorio", 'error'); return; }
        if (!iban) { mostrarMensaje("❌ IBAN (cuenta bancaria) obligatorio", 'error'); return; }
        
        const btn = document.getElementById('btnCrearTecnico');
        btn.innerHTML = '<span class="spinner"></span> Creando...';
        btn.disabled = true;
        
        try {
            // Crear usuario en Auth
            const { data: authUser, error: authError } = await sb.auth.admin.createUser({
                email: email,
                password: password,
                email_confirm: true,
                user_metadata: { nombre: nombre, empresa_id: currentEmpresaId, nick: nick }
            });
            
            if (authError) throw authError;
            
            // Crear perfil del técnico con todos los datos legales
            const { error: perfilError } = await sb.from('perfiles').insert({
                id: authUser.user.id,
                nombre: nombre,
                nick: nick,
                email: email,
                telefono: telefono || null,
                nif: nif,
                direccion: direccion,
                fecha_nacimiento: fechaNacimiento,
                num_seguridad_social: numSS,
                iban: iban,
                fecha_alta: fechaAlta || new Date().toISOString().split('T')[0],
                tipo_contrato: tipoContrato,
                jornada: jornada,
                puesto: puesto,
                rol: 'tecnico',
                empresa_id: currentEmpresaId,
                activo: true
            });
            
            if (perfilError) throw perfilError;
            
            mostrarMensaje(`✅ Técnico ${nombre} dado de alta correctamente`);
            
            // Limpiar formulario
            document.getElementById('nuevoNombre').value = '';
            document.getElementById('nuevoEmail').value = '';
            document.getElementById('nuevoPassword').value = '';
            document.getElementById('nuevoTelefono').value = '';
            document.getElementById('nuevoNif').value = '';
            document.getElementById('nuevoFechaNacimiento').value = '';
            document.getElementById('nuevoDireccion').value = '';
            document.getElementById('nuevoSS').value = '';
            document.getElementById('nuevoIban').value = '';
            document.getElementById('nuevoNick').value = '';
            
            cargarTecnicos();
            cargarStats();
            
        } catch (error) {
            mostrarMensaje(`❌ Error: ${error.message}`, 'error');
        } finally {
            btn.innerHTML = '✅ Dar de alta técnico';
            btn.disabled = false;
        }
    }

    // ========== CARGAR GASTOS ==========
    async function cargarGastos() {
        const { data: pendientes } = await sb.from('gastos_tarea').select('*, tareas!inner(cliente_id, activos(nombre))').eq('tareas.cliente_id', currentEmpresaId).eq('estado', 'PENDIENTE');
        const tbodyP = document.getElementById('gastosPendientesBody');
        if (tbodyP) {
            tbodyP.innerHTML = pendientes?.map(g => `
                <tr>
                    <td>${g.fecha_gasto}</td>
                    <td>${g.tareas?.activos?.nombre || '-'}</td>
                    <td>${g.descripcion}</td>
                    <td>${g.importe_total}€</td>
                    <td><button class="btn-sm btn-info aprobar-gasto" data-id="${g.id}">✅ Aprobar</button></td>
                </tr>
            `).join('') || '<tr><td colspan="5">No hay gastos pendientes</tr>'；
        }
        
        const { data: aprobados } = await sb.from('gastos_tarea').select('*, tareas!inner(cliente_id, activos(nombre))').eq('tareas.cliente_id', currentEmpresaId).in('estado', ['APROBADO', 'RECHAZADO']);
        const tbodyA = document.getElementById('gastosAprobadosBody');
        if (tbodyA) {
            tbodyA.innerHTML = aprobados?.map(g => `
                <tr>
                    <td>${g.fecha_gasto}</td>
                    <td>${g.tareas?.activos?.nombre || '-'}</td>
                    <td>${g.descripcion}</td>
                    <td>${g.importe_total}€</td>
                    <td><span class="badge ${g.estado === 'APROBADO' ? 'badge-completada' : 'badge-pendiente'}">${g.estado}</span></td>
                </tr>
            `).join('') || '<tr><td colspan="5">No hay gastos procesados</tr>'；
        }
        
        document.querySelectorAll('.aprobar-gasto').forEach(btn => {
            btn.onclick = async () => {
                await sb.from('gastos_tarea').update({ estado: 'APROBADO' }).eq('id', btn.dataset.id);
                mostrarMensaje("✅ Gasto aprobado");
                cargarGastos();
            };
        });
    }

    // ========== INICIALIZAR TABS ==========
    function inicializarTabs() {
        document.querySelectorAll('.tab').forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const tabId = tab.dataset.tab;
                document.querySelectorAll('[id^="tab"]').forEach(t => t.style.display = 'none');
                document.getElementById(`tab${tabId.charAt(0).toUpperCase() + tabId.slice(1)}`).style.display = 'block';
                if (tabId === 'tareas') { cargarTareas(); cargarActivos(); cargarTecnicos(); }
                if (tabId === 'personal') cargarTecnicos();
                if (tabId === 'gastos') cargarGastos();
            };
        });
        
        document.querySelectorAll('.sub-tab').forEach(sub => {
            sub.onclick = () => {
                const parent = sub.closest('.tab-content');
                parent.querySelectorAll('.sub-tab').forEach(s => s.classList.remove('active'));
                sub.classList.add('active');
                const subId = sub.dataset.sub;
                parent.querySelectorAll('[id^="sub"]').forEach(s => s.style.display = 'none');
                parent.querySelector(`#sub${subId.charAt(0).toUpperCase() + subId.slice(1)}`).style.display = 'block';
                if (subId === 'crear') { cargarActivos(); cargarTecnicos(); }
            };
        });
    }

    // ========== EVENTOS ==========
    document.getElementById('btnLogin').onclick = async () => {
        if (await hacerLogin()) {
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('dashboardPanel').style.display = 'block';
            inicializarTabs();
            await cargarStats();
            await cargarTareas();
            await cargarActivos();
            await cargarTecnicos();
            await cargarGastos();
        }
    };
    
    document.getElementById('btnLogout').onclick = async () => { await sb.auth.signOut(); location.reload(); };
    document.getElementById('btnFiltrar').onclick = cargarTareas;
    document.getElementById('btnRefrescar').onclick = () => { cargarTareas(); cargarStats(); };
    document.getElementById('btnCrearTarea').onclick = crearTarea;
    document.getElementById('btnCrearTecnico').onclick = crearTecnico;
</script>
</body>
</html>
