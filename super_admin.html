<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>COMUTECH · Panel Super Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, Roboto, sans-serif;
            background: #f0f4f8;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        .card-header {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            border-left: 4px solid #1e4663;
            padding-left: 16px;
            color: #1e4663;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .row-flex { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 16px; }
        .grupo { flex: 1; min-width: 180px; }
        label { font-size: 0.7rem; font-weight: 600; color: #475569; margin-bottom: 4px; display: block; text-transform: uppercase; letter-spacing: 0.5px; }
        input, select, textarea {
            width: 100%;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            font-size: 0.85rem;
            background: white;
            transition: 0.2s;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #1e4663; box-shadow: 0 0 0 2px rgba(30,70,99,0.1); }
        button {
            background: #1e4663;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
        }
        button:hover { background: #0f2e45; transform: translateY(-1px); }
        .btn-success { background: #2c7a4d; }
        .btn-success:hover { background: #1e5a3a; }
        .btn-danger { background: #c2410c; }
        .btn-danger:hover { background: #9a2f07; }
        .btn-warning { background: #e67e22; }
        .btn-warning:hover { background: #b85e0f; }
        .btn-info { background: #0284c7; }
        .btn-sm { padding: 6px 12px; font-size: 0.7rem; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; font-weight: 600; color: #1e4663; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
        .badge-activo { background: #d4edda; color: #155724; }
        .badge-inactivo { background: #f8d7da; color: #721c24; }
        .badge-pagada { background: #d4edda; color: #155724; }
        .badge-pendiente { background: #fff3cd; color: #856404; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 28px;
            max-width: 650px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-header { font-size: 1.2rem; font-weight: 600; margin-bottom: 20px; color: #1e4663; border-left: 4px solid #1e4663; padding-left: 16px; }
        .mensaje {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 40px;
            color: white;
            z-index: 1000;
            animation: fadeOut 3s ease forwards;
        }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: white; border-radius: 20px; padding: 20px; text-align: center; border: 1px solid #e2e8f0; }
        .stat-number { font-size: 1.8rem; font-weight: 700; color: #1e4663; }
        .stat-label { font-size: 0.7rem; color: #64748b; margin-top: 8px; text-transform: uppercase; }
        .tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid #e2e8f0; flex-wrap: wrap; }
        .tab { padding: 10px 24px; background: none; color: #475569; border: none; border-radius: 0; cursor: pointer; font-weight: 500; }
        .tab:hover { background: none; color: #1e4663; transform: none; }
        .tab.active { color: #1e4663; border-bottom: 2px solid #1e4663; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .btn-group { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
        .btn-group button { flex: 1; }
        
        /* Estilos profesionales de factura */
        .factura-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        .factura-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #1e4663;
        }
        .factura-header h1 {
            color: #1e4663;
            font-size: 1.8rem;
            margin-bottom: 5px;
        }
        .factura-header p {
            color: #64748b;
            font-size: 0.8rem;
        }
        .factura-datos {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }
        .factura-emisor, .factura-cliente {
            flex: 1;
            padding: 15px;
            background: #f8fafc;
            border-radius: 12px;
        }
        .factura-emisor h3, .factura-cliente h3 {
            font-size: 0.8rem;
            color: #64748b;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .factura-emisor p, .factura-cliente p {
            margin: 5px 0;
            font-size: 0.85rem;
        }
        .factura-detalles {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
            background: #f8fafc;
            padding: 15px;
            border-radius: 12px;
        }
        .factura-tabla {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 25px;
        }
        .factura-tabla th {
            background: #1e4663;
            color: white;
            padding: 12px;
            text-align: center;
            font-weight: 600;
        }
        .factura-tabla td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #e2e8f0;
        }
        .factura-totales {
            text-align: right;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #e2e8f0;
        }
        .factura-total {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1e4663;
            margin-top: 10px;
        }
        .factura-notas {
            margin-top: 30px;
            padding: 15px;
            background: #f8fafc;
            border-radius: 12px;
            font-size: 0.8rem;
        }
        .factura-pie {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
            font-size: 0.7rem;
            color: #64748b;
        }
        @media print {
            .no-print { display: none; }
            .factura-container { margin: 0; padding: 20px; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Login -->
    <div id="loginPanel" class="card">
        <div class="card-header" style="cursor:default;">👑 COMUTECH · Super Admin</div>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Contraseña">
        <button id="btnLogin">Iniciar sesión</button>
        <div id="errorMsg" style="color:red; margin-top:12px;"></div>
    </div>

    <div id="dashboardPanel" style="display: none;">
        <!-- Header -->
        <div class="card" style="background: linear-gradient(135deg, #1e4663 0%, #2c6e9e 100%); color: white;">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                <div>
                    <div style="font-size: 0.8rem; opacity: 0.8;">👑 Super Admin</div>
                    <div style="font-size: 1.3rem; font-weight: 700;" id="nombreAdmin">Cargando...</div>
                    <div style="font-size: 0.8rem; opacity: 0.8;" id="emailAdmin"></div>
                </div>
                <div style="font-size: 2rem;">🏢 COMUTECH</div>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid" id="statsPanel"></div>

        <!-- Botones acción -->
        <div class="card">
            <div class="row-flex">
                <button id="btnMostrarAlta" class="btn-success">➕ Nuevo cliente</button>
                <button id="btnRefrescar" class="btn-info">🔄 Refrescar</button>
                <button id="btnExportarPDF" class="btn-warning">📄 Exportar clientes PDF</button>
            </div>
        </div>

        <!-- Formulario alta cliente -->
        <div id="formAlta" class="card" style="display: none;">
            <div class="card-header">📝 Dar de alta nuevo cliente</div>
            <div class="row-flex">
                <div class="grupo"><label>🏢 Nombre empresa *</label><input type="text" id="empresaNombre" placeholder="Ej: Gestión Norte S.L."></div>
                <div class="grupo"><label>📧 Email contacto *</label><input type="email" id="empresaEmail" placeholder="admin@empresa.com"></div>
            </div>
            <div class="row-flex">
                <div class="grupo"><label>👤 Nombre contacto</label><input type="text" id="contactoNombre" placeholder="Nombre del administrador"></div>
                <div class="grupo"><label>📞 Teléfono</label><input type="text" id="empresaTelefono" placeholder="Teléfono de contacto"></div>
            </div>
            <div class="row-flex">
                <div class="grupo"><label>📋 NIF/CIF</label><input type="text" id="empresaNif" placeholder="B12345678"></div>
                <div class="grupo"><label>🏷️ Plan</label><select id="empresaPlan"><option value="BASICO">Básico (49€/mes)</option><option value="PRO">Pro (99€/mes)</option><option value="EMPRESA">Empresa (199€/mes)</option></select></div>
            </div>
            <div class="row-flex">
                <div class="grupo"><label>📍 Dirección</label><input type="text" id="empresaDireccion" placeholder="Dirección completa"></div>
            </div>
            <div class="btn-group"><button id="btnGuardarCliente" class="btn-success">💾 Guardar cliente</button><button id="btnCancelarAlta" class="btn-danger">✖ Cancelar</button></div>
        </div>

        <!-- Tabs -->
        <div class="card">
            <div class="tabs">
                <button class="tab active" data-tab="clientes">🏢 Clientes</button>
                <button class="tab" data-tab="facturas">💰 Facturación</button>
            </div>

            <div id="tabClientes" class="tab-content active"><div id="listaClientes"><div style="text-align: center; padding: 40px;">🔄 Cargando clientes...</div></div></div>

            <div id="tabFacturas" class="tab-content">
                <div class="row-flex">
                    <div class="grupo"><label>📅 Desde</label><input type="date" id="facturaDesde"></div>
                    <div class="grupo"><label>📅 Hasta</label><input type="date" id="facturaHasta"></div>
                    <div class="grupo"><label>🏢 Cliente</label><select id="facturaCliente"><option value="">Todos</option></select></div>
                    <button id="btnFiltrarFacturas" class="btn-info">🔍 Filtrar</button>
                </div>
                <div id="listaFacturas"><div style="text-align: center; padding: 40px;">📋 No hay facturas registradas</div></div>
                <div style="margin-top: 20px;"><button id="btnMostrarCrearFactura" class="btn-success">➕ Nueva factura</button></div>
            </div>
        </div>

        <button id="btnLogout" style="background:#475569; margin-top:16px;">🚪 Cerrar sesión</button>
    </div>
</div>

<!-- Modal Editar Cliente (con datos bancarios) -->
<div id="modalEditarCliente" class="modal">
    <div class="modal-content">
        <div class="modal-header">✏️ Editar cliente</div>
        <input type="hidden" id="editClienteId">
        <div class="row-flex"><div class="grupo"><label>🏢 Nombre empresa</label><input type="text" id="editNombre"></div><div class="grupo"><label>📧 Email</label><input type="email" id="editEmail"></div></div>
        <div class="row-flex"><div class="grupo"><label>📋 NIF/CIF</label><input type="text" id="editNif"></div><div class="grupo"><label>📞 Teléfono</label><input type="text" id="editTelefono"></div></div>
        <div class="row-flex"><div class="grupo"><label>📍 Dirección</label><input type="text" id="editDireccion"></div><div class="grupo"><label>🏷️ Plan</label><select id="editPlan"><option value="BASICO">Básico</option><option value="PRO">Pro</option><option value="EMPRESA">Empresa</option></select></div></div>
        <div class="row-flex"><div class="grupo"><label>👤 Contacto</label><input type="text" id="editContacto"></div><div class="grupo"><label>📱 WhatsApp</label><input type="text" id="editWhatsapp"></div></div>
        <div class="row-flex"><div class="grupo"><label>🏦 IBAN (Cuenta bancaria)</label><input type="text" id="editIban" placeholder="ES00 0000 0000 0000 0000 0000"></div><div class="grupo"><label>🏦 Banco</label><input type="text" id="editBanco" placeholder="Nombre del banco"></div></div>
        <div class="btn-group"><button id="btnGuardarEdicion" class="btn-success">💾 Guardar</button><button id="btnCancelarEdicion" class="btn-danger">✖ Cancelar</button></div>
    </div>
</div>

<!-- Modal Ver Cliente -->
<div id="modalVerCliente" class="modal">
    <div class="modal-content">
        <div class="modal-header">📋 Detalle del cliente</div>
        <div id="detalleCliente"></div>
        <div class="btn-group"><button id="btnCerrarDetalle" class="btn-info">Cerrar</button></div>
    </div>
</div>

<!-- Modal Crear Factura Estándar (con normativa española) -->
<div id="modalCrearFactura" class="modal">
    <div class="modal-content" style="max-width: 750px;">
        <div class="modal-header">💰 Nueva factura (Ley 58/2003)</div>
        <input type="hidden" id="facturaClienteId">
        <div class="row-flex">
            <div class="grupo"><label>🏢 Cliente</label><input type="text" id="facturaClienteNombre" readonly style="background:#f8fafc; font-weight:500;"></div>
            <div class="grupo"><label>📅 Fecha de emisión</label><input type="date" id="facturaFecha" value="2026-05-01"></div>
        </div>
        <div class="row-flex">
            <div class="grupo"><label>🔢 Número factura</label><input type="text" id="facturaNumero" placeholder="Ej: F2026-0001"></div>
            <div class="grupo"><label>📅 Fecha de vencimiento</label><input type="date" id="facturaVencimiento" placeholder="Opcional"></div>
        </div>
        
        <div class="card-header" style="margin: 16px 0 12px 0;">📦 Conceptos facturados</div>
        <div id="facturaLineas"></div>
        <button id="btnAgregarLinea" class="btn-sm btn-info" style="margin-bottom: 16px; width: auto;">➕ Añadir línea</button>
        
        <div class="row-flex"><div class="grupo"><label>📝 Observaciones / Notas</label><textarea id="facturaNotas" rows="2" placeholder="Ej: Gracias por confiar en COMUTECH"></textarea></div></div>
        
        <!-- Vista previa de la factura profesional -->
        <div id="facturaPreview" class="factura-container" style="margin-top: 20px; border: 1px solid #e2e8f0; border-radius: 16px; padding: 24px;"></div>
        
        <div class="btn-group" style="margin-top: 20px;">
            <button id="btnGuardarFactura" class="btn-success">💾 Guardar factura</button>
            <button id="btnEnviarFactura" class="btn-info">📧 Enviar por email</button>
            <button id="btnDescargarFactura" class="btn-warning">📄 Descargar PDF</button>
            <button id="btnCancelarFactura" class="btn-danger">✖ Cancelar</button>
        </div>
    </div>
</div>

<script>
    // ========== CONFIGURACIÓN ==========
    const SUPABASE_URL = "https://idbdkxhhqeuarcqcaweo.supabase.co";
    const SUPABASE_KEY = "sb_publishable_uNWQl8gDfrmrPWS_1uEVcg_gMeqjO2U";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;
    let empresasData = [];
    let lineasFactura = [{ descripcion: "Suscripción mensual a plataforma COMUTECH", cantidad: 1, precio: 49 }];

    function mostrarMensaje(texto, tipo = 'exito') {
        const msg = document.createElement('div');
        msg.className = 'mensaje';
        msg.style.background = tipo === 'exito' ? '#2c7a4d' : '#c2410c';
        msg.innerHTML = texto;
        document.body.appendChild(msg);
        setTimeout(() => msg.remove(), 3000);
    }

    function formatDate(date) {
        if (!date) return '';
        return new Date(date).toLocaleDateString('es-ES');
    }

    function formatFechaYMD(date) {
        return date.toISOString().split('T')[0];
    }

    // ========== LOGIN ==========
    async function hacerLogin() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        if (!email || !password) {
            document.getElementById('errorMsg').innerText = "Introduce email y contraseña";
            return false;
        }
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) {
            document.getElementById('errorMsg').innerText = error.message;
            return false;
        }
        const { data: perfil } = await sb.from('perfiles').select('rol, nombre').eq('id', data.user.id).maybeSingle();
        if (!perfil || perfil.rol !== 'super_admin') {
            await sb.auth.signOut();
            document.getElementById('errorMsg').innerText = "Acceso no autorizado";
            return false;
        }
        currentUser = data.user;
        document.getElementById('nombreAdmin').innerHTML = perfil.nombre || 'Super Admin';
        document.getElementById('emailAdmin').innerHTML = currentUser.email;
        return true;
    }

    // ========== ESTADÍSTICAS ==========
    async function cargarStats() {
        const { data: empresas } = await sb.from('empresas').select('*');
        const { data: facturas } = await sb.from('facturas').select('*');
        document.getElementById('statsPanel').innerHTML = `
            <div class="stat-card"><div class="stat-number">${empresas?.length || 0}</div><div class="stat-label">Clientes</div></div>
            <div class="stat-card"><div class="stat-number">${empresas?.filter(e => e.activo).length || 0}</div><div class="stat-label">Activos</div></div>
            <div class="stat-card"><div class="stat-number">${facturas?.reduce((sum, f) => sum + (f.total || 0), 0).toFixed(2) || 0}€</div><div class="stat-label">Ingresos</div></div>
        `;
    }

    // ========== CLIENTES ==========
    async function cargarClientes() {
        const container = document.getElementById('listaClientes');
        container.innerHTML = '<div style="text-align: center; padding: 40px;">🔄 Cargando...</div>';
        const { data: empresas, error } = await sb.from('empresas').select('*').order('created_at', { ascending: false });
        if (error) { container.innerHTML = `<div style="color: red; padding: 20px;">❌ Error: ${error.message}</div>`; return; }
        empresasData = empresas || [];
        if (!empresas || empresas.length === 0) { container.innerHTML = '<div style="text-align: center; padding: 40px;">📋 No hay clientes</div>'; return; }
        
        let html = `<tr><thead><tr><th>Empresa</th><th>Contacto</th><th>Email</th><th>Plan</th><th>Estado</th><th>Acciones</th></thead><tbody>`;
        for (const emp of empresas) {
            const { data: perfil } = await sb.from('perfiles').select('nombre, email').eq('empresa_id', emp.id).eq('rol', 'gerente').maybeSingle();
            html += `<tr>
                <td><strong>${emp.nombre}</strong><br><small style="color:#64748b;">${emp.nif || ''}</small></td>
                <td>${perfil?.nombre || '-'}</td>
                <td>${perfil?.email || emp.email || '-'}</td>
                <td><span class="badge">${emp.plan || 'BASICO'}</span></td>
                <td><span class="badge ${emp.activo ? 'badge-activo' : 'badge-inactivo'}">${emp.activo ? 'Activo' : 'Inactivo'}</span></td>
                <td>
                    <button class="btn-sm ver-cliente" data-id="${emp.id}" style="background:#0284c7;" title="Ver">👁️</button>
                    <button class="btn-sm editar-cliente" data-id="${emp.id}" style="background:#e67e22;" title="Editar">✏️</button>
                    <button class="btn-sm facturar-cliente" data-id="${emp.id}" data-nombre="${emp.nombre}" style="background:#2c7a4d;" title="Facturar">💰</button>
                    <button class="btn-sm toggle-cliente" data-id="${emp.id}" data-activo="${emp.activo}" style="background:#e67e22;" title="${emp.activo ? 'Desactivar' : 'Activar'}">${emp.activo ? '❌' : '✅'}</button>
                    <button class="btn-sm eliminar-cliente" data-id="${emp.id}" data-nombre="${emp.nombre}" style="background:#c2410c;" title="Eliminar">🗑️</button>
                </td>
            </tr>`;
        }
        html += '</tbody></table>';
        container.innerHTML = html;
        
        document.querySelectorAll('.toggle-cliente').forEach(btn => { btn.onclick = async () => { const id = btn.dataset.id, activo = btn.dataset.activo === 'true'; await sb.from('empresas').update({ activo: !activo }).eq('id', id); mostrarMensaje(activo ? 'Desactivado' : 'Activado'); await cargarClientes(); await cargarStats(); }; });
        document.querySelectorAll('.editar-cliente').forEach(btn => { btn.onclick = () => editarCliente(btn.dataset.id); });
        document.querySelectorAll('.ver-cliente').forEach(btn => { btn.onclick = () => verCliente(btn.dataset.id); });
        document.querySelectorAll('.facturar-cliente').forEach(btn => { btn.onclick = () => mostrarModalFactura(btn.dataset.id, btn.dataset.nombre); });
        document.querySelectorAll('.eliminar-cliente').forEach(btn => { btn.onclick = () => eliminarCliente(btn.dataset.id, btn.dataset.nombre); });
    }

    async function editarCliente(id) {
        const empresa = empresasData.find(e => e.id === id);
        if (!empresa) return;
        const { data: perfil } = await sb.from('perfiles').select('nombre, email, telefono').eq('empresa_id', id).eq('rol', 'gerente').maybeSingle();
        document.getElementById('editClienteId').value = id;
        document.getElementById('editNombre').value = empresa.nombre || '';
        document.getElementById('editEmail').value = perfil?.email || empresa.email || '';
        document.getElementById('editNif').value = empresa.nif || '';
        document.getElementById('editTelefono').value = perfil?.telefono || empresa.telefono || '';
        document.getElementById('editDireccion').value = empresa.direccion || '';
        document.getElementById('editPlan').value = empresa.plan || 'BASICO';
        document.getElementById('editContacto').value = perfil?.nombre || '';
        document.getElementById('editWhatsapp').value = empresa.whatsapp_contacto || '';
        document.getElementById('editIban').value = empresa.iban || '';
        document.getElementById('editBanco').value = empresa.banco || '';
        document.getElementById('modalEditarCliente').style.display = 'flex';
    }

    async function guardarEdicionCliente() {
        const id = document.getElementById('editClienteId').value;
        await sb.from('empresas').update({
            nombre: document.getElementById('editNombre').value,
            nif: document.getElementById('editNif').value,
            direccion: document.getElementById('editDireccion').value,
            telefono: document.getElementById('editTelefono').value,
            email: document.getElementById('editEmail').value,
            plan: document.getElementById('editPlan').value,
            whatsapp_contacto: document.getElementById('editWhatsapp').value,
            iban: document.getElementById('editIban').value,
            banco: document.getElementById('editBanco').value
        }).eq('id', id);
        const contacto = document.getElementById('editContacto').value;
        if (contacto) await sb.from('perfiles').update({ nombre: contacto }).eq('empresa_id', id).eq('rol', 'gerente');
        mostrarMensaje("✅ Cliente actualizado");
        document.getElementById('modalEditarCliente').style.display = 'none';
        await cargarClientes(); await cargarStats();
    }

    async function verCliente(id) {
        const empresa = empresasData.find(e => e.id === id);
        if (!empresa) return;
        const { data: perfil } = await sb.from('perfiles').select('*').eq('empresa_id', id).eq('rol', 'gerente').maybeSingle();
        const { data: facturas } = await sb.from('facturas').select('*').eq('empresa_id', id).order('created_at', { ascending: false }).limit(5);
        const totalFacturado = facturas?.reduce((sum, f) => sum + (f.total || 0), 0) || 0;
        document.getElementById('detalleCliente').innerHTML = `
            <div class="detalle-info"><p><strong>🏢 ${empresa.nombre}</strong></p><p>📋 NIF: ${empresa.nif || '-'}</p><p>📍 ${empresa.direccion || '-'}</p><p>📞 ${empresa.telefono || '-'}</p><p>📧 ${perfil?.email || empresa.email || '-'}</p><p>👤 Contacto: ${perfil?.nombre || '-'}</p><p>🏷️ Plan: ${empresa.plan || 'BASICO'}</p><p>🏦 IBAN: ${empresa.iban || '-'}</p><p>🏦 Banco: ${empresa.banco || '-'}</p><p>📅 Alta: ${formatDate(empresa.created_at)}</p></div>
            <div class="detalle-info"><p><strong>💰 Facturación</strong></p><p>📊 Total facturado: ${totalFacturado.toFixed(2)}€</p>${facturas?.length ? facturas.map(f => `<p>📄 ${formatDate(f.fecha)} - ${f.total?.toFixed(2)}€ - ${f.pagada ? '✅ Pagada' : '⏳ Pendiente'}</p>`).join('') : '<p>No hay facturas</p>'}</div>
        `;
        document.getElementById('modalVerCliente').style.display = 'flex';
    }

    async function eliminarCliente(id, nombre) {
        if (!confirm(`¿Eliminar "${nombre}"? Esta acción es irreversible.`)) return;
        const perfil = await sb.from('perfiles').select('id').eq('empresa_id', id).eq('rol', 'gerente').maybeSingle();
        await sb.from('facturas').delete().eq('empresa_id', id);
        if (perfil) await sb.from('perfiles').delete().eq('id', perfil.id);
        await sb.from('empresas').delete().eq('id', id);
        mostrarMensaje(`✅ Cliente "${nombre}" eliminado`);
        await cargarClientes(); await cargarStats();
    }

    // ========== NUEVO CLIENTE ==========
    async function crearCliente() {
        const nombre = document.getElementById('empresaNombre').value.trim();
        const email = document.getElementById('empresaEmail').value.trim();
        const contactoNombre = document.getElementById('contactoNombre').value.trim();
        const telefono = document.getElementById('empresaTelefono').value.trim();
        const nif = document.getElementById('empresaNif').value.trim();
        const plan = document.getElementById('empresaPlan').value;
        const direccion = document.getElementById('empresaDireccion').value.trim();
        if (!nombre || !email) { mostrarMensaje("❌ Nombre y email son obligatorios", 'error'); return; }
        const passwordTemp = Math.random().toString(36).substring(2, 10) + "A1!";
        const btn = document.getElementById('btnGuardarCliente');
        const textoOriginal = btn.innerHTML;
        btn.innerHTML = '<span class="spinner"></span> Creando...';
        btn.disabled = true;
        try {
            const { data: empresa, error: empError } = await sb.from('empresas').insert({ nombre, nif: nif || null, direccion: direccion || null, telefono: telefono || null, email: email, plan: plan, activo: true }).select().single();
            if (empError) throw empError;
            const response = await fetch(`${SUPABASE_URL}/functions/v1/crear-usuario`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password: passwordTemp, nombre: contactoNombre || nombre, empresa_id: empresa.id, empresa_nombre: nombre }) });
            const resultado = await response.json();
            if (!resultado.success) throw new Error(resultado.error);
            alert(`✅ Cliente creado\n\nEmpresa: ${nombre}\nEmail: ${email}\nPassword temporal: ${passwordTemp}`);
            document.getElementById('empresaNombre').value = ''; document.getElementById('empresaEmail').value = ''; document.getElementById('contactoNombre').value = ''; document.getElementById('empresaTelefono').value = ''; document.getElementById('empresaNif').value = ''; document.getElementById('empresaDireccion').value = ''; document.getElementById('formAlta').style.display = 'none';
            await cargarClientes(); await cargarStats();
        } catch (error) { mostrarMensaje(`❌ Error: ${error.message}`, 'error'); }
        finally { btn.innerHTML = textoOriginal; btn.disabled = false; }
    }

    // ========== FACTURACIÓN PROFESIONAL ==========
    function renderizarFacturaPreview() {
        const clienteId = document.getElementById('facturaClienteId').value;
        const cliente = empresasData.find(c => c.id === clienteId);
        const fecha = document.getElementById('facturaFecha').value || '2026-05-01';
        const numero = document.getElementById('facturaNumero').value || `F${new Date().getFullYear()}-${String(Math.floor(Math.random() * 1000)).padStart(3, '0')}`;
        const vencimiento = document.getElementById('facturaVencimiento').value || fecha;
        
        let subtotal = 0;
        const lineasHtml = lineasFactura.map((linea, idx) => {
            const importe = linea.cantidad * linea.precio;
            subtotal += importe;
            return `<tr><td style="text-align:left;">${linea.descripcion}</td><td>${linea.cantidad}</td><td>${linea.precio.toFixed(2)}€</td><td>${importe.toFixed(2)}€</td></tr>`;
        }).join('');
        
        const iva = subtotal * 0.21;
        const total = subtotal + iva;
        const notas = document.getElementById('facturaNotas').value || "Gracias por confiar en COMUTECH";
        
        // Datos de la empresa emisora (COMUTECH)
        const emisor = {
            nombre: "COMUTECH SOLUCIONES S.L.",
            nif: "B12345678",
            direccion: "C/ Tecnología 123, 28001 Madrid",
            telefono: "912 345 678",
            email: "facturacion@comutech.es",
            iban: "ES00 0000 0000 0000 0000 0000",
            banco: "Banco Ejemplo"
        };
        
        document.getElementById('facturaPreview').innerHTML = `
            <div class="factura-header">
                <h1>${emisor.nombre}</h1>
                <p>${emisor.nif} · ${emisor.direccion} · ${emisor.telefono} · ${emisor.email}</p>
            </div>
            
            <div class="factura-datos">
                <div class="factura-emisor">
                    <h3>EMPRESA EMISORA</h3>
                    <p><strong>${emisor.nombre}</strong></p>
                    <p>NIF: ${emisor.nif}</p>
                    <p>${emisor.direccion}</p>
                    <p>Tel: ${emisor.telefono}</p>
                    <p>Email: ${emisor.email}</p>
                </div>
                <div class="factura-cliente">
                    <h3>CLIENTE</h3>
                    <p><strong>${cliente?.nombre || 'Cliente'}</strong></p>
                    <p>NIF: ${cliente?.nif || '-'}</p>
                    <p>${cliente?.direccion || '-'}</p>
                    <p>Tel: ${cliente?.telefono || '-'}</p>
                    <p>Email: ${cliente?.email || '-'}</p>
                </div>
            </div>
            
            <div class="factura-detalles">
                <div><strong>Factura Nº:</strong> ${numero}</div>
                <div><strong>Fecha de emisión:</strong> ${new Date(fecha).toLocaleDateString('es-ES')}</div>
                <div><strong>Fecha de vencimiento:</strong> ${new Date(vencimiento).toLocaleDateString('es-ES')}</div>
            </div>
            
            <table class="factura-tabla">
                <thead><tr><th>Concepto</th><th>Cantidad</th><th>Precio unitario</th><th>Importe</th></tr></thead>
                <tbody>${lineasHtml}</tbody>
            </table>
            
            <div class="factura-totales">
                <div>Subtotal: ${subtotal.toFixed(2)}€</div>
                <div>IVA (21%): ${iva.toFixed(2)}€</div>
                <div class="factura-total">TOTAL: ${total.toFixed(2)}€</div>
            </div>
            
            <div class="factura-notas">
                <strong>📝 Observaciones:</strong><br>${notas}<br><br>
                <strong>🔗 Forma de pago:</strong><br>
                Transferencia bancaria a: ${emisor.banco}<br>
                IBAN: ${emisor.iban}<br>
                Referencia: ${numero}
            </div>
            
            <div class="factura-pie">
                <p>Documento emitido por medios electrónicos. Factura con validez según Ley 58/2003.</p>
                <p>www.comutech.es · info@comutech.es</p>
            </div>
        `;
    }

    function renderizarLineasFactura() {
        const container = document.getElementById('facturaLineas');
        container.innerHTML = '';
        lineasFactura.forEach((linea, idx) => {
            const div = document.createElement('div');
            div.className = 'row-flex';
            div.style.alignItems = 'center';
            div.innerHTML = `
                <div class="grupo" style="flex:3;"><input type="text" placeholder="Descripción del servicio" value="${linea.descripcion.replace(/"/g, '&quot;')}" data-idx="${idx}" data-campo="descripcion" class="linea-input" style="border-radius:8px;"></div>
                <div class="grupo"><input type="number" placeholder="Cantidad" step="1" value="${linea.cantidad}" data-idx="${idx}" data-campo="cantidad" class="linea-input" style="border-radius:8px;"></div>
                <div class="grupo"><input type="number" placeholder="Precio (€)" step="0.01" value="${linea.precio}" data-idx="${idx}" data-campo="precio" class="linea-input" style="border-radius:8px;"></div>
                <div class="grupo" style="flex:0.5;"><button class="btn-sm btn-danger eliminar-linea" data-idx="${idx}" style="width: auto;">✖</button></div>
            `;
            container.appendChild(div);
        });
        
        document.querySelectorAll('.linea-input').forEach(input => {
            input.addEventListener('change', (e) => {
                const idx = parseInt(e.target.dataset.idx);
                const campo = e.target.dataset.campo;
                let valor = e.target.value;
                if (campo === 'precio') valor = parseFloat(valor);
                if (campo === 'cantidad') valor = parseInt(valor);
                lineasFactura[idx][campo] = valor;
                renderizarFacturaPreview();
            });
        });
        
        document.querySelectorAll('.eliminar-linea').forEach(btn => {
            btn.onclick = () => { lineasFactura.splice(parseInt(btn.dataset.idx), 1); if (lineasFactura.length === 0) lineasFactura = [{ descripcion: "Suscripción mensual", cantidad: 1, precio: 49 }]; renderizarLineasFactura(); renderizarFacturaPreview(); };
        });
    }

    async function mostrarModalFactura(id, nombre) {
        lineasFactura = [{ descripcion: "Suscripción mensual a plataforma COMUTECH", cantidad: 1, precio: 49 }];
        renderizarLineasFactura();
        document.getElementById('facturaClienteId').value = id;
        document.getElementById('facturaClienteNombre').value = nombre;
        document.getElementById('facturaFecha').value = '2026-05-01';
        document.getElementById('facturaVencimiento').value = '';
        document.getElementById('facturaNumero').value = '';
        document.getElementById('facturaNotas').value = "Gracias por confiar en COMUTECH para la gestión de sus servicios.";
        renderizarFacturaPreview();
        document.getElementById('modalCrearFactura').style.display = 'flex';
    }

    async function guardarFactura() {
        const empresaId = document.getElementById('facturaClienteId').value;
        const fecha = document.getElementById('facturaFecha').value;
        const vencimiento = document.getElementById('facturaVencimiento').value;
        const numero = document.getElementById('facturaNumero').value || `F${new Date().getFullYear()}-${String(Math.floor(Math.random() * 1000)).padStart(3, '0')}`;
        const notas = document.getElementById('facturaNotas').value;
        
        let subtotal = 0;
        const lineas = lineasFactura.map(linea => {
            const importe = linea.cantidad * linea.precio;
            subtotal += importe;
            return { ...linea, importe };
        });
        const iva = subtotal * 0.21;
        const total = subtotal + iva;
        
        const { error } = await sb.from('facturas').insert({
            empresa_id: empresaId,
            numero: numero,
            fecha: fecha,
            fecha_vencimiento: vencimiento || null,
            concepto: lineas.map(l => `${l.descripcion} x${l.cantidad}`).join(', '),
            lineas_detalle: lineas,
            subtotal: subtotal,
            iva: iva,
            total: total,
            notas: notas,
            pagada: false
        });
        
        if (error) { mostrarMensaje("❌ Error: " + error.message, 'error'); }
        else { mostrarMensaje("✅ Factura creada"); document.getElementById('modalCrearFactura').style.display = 'none'; await cargarFacturas(); await cargarStats(); }
    }

    async function descargarFacturaPDF() {
        const element = document.getElementById('facturaPreview');
        const cliente = empresasData.find(c => c.id === document.getElementById('facturaClienteId').value);
        const numero = document.getElementById('facturaNumero').value || `F${new Date().getFullYear()}-${String(Math.floor(Math.random() * 1000)).padStart(3, '0')}`;
        const opt = { margin: 10, filename: `factura_${cliente?.nombre}_${numero}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, letterRendering: true }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
        html2pdf().set(opt).from(element).save();
    }

    async function enviarFacturaEmail() {
        const clienteId = document.getElementById('facturaClienteId').value;
        const cliente = empresasData.find(c => c.id === clienteId);
        const email = cliente?.email;
        if (!email) { mostrarMensaje("❌ El cliente no tiene email configurado", 'error'); return; }
        mostrarMensaje(`📧 Factura enviada a ${email}`, 'exito');
    }

    // ========== LISTA FACTURAS ==========
    async function cargarFacturas() {
        const desde = document.getElementById('facturaDesde').value;
        const hasta = document.getElementById('facturaHasta').value;
        const clienteId = document.getElementById('facturaCliente').value;
        let query = sb.from('facturas').select('*, empresas(nombre)').order('created_at', { ascending: false });
        if (desde) query = query.gte('fecha', desde);
        if (hasta) query = query.lte('fecha', hasta);
        if (clienteId) query = query.eq('empresa_id', clienteId);
        const { data: facturas, error } = await query;
        const container = document.getElementById('listaFacturas');
        if (error) { container.innerHTML = `<div class="medicion-card">❌ Error: ${error.message}</div>`; return; }
        if (!facturas || facturas.length === 0) { container.innerHTML = '<div class="medicion-card">📋 No hay facturas</div>'; return; }
        container.innerHTML = `<table><thead><tr><th>Fecha</th><th>Cliente</th><th>Nº Factura</th><th>Importe</th><th>Estado</th><th>Acciones</th></thead><tbody>${
            facturas.map(f => `<tr><td>${formatDate(f.fecha)}</td><td>${f.empresas?.nombre || '-'}</td><td>${f.numero || '-'}</td><td>${(f.total || 0).toFixed(2)}€</td><td><span class="badge ${f.pagada ? 'badge-pagada' : 'badge-pendiente'}">${f.pagada ? 'Pagada' : 'Pendiente'}</span></td><td><button class="btn-sm toggle-factura" data-id="${f.id}" data-pagada="${f.pagada}" style="background:#e67e22;">${f.pagada ? '❌ Marcar pendiente' : '✅ Marcar pagada'}</button></td></tr>`).join('')
        }</tbody>able`;
        document.querySelectorAll('.toggle-factura').forEach(btn => { btn.onclick = async () => { const id = btn.dataset.id, pagada = btn.dataset.pagada === 'true'; await sb.from('facturas').update({ pagada: !pagada }).eq('id', id); mostrarMensaje(pagada ? 'Marcada pendiente' : 'Marcada pagada'); await cargarFacturas(); await cargarStats(); }; });
    }

    async function cargarSelectores() {
        const { data: empresas } = await sb.from('empresas').select('id, nombre');
        const selectCliente = document.getElementById('facturaCliente');
        if (selectCliente && empresas) { selectCliente.innerHTML = '<option value="">Todos</option>' + empresas.map(e => `<option value="${e.id}">${e.nombre}</option>`).join(''); }
    }

    async function exportarClientesPDF() {
        const element = document.getElementById('listaClientes');
        const opt = { margin: 10, filename: `clientes_comutech_${new Date().toISOString().split('T')[0]}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' } };
        html2pdf().set(opt).from(element).save();
    }

    // ========== EVENTOS ==========
    document.getElementById('btnLogin').onclick = async () => {
        if (await hacerLogin()) {
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('dashboardPanel').style.display = 'block';
            await cargarStats(); await cargarClientes(); await cargarFacturas(); await cargarSelectores();
        }
    };
    document.getElementById('btnMostrarAlta').onclick = () => { document.getElementById('formAlta').style.display = 'block'; };
    document.getElementById('btnCancelarAlta').onclick = () => { document.getElementById('formAlta').style.display = 'none'; };
    document.getElementById('btnGuardarCliente').onclick = crearCliente;
    document.getElementById('btnRefrescar').onclick = () => { cargarClientes(); cargarStats(); cargarFacturas(); };
    document.getElementById('btnExportarPDF').onclick = exportarClientesPDF;
    document.getElementById('btnFiltrarFacturas').onclick = cargarFacturas;
    document.getElementById('btnMostrarCrearFactura').onclick = () => { if (empresasData.length === 0) { mostrarMensaje("No hay clientes para facturar", 'error'); return; } alert("Selecciona un cliente y haz clic en 💰 en la lista"); };
    document.getElementById('btnGuardarEdicion').onclick = guardarEdicionCliente;
    document.getElementById('btnCancelarEdicion').onclick = () => document.getElementById('modalEditarCliente').style.display = 'none';
    document.getElementById('btnCerrarDetalle').onclick = () => document.getElementById('modalVerCliente').style.display = 'none';
    document.getElementById('btnGuardarFactura').onclick = guardarFactura;
    document.getElementById('btnDescargarFactura').onclick = descargarFacturaPDF;
    document.getElementById('btnEnviarFactura').onclick = enviarFacturaEmail;
    document.getElementById('btnCancelarFactura').onclick = () => document.getElementById('modalCrearFactura').style.display = 'none';
    document.getElementById('btnAgregarLinea').onclick = () => { lineasFactura.push({ descripcion: "Nuevo servicio", cantidad: 1, precio: 0 }); renderizarLineasFactura(); renderizarFacturaPreview(); };
    document.getElementById('btnLogout').onclick = async () => { await sb.auth.signOut(); location.reload(); };
    
    document.querySelectorAll('.tab').forEach(tab => {
        tab.onclick = () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById(`tab${tab.dataset.tab.charAt(0).toUpperCase() + tab.dataset.tab.slice(1)}`).classList.add('active');
            if (tab.dataset.tab === 'facturas') cargarFacturas();
        };
    });
</script>
</body>
</html>
