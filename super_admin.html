<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>COMUTECH · Panel Super Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #eef2ff;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        .card-header {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
            border-left: 4px solid #0077b6;
            padding-left: 16px;
            color: #1e4663;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .row-flex {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 16px;
        }
        .grupo {
            flex: 1;
            min-width: 180px;
        }
        label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 4px;
            display: block;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            font-size: 0.85rem;
            background: white;
        }
        textarea {
            border-radius: 16px;
            resize: vertical;
            font-family: inherit;
        }
        button {
            background: #0077b6;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: #005f8c; transform: translateY(-1px); }
        .btn-success { background: #2c7a4d; }
        .btn-danger { background: #c2410c; }
        .btn-warning { background: #e67e22; }
        .btn-info { background: #0284c7; }
        .btn-sm { padding: 6px 12px; font-size: 0.75rem; }
        .btn-edit { background: #e67e22; }
        .btn-delete { background: #c2410c; }
        .btn-view { background: #0284c7; }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        th {
            background: #f8fafc;
            font-weight: 600;
            color: #1e4663;
        }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .badge-activo { background: #d4edda; color: #155724; }
        .badge-inactivo { background: #f8d7da; color: #721c24; }
        .badge-pro { background: #cce5ff; color: #004085; }
        .badge-empresa { background: #d1ecf1; color: #0c5460; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 28px;
            max-width: 600px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-header {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #1e4663;
        }
        .mensaje {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 40px;
            color: white;
            z-index: 1000;
            animation: fadeOut 3s ease forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .oculto { display: none; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: linear-gradient(135deg, #0077b6 0%, #00a8e8 100%);
            color: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
        }
        .stat-number {
            font-size: 2rem;
            font-weight: 700;
        }
        .stat-label {
            font-size: 0.8rem;
            opacity: 0.9;
        }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 1px solid #e2e8f0;
            flex-wrap: wrap;
        }
        .tab {
            padding: 10px 20px;
            background: none;
            color: #475569;
            border-radius: 40px 40px 0 0;
            cursor: pointer;
        }
        .tab.active {
            background: #0077b6;
            color: white;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Login -->
    <div id="loginPanel" class="card">
        <div class="card-header" style="cursor:default;">👑 COMUTECH · Super Admin</div>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Contraseña">
        <button id="btnLogin">Iniciar sesión</button>
        <div id="errorMsg" style="color:red; margin-top:12px;"></div>
    </div>

    <div id="dashboardPanel" style="display: none;">
        <!-- Header -->
        <div class="card" style="background: linear-gradient(135deg, #1e4663 0%, #0077b6 100%); color: white;">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                <div>
                    <div style="font-size: 0.8rem; opacity: 0.8;">👑 Super Admin</div>
                    <div style="font-size: 1.5rem; font-weight: 700;" id="nombreAdmin">Cargando...</div>
                    <div style="font-size: 0.8rem; opacity: 0.8;" id="emailAdmin"></div>
                </div>
                <div style="font-size: 2rem;">🏢 COMUTECH</div>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid" id="statsPanel"></div>

        <!-- Botones acción -->
        <div class="card">
            <div class="row-flex">
                <button id="btnMostrarAlta" class="btn-success">➕ Nuevo cliente</button>
                <button id="btnRefrescar" class="btn-info">🔄 Refrescar</button>
                <button id="btnExportarPDF" class="btn-warning">📄 Exportar PDF</button>
            </div>
        </div>

        <!-- Tabs -->
        <div class="card">
            <div class="tabs">
                <button class="tab active" data-tab="clientes">🏢 Clientes</button>
                <button class="tab" data-tab="facturas">💰 Facturación</button>
                <button class="tab" data-tab="config">⚙️ Configuración</button>
            </div>

            <!-- Tab Clientes -->
            <div id="tabClientes" class="tab-content active">
                <div class="card-header">👥 Clientes registrados</div>
                <div id="listaClientes">
                    <div style="text-align: center; padding: 40px;">🔄 Cargando clientes...</div>
                </div>
            </div>

            <!-- Tab Facturación -->
            <div id="tabFacturas" class="tab-content">
                <div class="card-header">💰 Historial de facturación</div>
                <div class="row-flex">
                    <div class="grupo">
                        <label>📅 Desde</label>
                        <input type="date" id="facturaDesde">
                    </div>
                    <div class="grupo">
                        <label>📅 Hasta</label>
                        <input type="date" id="facturaHasta">
                    </div>
                    <div class="grupo">
                        <label>🏢 Cliente</label>
                        <select id="facturaCliente">
                            <option value="">Todos</option>
                        </select>
                    </div>
                    <button id="btnFiltrarFacturas" class="btn-info">🔍 Filtrar</button>
                </div>
                <div id="listaFacturas">
                    <div style="text-align: center; padding: 40px;">📋 No hay facturas registradas</div>
                </div>
            </div>

            <!-- Tab Configuración -->
            <div id="tabConfig" class="tab-content">
                <div class="card-header">⚙️ Configuración del sistema</div>
                <div class="row-flex">
                    <div class="grupo">
                        <label>🏷️ Planes disponibles</label>
                        <div id="planesList">
                            <div class="medicion-card">Cargando planes...</div>
                        </div>
                    </div>
                </div>
                <div class="row-flex">
                    <div class="grupo">
                        <label>📧 Configuración SMTP</label>
                        <input type="text" id="smtpServer" placeholder="Servidor SMTP">
                        <input type="text" id="smtpPuerto" placeholder="Puerto">
                        <input type="email" id="smtpEmail" placeholder="Email remitente">
                        <input type="password" id="smtpPassword" placeholder="Contraseña">
                        <button id="btnGuardarSMTP" class="btn-success">💾 Guardar configuración</button>
                    </div>
                </div>
            </div>
        </div>

        <button id="btnLogout" style="background:#475569; margin-top:16px;">🚪 Cerrar sesión</button>
    </div>
</div>

<!-- Modal Editar Cliente -->
<div id="modalEditarCliente" class="modal">
    <div class="modal-content">
        <div class="modal-header">✏️ Editar cliente</div>
        <input type="hidden" id="editClienteId">
        <div class="row-flex">
            <div class="grupo">
                <label>🏢 Nombre empresa</label>
                <input type="text" id="editNombre" placeholder="Nombre">
            </div>
            <div class="grupo">
                <label>📧 Email</label>
                <input type="email" id="editEmail" placeholder="Email">
            </div>
        </div>
        <div class="row-flex">
            <div class="grupo">
                <label>📋 NIF/CIF</label>
                <input type="text" id="editNif" placeholder="NIF/CIF">
            </div>
            <div class="grupo">
                <label>📞 Teléfono</label>
                <input type="text" id="editTelefono" placeholder="Teléfono">
            </div>
        </div>
        <div class="row-flex">
            <div class="grupo">
                <label>📍 Dirección</label>
                <input type="text" id="editDireccion" placeholder="Dirección">
            </div>
            <div class="grupo">
                <label>🏷️ Plan</label>
                <select id="editPlan">
                    <option value="BASICO">Básico (49€/mes)</option>
                    <option value="PRO">Pro (99€/mes)</option>
                    <option value="EMPRESA">Empresa (199€/mes)</option>
                </select>
            </div>
        </div>
        <div class="row-flex">
            <div class="grupo">
                <label>👤 Contacto principal</label>
                <input type="text" id="editContacto" placeholder="Nombre del contacto">
            </div>
            <div class="grupo">
                <label>📱 WhatsApp</label>
                <input type="text" id="editWhatsapp" placeholder="Número WhatsApp">
            </div>
        </div>
        <div class="row-flex">
            <div class="grupo">
                <label>🔗 Telegram ID</label>
                <input type="text" id="editTelegram" placeholder="ID de Telegram">
            </div>
            <div class="grupo">
                <label>📝 Notas</label>
                <input type="text" id="editNotas" placeholder="Notas internas">
            </div>
        </div>
        <div class="row-flex">
            <div class="grupo">
                <label>💰 Saldo pendiente (€)</label>
                <input type="number" step="0.01" id="editSaldo" placeholder="0.00">
            </div>
            <div class="grupo">
                <label>📅 Próxima facturación</label>
                <input type="date" id="editProximaFactura">
            </div>
        </div>
        <div class="row-flex">
            <button id="btnGuardarEdicion" class="btn-success">💾 Guardar cambios</button>
            <button id="btnCancelarEdicion" class="btn-danger">✖ Cancelar</button>
        </div>
    </div>
</div>

<!-- Modal Ver Detalle Cliente -->
<div id="modalVerCliente" class="modal">
    <div class="modal-content">
        <div class="modal-header">📋 Detalle del cliente</div>
        <div id="detalleCliente"></div>
        <button id="btnCerrarDetalle" class="btn-info" style="margin-top: 20px;">Cerrar</button>
    </div>
</div>

<!-- Modal Crear Factura -->
<div id="modalCrearFactura" class="modal">
    <div class="modal-content">
        <div class="modal-header">💰 Crear factura</div>
        <input type="hidden" id="facturaClienteId">
        <div class="row-flex">
            <div class="grupo">
                <label>📅 Fecha factura</label>
                <input type="date" id="facturaFecha">
            </div>
            <div class="grupo">
                <label>📅 Fecha vencimiento</label>
                <input type="date" id="facturaVencimiento">
            </div>
        </div>
        <div class="row-flex">
            <div class="grupo">
                <label>💰 Importe (€)</label>
                <input type="number" step="0.01" id="facturaImporte" placeholder="0.00">
            </div>
            <div class="grupo">
                <label>📝 Concepto</label>
                <input type="text" id="facturaConcepto" placeholder="Suscripción mensual">
            </div>
        </div>
        <div class="row-flex">
            <button id="btnGuardarFactura" class="btn-success">💾 Crear factura</button>
            <button id="btnCancelarFactura" class="btn-danger">✖ Cancelar</button>
        </div>
    </div>
</div>

<script>
    // ========== CONFIGURACIÓN ==========
    const SUPABASE_URL = "https://idbdkxhhqeuarcqcaweo.supabase.co";
    const SUPABASE_KEY = "sb_publishable_uNWQl8gDfrmrPWS_1uEVcg_gMeqjO2U";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;
    let currentUserRol = null;
    let empresasData = [];

    // ========== FUNCIONES AUXILIARES ==========
    function mostrarMensaje(texto, tipo = 'exito') {
        const msg = document.createElement('div');
        msg.className = 'mensaje';
        msg.style.background = tipo === 'exito' ? '#2c7a4d' : '#c2410c';
        msg.innerHTML = texto;
        document.body.appendChild(msg);
        setTimeout(() => msg.remove(), 3000);
    }

    function formatDate(date) {
        if (!date) return '';
        return new Date(date).toLocaleDateString('es-ES');
    }

    // ========== LOGIN ==========
    async function hacerLogin() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        
        if (!email || !password) {
            document.getElementById('errorMsg').innerText = "Introduce email y contraseña";
            return false;
        }
        
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) {
            document.getElementById('errorMsg').innerText = error.message;
            return false;
        }
        
        const { data: perfil, error: perfilError } = await sb
            .from('perfiles')
            .select('rol, nombre')
            .eq('id', data.user.id)
            .maybeSingle();
        
        if (perfilError || !perfil || perfil.rol !== 'super_admin') {
            await sb.auth.signOut();
            document.getElementById('errorMsg').innerText = "Acceso no autorizado";
            return false;
        }
        
        currentUser = data.user;
        currentUserRol = perfil.rol;
        document.getElementById('nombreAdmin').innerHTML = perfil.nombre || 'Super Admin';
        document.getElementById('emailAdmin').innerHTML = currentUser.email;
        
        return true;
    }

    // ========== CARGAR ESTADÍSTICAS ==========
    async function cargarStats() {
        const { data: empresas } = await sb.from('empresas').select('*');
        const { data: facturas } = await sb.from('facturas').select('*');
        
        const totalClientes = empresas?.length || 0;
        const clientesActivos = empresas?.filter(e => e.activo).length || 0;
        const ingresosTotales = facturas?.reduce((sum, f) => sum + (f.total || 0), 0) || 0;
        const facturasPendientes = facturas?.filter(f => !f.pagada).length || 0;
        
        document.getElementById('statsPanel').innerHTML = `
            <div class="stat-card"><div class="stat-number">${totalClientes}</div><div class="stat-label">Total Clientes</div></div>
            <div class="stat-card"><div class="stat-number">${clientesActivos}</div><div class="stat-label">Clientes Activos</div></div>
            <div class="stat-card"><div class="stat-number">${ingresosTotales.toFixed(2)}€</div><div class="stat-label">Ingresos Totales</div></div>
            <div class="stat-card"><div class="stat-number">${facturasPendientes}</div><div class="stat-label">Facturas Pendientes</div></div>
        `;
    }

    // ========== CARGAR CLIENTES ==========
    async function cargarClientes() {
        const container = document.getElementById('listaClientes');
        container.innerHTML = '<div style="text-align: center; padding: 40px;">🔄 Cargando clientes...</div>';
        
        const { data: empresas, error } = await sb
            .from('empresas')
            .select('*')
            .order('created_at', { ascending: false });
        
        if (error) {
            container.innerHTML = `<div style="color: red; padding: 20px;">❌ Error: ${error.message}</div>`;
            return;
        }
        
        empresasData = empresas || [];
        
        if (!empresas || empresas.length === 0) {
            container.innerHTML = '<div style="text-align: center; padding: 40px;">📋 No hay clientes registrados</div>';
            return;
        }
        
        let html = `<table><thead><tr>
            <th>Empresa</th><th>Contacto</th><th>Email</th><th>NIF</th><th>Plan</th><th>Saldo</th><th>Estado</th><th>Fecha alta</th><th>Acciones</th>
        </tr></thead><tbody>`;
        
        for (const emp of empresas) {
            const { data: perfil } = await sb
                .from('perfiles')
                .select('nombre, email, telefono')
                .eq('empresa_id', emp.id)
                .eq('rol', 'gerente')
                .maybeSingle();
            
            const saldo = emp.saldo_pendiente || 0;
            html += `<tr>
                <td><strong>${emp.nombre}</strong><br><small>${emp.direccion?.substring(0, 30) || ''}</small></td>
                <td>${perfil?.nombre || '-'}</td>
                <td>${perfil?.email || emp.email || '-'}</td>
                <td>${emp.nif || '-'}</td>
                <td><span class="badge ${emp.plan === 'PRO' ? 'badge-pro' : (emp.plan === 'EMPRESA' ? 'badge-empresa' : '')}">${emp.plan || 'BASICO'}</span></td>
                <td style="color: ${saldo > 0 ? '#c2410c' : '#2c7a4d'}">${saldo.toFixed(2)}€</td>
                <td><span class="badge ${emp.activo ? 'badge-activo' : 'badge-inactivo'}">${emp.activo ? 'Activo' : 'Inactivo'}</span></td>
                <td>${formatDate(emp.created_at)}</td>
                <td>
                    <button class="btn-sm btn-view ver-cliente" data-id="${emp.id}" title="Ver detalle">👁️</button>
                    <button class="btn-sm btn-edit editar-cliente" data-id="${emp.id}" title="Editar">✏️</button>
                    <button class="btn-sm btn-success facturar-cliente" data-id="${emp.id}" data-nombre="${emp.nombre}" title="Crear factura">💰</button>
                    <button class="btn-sm toggle-cliente" data-id="${emp.id}" data-activo="${emp.activo}" style="background:#e67e22;" title="${emp.activo ? 'Desactivar' : 'Activar'}">${emp.activo ? '❌' : '✅'}</button>
                </td>
            </tr>`;
        }
        
        html += '</tbody></table>';
        container.innerHTML = html;
        
        document.querySelectorAll('.toggle-cliente').forEach(btn => {
            btn.onclick = async () => {
                const id = btn.dataset.id;
                const activo = btn.dataset.activo === 'true';
                await sb.from('empresas').update({ activo: !activo }).eq('id', id);
                mostrarMensaje(activo ? '❌ Cliente desactivado' : '✅ Cliente activado');
                await cargarClientes();
                await cargarStats();
            };
        });
        
        document.querySelectorAll('.editar-cliente').forEach(btn => {
            btn.onclick = () => editarCliente(btn.dataset.id);
        });
        
        document.querySelectorAll('.ver-cliente').forEach(btn => {
            btn.onclick = () => verCliente(btn.dataset.id);
        });
        
        document.querySelectorAll('.facturar-cliente').forEach(btn => {
            btn.onclick = () => mostrarModalFactura(btn.dataset.id, btn.dataset.nombre);
        });
    }

    // ========== EDITAR CLIENTE ==========
    async function editarCliente(id) {
        const empresa = empresasData.find(e => e.id === id);
        if (!empresa) return;
        
        const { data: perfil } = await sb
            .from('perfiles')
            .select('nombre, email, telefono')
            .eq('empresa_id', id)
            .eq('rol', 'gerente')
            .maybeSingle();
        
        document.getElementById('editClienteId').value = id;
        document.getElementById('editNombre').value = empresa.nombre || '';
        document.getElementById('editEmail').value = perfil?.email || empresa.email || '';
        document.getElementById('editNif').value = empresa.nif || '';
        document.getElementById('editTelefono').value = perfil?.telefono || empresa.telefono || '';
        document.getElementById('editDireccion').value = empresa.direccion || '';
        document.getElementById('editPlan').value = empresa.plan || 'BASICO';
        document.getElementById('editContacto').value = perfil?.nombre || '';
        document.getElementById('editWhatsapp').value = empresa.whatsapp_contacto || '';
        document.getElementById('editTelegram').value = empresa.telegram_chat_id || '';
        document.getElementById('editSaldo').value = empresa.saldo_pendiente || 0;
        document.getElementById('editProximaFactura').value = empresa.proxima_factura || '';
        
        document.getElementById('modalEditarCliente').style.display = 'flex';
    }

    async function guardarEdicionCliente() {
        const id = document.getElementById('editClienteId').value;
        
        const empresaData = {
            nombre: document.getElementById('editNombre').value,
            nif: document.getElementById('editNif').value,
            direccion: document.getElementById('editDireccion').value,
            telefono: document.getElementById('editTelefono').value,
            email: document.getElementById('editEmail').value,
            plan: document.getElementById('editPlan').value,
            whatsapp_contacto: document.getElementById('editWhatsapp').value,
            telegram_chat_id: document.getElementById('editTelegram').value,
            saldo_pendiente: parseFloat(document.getElementById('editSaldo').value) || 0,
            proxima_factura: document.getElementById('editProximaFactura').value || null
        };
        
        const { error: empError } = await sb
            .from('empresas')
            .update(empresaData)
            .eq('id', id);
        
        if (empError) {
            mostrarMensaje("Error al actualizar: " + empError.message, 'error');
            return;
        }
        
        // Actualizar perfil del gerente
        const contacto = document.getElementById('editContacto').value;
        if (contacto) {
            await sb
                .from('perfiles')
                .update({ nombre: contacto, telefono: document.getElementById('editTelefono').value })
                .eq('empresa_id', id)
                .eq('rol', 'gerente');
        }
        
        mostrarMensaje("✅ Cliente actualizado correctamente");
        document.getElementById('modalEditarCliente').style.display = 'none';
        await cargarClientes();
        await cargarStats();
    }

    // ========== VER DETALLE CLIENTE ==========
    async function verCliente(id) {
        const empresa = empresasData.find(e => e.id === id);
        if (!empresa) return;
        
        const { data: perfil } = await sb
            .from('perfiles')
            .select('*')
            .eq('empresa_id', id)
            .eq('rol', 'gerente')
            .maybeSingle();
        
        const { data: facturas } = await sb
            .from('facturas')
            .select('*')
            .eq('empresa_id', id)
            .order('created_at', { ascending: false })
            .limit(5);
        
        const totalFacturado = facturas?.reduce((sum, f) => sum + (f.total || 0), 0) || 0;
        const deuda = facturas?.filter(f => !f.pagada).reduce((sum, f) => sum + (f.total || 0), 0) || 0;
        
        document.getElementById('detalleCliente').innerHTML = `
            <div class="card" style="margin-bottom: 16px;">
                <strong>🏢 ${empresa.nombre}</strong>
                <p>📋 NIF: ${empresa.nif || '-'}</p>
                <p>📍 Dirección: ${empresa.direccion || '-'}</p>
                <p>📞 Teléfono: ${empresa.telefono || '-'}</p>
                <p>📧 Email: ${perfil?.email || empresa.email || '-'}</p>
                <p>👤 Contacto: ${perfil?.nombre || '-'}</p>
                <p>📱 WhatsApp: ${empresa.whatsapp_contacto || '-'}</p>
                <p>🏷️ Plan: ${empresa.plan || 'BASICO'}</p>
                <p>💰 Saldo pendiente: ${(empresa.saldo_pendiente || 0).toFixed(2)}€</p>
                <p>📅 Alta: ${formatDate(empresa.created_at)}</p>
            </div>
            <div class="card">
                <strong>💰 Resumen financiero</strong>
                <p>📊 Total facturado: ${totalFacturado.toFixed(2)}€</p>
                <p>⚠️ Deuda pendiente: ${deuda.toFixed(2)}€</p>
            </div>
            <div class="card">
                <strong>📜 Últimas facturas</strong>
                ${facturas?.length ? facturas.map(f => `
                    <div class="medicion-card" style="margin-top: 8px;">
                        Factura #${f.numero || f.id.substring(0,8)} - ${f.total?.toFixed(2)}€ - ${f.pagada ? '✅ Pagada' : '⏳ Pendiente'}
                        <br><small>${formatDate(f.fecha)}</small>
                    </div>
                `).join('') : '<div>No hay facturas</div>'}
            </div>
        `;
        
        document.getElementById('modalVerCliente').style.display = 'flex';
    }

    // ========== FACTURACIÓN ==========
    async function cargarFacturas() {
        const desde = document.getElementById('facturaDesde').value;
        const hasta = document.getElementById('facturaHasta').value;
        const clienteId = document.getElementById('facturaCliente').value;
        
        let query = sb.from('facturas').select('*, empresas(nombre)').order('created_at', { ascending: false });
        
        if (desde) query = query.gte('fecha', desde);
        if (hasta) query = query.lte('fecha', hasta);
        if (clienteId) query = query.eq('empresa_id', clienteId);
        
        const { data: facturas, error } = await query;
        
        const container = document.getElementById('listaFacturas');
        
        if (error) {
            container.innerHTML = `<div class="medicion-card">❌ Error: ${error.message}</div>`;
            return;
        }
        
        if (!facturas || facturas.length === 0) {
            container.innerHTML = '<div class="medicion-card">📋 No hay facturas registradas</div>';
            return;
        }
        
        container.innerHTML = `
            <table>
                <thead><tr><th>Fecha</th><th>Cliente</th><th>Concepto</th><th>Importe</th><th>Estado</th><th>Acciones</th></tr></thead>
                <tbody>
                    ${facturas.map(f => `
                        <tr>
                            <td>${formatDate(f.fecha)}</td>
                            <td>${f.empresas?.nombre || '-'}</td>
                            <td>${f.concepto || 'Suscripción'}</td>
                            <td>${f.total?.toFixed(2) || f.importe?.toFixed(2) || '0.00'}€</td>
                            <td><span class="badge ${f.pagada ? 'badge-activo' : 'badge-inactivo'}">${f.pagada ? 'Pagada' : 'Pendiente'}</span></td>
                            <td><button class="btn-sm ${f.pagada ? 'btn-info' : 'btn-success'} toggle-factura" data-id="${f.id}" data-pagada="${f.pagada}">${f.pagada ? '❌ Marcar pendiente' : '✅ Marcar pagada'}</button></td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
        
        document.querySelectorAll('.toggle-factura').forEach(btn => {
            btn.onclick = async () => {
                const id = btn.dataset.id;
                const pagada = btn.dataset.pagada === 'true';
                await sb.from('facturas').update({ pagada: !pagada }).eq('id', id);
                mostrarMensaje(pagada ? '❌ Factura marcada como pendiente' : '✅ Factura marcada como pagada');
                await cargarFacturas();
                await cargarStats();
            };
        });
    }

    async function crearFactura() {
        const empresaId = document.getElementById('facturaClienteId').value;
        const fecha = document.getElementById('facturaFecha').value;
        const vencimiento = document.getElementById('facturaVencimiento').value;
        const importe = parseFloat(document.getElementById('facturaImporte').value);
        const concepto = document.getElementById('facturaConcepto').value;
        
        if (!empresaId || !importe) {
            mostrarMensaje("❌ Complete los campos obligatorios", 'error');
            return;
        }
        
        const numero = `F${new Date().getFullYear()}${Math.floor(Math.random() * 10000)}`;
        
        const { error } = await sb.from('facturas').insert({
            empresa_id: empresaId,
            numero: numero,
            fecha: fecha || new Date().toISOString().split('T')[0],
            fecha_vencimiento: vencimiento || null,
            concepto: concepto || 'Suscripción mensual',
            subtotal: importe,
            iva: importe * 0.21,
            total: importe * 1.21,
            pagada: false
        });
        
        if (error) {
            mostrarMensaje("❌ Error: " + error.message, 'error');
        } else {
            mostrarMensaje("✅ Factura creada correctamente");
            document.getElementById('modalCrearFactura').style.display = 'none';
            document.getElementById('facturaImporte').value = '';
            await cargarFacturas();
            await cargarStats();
            await cargarClientes();
        }
    }

    function mostrarModalFactura(id, nombre) {
        document.getElementById('facturaClienteId').value = id;
        document.getElementById('facturaFecha').value = new Date().toISOString().split('T')[0];
        document.getElementById('facturaVencimiento').value = '';
        document.getElementById('facturaImporte').value = '';
        document.getElementById('facturaConcepto').value = 'Suscripción mensual';
        document.getElementById('modalCrearFactura').style.display = 'flex';
    }

    // ========== NUEVO CLIENTE ==========
    async function crearCliente() {
        const nombre = document.getElementById('empresaNombre').value.trim();
        const email = document.getElementById('empresaEmail').value.trim();
        const contactoNombre = document.getElementById('contactoNombre').value.trim();
        const telefono = document.getElementById('empresaTelefono').value.trim();
        const nif = document.getElementById('empresaNif').value.trim();
        const plan = document.getElementById('empresaPlan').value;
        const direccion = document.getElementById('empresaDireccion').value.trim();
        
        if (!nombre || !email) {
            mostrarMensaje("❌ Nombre y email son obligatorios", 'error');
            return;
        }
        
        const passwordTemp = Math.random().toString(36).substring(2, 10) + "A1!";
        
        const btn = document.getElementById('btnGuardarCliente');
        const textoOriginal = btn.innerHTML;
        btn.innerHTML = '<span class="spinner"></span> Creando...';
        btn.disabled = true;
        
        try {
            const { data: empresa, error: empError } = await sb
                .from('empresas')
                .insert({
                    nombre: nombre,
                    nif: nif || null,
                    direccion: direccion || null,
                    telefono: telefono || null,
                    email: email,
                    plan: plan,
                    activo: true
                })
                .select()
                .single();
            
            if (empError) throw empError;
            
            const response = await fetch(`${SUPABASE_URL}/functions/v1/crear-usuario`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: email,
                    password: passwordTemp,
                    nombre: contactoNombre || nombre,
                    empresa_id: empresa.id,
                    empresa_nombre: nombre
                })
            });
            
            const resultado = await response.json();
            
            if (!resultado.success) throw new Error(resultado.error);
            
            alert(`✅ CLIENTE CREADO\n\nEmpresa: ${nombre}\nEmail: ${email}\nPassword temporal: ${passwordTemp}\n\n📧 Envía estas credenciales al cliente.`);
            
            document.getElementById('empresaNombre').value = '';
            document.getElementById('empresaEmail').value = '';
            document.getElementById('contactoNombre').value = '';
            document.getElementById('empresaTelefono').value = '';
            document.getElementById('empresaNif').value = '';
            document.getElementById('empresaDireccion').value = '';
            document.getElementById('formAlta').style.display = 'none';
            
            await cargarClientes();
            await cargarStats();
            
        } catch (error) {
            console.error("Error:", error);
            mostrarMensaje(`❌ Error: ${error.message}`, 'error');
        } finally {
            btn.innerHTML = textoOriginal;
            btn.disabled = false;
        }
    }

    // ========== CONFIGURACIÓN ==========
    async function cargarPlanes() {
        document.getElementById('planesList').innerHTML = `
            <div class="medicion-card"><strong>📋 Plan Básico</strong> - 49€/mes<br>Hasta 20 comunidades, 2 técnicos</div>
            <div class="medicion-card"><strong>📋 Plan Pro</strong> - 99€/mes<br>Hasta 100 comunidades, 10 técnicos</div>
            <div class="medicion-card"><strong>📋 Plan Empresa</strong> - 199€/mes<br>Comunidades ilimitadas, técnicos ilimitados</div>
        `;
    }

    // ========== EXPORTAR PDF ==========
    async function exportarPDF() {
        const element = document.getElementById('listaClientes');
        const opt = {
            margin: 10,
            filename: `clientes_comutech_${new Date().toISOString().split('T')[0]}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
        };
        html2pdf().set(opt).from(element).save();
    }

    // ========== CARGAR SELECTORES ==========
    async function cargarSelectores() {
        const { data: empresas } = await sb.from('empresas').select('id, nombre');
        const selectCliente = document.getElementById('facturaCliente');
        if (selectCliente && empresas) {
            selectCliente.innerHTML = '<option value="">Todos</option>' + empresas.map(e => `<option value="${e.id}">${e.nombre}</option>`).join('');
        }
    }

    // ========== EVENTOS ==========
    document.getElementById('btnLogin').onclick = async () => {
        if (await hacerLogin()) {
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('dashboardPanel').style.display = 'block';
            await cargarStats();
            await cargarClientes();
            await cargarFacturas();
            await cargarPlanes();
            await cargarSelectores();
        }
    };
    
    document.getElementById('btnMostrarAlta').onclick = () => {
        document.getElementById('formAlta').style.display = 'block';
    };
    
    document.getElementById('btnCancelarAlta').onclick = () => {
        document.getElementById('formAlta').style.display = 'none';
    };
    
    document.getElementById('btnGuardarCliente').onclick = crearCliente;
    document.getElementById('btnRefrescar').onclick = () => {
        cargarClientes();
        cargarStats();
        cargarFacturas();
    };
    document.getElementById('btnExportarPDF').onclick = exportarPDF;
    document.getElementById('btnFiltrarFacturas').onclick = cargarFacturas;
    document.getElementById('btnGuardarEdicion').onclick = guardarEdicionCliente;
    document.getElementById('btnCancelarEdicion').onclick = () => document.getElementById('modalEditarCliente').style.display = 'none';
    document.getElementById('btnCerrarDetalle').onclick = () => document.getElementById('modalVerCliente').style.display = 'none';
    document.getElementById('btnGuardarFactura').onclick = crearFactura;
    document.getElementById('btnCancelarFactura').onclick = () => document.getElementById('modalCrearFactura').style.display = 'none';
    
    document.getElementById('btnLogout').onclick = async () => {
        await sb.auth.signOut();
        location.reload();
    };
    
    // Tabs
    document.querySelectorAll('.tab').forEach(tab => {
        tab.onclick = () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById(`tab${tab.dataset.tab.charAt(0).toUpperCase() + tab.dataset.tab.slice(1)}`).classList.add('active');
            if (tab.dataset.tab === 'facturas') cargarFacturas();
        };
    });
</script>
</body>
