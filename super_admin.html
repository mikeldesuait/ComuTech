<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>COMUTECH · Panel Super Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #eef2ff;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        .card-header {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            border-left: 4px solid #0077b6;
            padding-left: 16px;
            color: #1e4663;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .row-flex {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 16px;
        }
        .grupo {
            flex: 1;
            min-width: 180px;
        }
        label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 4px;
            display: block;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            font-size: 0.85rem;
            background: white;
        }
        button {
            background: #0077b6;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
        }
        button:hover { background: #005f8c; transform: translateY(-1px); }
        .btn-success { background: #2c7a4d; }
        .btn-danger { background: #c2410c; }
        .btn-warning { background: #e67e22; }
        .btn-info { background: #0284c7; }
        .btn-sm { padding: 6px 12px; font-size: 0.7rem; }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        th {
            background: #f8fafc;
            font-weight: 600;
            color: #1e4663;
        }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .badge-activo { background: #d4edda; color: #155724; }
        .badge-inactivo { background: #f8d7da; color: #721c24; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 28px;
            max-width: 550px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-header {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #1e4663;
            border-left: 4px solid #0077b6;
            padding-left: 16px;
        }
        .mensaje {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 40px;
            color: white;
            z-index: 1000;
            animation: fadeOut 3s ease forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .oculto { display: none; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }
        .stat-number {
            font-size: 1.8rem;
            font-weight: 700;
            color: #0077b6;
        }
        .stat-label {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 8px;
        }
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
            border-bottom: 1px solid #e2e8f0;
            flex-wrap: wrap;
        }
        .tab {
            padding: 10px 24px;
            background: none;
            color: #475569;
            border: none;
            border-radius: 0;
            cursor: pointer;
            font-weight: 500;
        }
        .tab:hover { background: none; color: #0077b6; transform: none; }
        .tab.active {
            color: #0077b6;
            border-bottom: 2px solid #0077b6;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .detalle-info {
            background: #f8fafc;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .detalle-info p {
            margin: 8px 0;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .btn-group button {
            flex: 1;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Login -->
    <div id="loginPanel" class="card">
        <div class="card-header" style="cursor:default;">👑 COMUTECH · Super Admin</div>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Contraseña">
        <button id="btnLogin">Iniciar sesión</button>
        <div id="errorMsg" style="color:red; margin-top:12px;"></div>
    </div>

    <div id="dashboardPanel" style="display: none;">
        <!-- Header -->
        <div class="card" style="background: linear-gradient(135deg, #1e4663 0%, #0077b6 100%); color: white;">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                <div>
                    <div style="font-size: 0.8rem; opacity: 0.8;">👑 Super Admin</div>
                    <div style="font-size: 1.3rem; font-weight: 700;" id="nombreAdmin">Cargando...</div>
                    <div style="font-size: 0.8rem; opacity: 0.8;" id="emailAdmin"></div>
                </div>
                <div style="font-size: 2rem;">🏢 COMUTECH</div>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid" id="statsPanel"></div>

        <!-- Botones acción -->
        <div class="card">
            <div class="row-flex">
                <button id="btnMostrarAlta" class="btn-success">➕ Nuevo cliente</button>
                <button id="btnRefrescar" class="btn-info">🔄 Refrescar</button>
            </div>
        </div>

        <!-- Formulario alta cliente -->
        <div id="formAlta" class="card" style="display: none;">
            <div class="card-header">📝 Dar de alta nuevo cliente</div>
            <div class="row-flex">
                <div class="grupo">
                    <label>🏢 Nombre empresa *</label>
                    <input type="text" id="empresaNombre" placeholder="Ej: Gestión Norte S.L.">
                </div>
                <div class="grupo">
                    <label>📧 Email contacto *</label>
                    <input type="email" id="empresaEmail" placeholder="admin@empresa.com">
                </div>
            </div>
            <div class="row-flex">
                <div class="grupo">
                    <label>👤 Nombre contacto</label>
                    <input type="text" id="contactoNombre" placeholder="Nombre del administrador">
                </div>
                <div class="grupo">
                    <label>📞 Teléfono</label>
                    <input type="text" id="empresaTelefono" placeholder="Teléfono de contacto">
                </div>
            </div>
            <div class="row-flex">
                <div class="grupo">
                    <label>📋 NIF/CIF</label>
                    <input type="text" id="empresaNif" placeholder="B12345678">
                </div>
                <div class="grupo">
                    <label>🏷️ Plan</label>
                    <select id="empresaPlan">
                        <option value="BASICO">Básico (49€/mes)</option>
                        <option value="PRO">Pro (99€/mes)</option>
                        <option value="EMPRESA">Empresa (199€/mes)</option>
                    </select>
                </div>
            </div>
            <div class="row-flex">
                <div class="grupo">
                    <label>📍 Dirección</label>
                    <input type="text" id="empresaDireccion" placeholder="Dirección completa">
                </div>
            </div>
            <div class="btn-group">
                <button id="btnGuardarCliente" class="btn-success">💾 Guardar cliente</button>
                <button id="btnCancelarAlta" class="btn-danger">✖ Cancelar</button>
            </div>
        </div>

        <!-- Tabs -->
        <div class="card">
            <div class="tabs">
                <button class="tab active" data-tab="clientes">🏢 Clientes</button>
                <button class="tab" data-tab="facturas">💰 Facturación</button>
            </div>

            <!-- Tab Clientes -->
            <div id="tabClientes" class="tab-content active">
                <div id="listaClientes">
                    <div style="text-align: center; padding: 40px;">🔄 Cargando clientes...</div>
                </div>
            </div>

            <!-- Tab Facturación -->
            <div id="tabFacturas" class="tab-content">
                <div class="row-flex">
                    <div class="grupo">
                        <label>📅 Desde</label>
                        <input type="date" id="facturaDesde">
                    </div>
                    <div class="grupo">
                        <label>📅 Hasta</label>
                        <input type="date" id="facturaHasta">
                    </div>
                    <div class="grupo">
                        <label>🏢 Cliente</label>
                        <select id="facturaCliente">
                            <option value="">Todos</option>
                        </select>
                    </div>
                    <button id="btnFiltrarFacturas" class="btn-info">🔍 Filtrar</button>
                </div>
                <div id="listaFacturas">
                    <div style="text-align: center; padding: 40px;">📋 No hay facturas registradas</div>
                </div>
                <div style="margin-top: 20px;">
                    <button id="btnMostrarCrearFactura" class="btn-success">➕ Nueva factura</button>
                </div>
            </div>
        </div>

        <button id="btnLogout" style="background:#475569; margin-top:16px;">🚪 Cerrar sesión</button>
    </div>
</div>

<!-- Modal Editar Cliente -->
<div id="modalEditarCliente" class="modal">
    <div class="modal-content">
        <div class="modal-header">✏️ Editar cliente</div>
        <input type="hidden" id="editClienteId">
        <div class="row-flex">
            <div class="grupo">
                <label>🏢 Nombre empresa</label>
                <input type="text" id="editNombre">
            </div>
            <div class="grupo">
                <label>📧 Email</label>
                <input type="email" id="editEmail">
            </div>
        </div>
        <div class="row-flex">
            <div class="grupo">
                <label>📋 NIF/CIF</label>
                <input type="text" id="editNif">
            </div>
            <div class="grupo">
                <label>📞 Teléfono</label>
                <input type="text" id="editTelefono">
            </div>
        </div>
        <div class="row-flex">
            <div class="grupo">
                <label>📍 Dirección</label>
                <input type="text" id="editDireccion">
            </div>
            <div class="grupo">
                <label>🏷️ Plan</label>
                <select id="editPlan">
                    <option value="BASICO">Básico (49€/mes)</option>
                    <option value="PRO">Pro (99€/mes)</option>
                    <option value="EMPRESA">Empresa (199€/mes)</option>
                </select>
            </div>
        </div>
        <div class="row-flex">
            <div class="grupo">
                <label>👤 Contacto</label>
                <input type="text" id="editContacto">
            </div>
            <div class="grupo">
                <label>📱 WhatsApp</label>
                <input type="text" id="editWhatsapp">
            </div>
        </div>
        <div class="row-flex">
            <div class="grupo">
                <label>💰 Saldo (€)</label>
                <input type="number" step="0.01" id="editSaldo">
            </div>
        </div>
        <div class="btn-group">
            <button id="btnGuardarEdicion" class="btn-success">💾 Guardar</button>
            <button id="btnCancelarEdicion" class="btn-danger">✖ Cancelar</button>
        </div>
    </div>
</div>

<!-- Modal Ver Cliente -->
<div id="modalVerCliente" class="modal">
    <div class="modal-content">
        <div class="modal-header">📋 Detalle del cliente</div>
        <div id="detalleCliente"></div>
        <div class="btn-group">
            <button id="btnCerrarDetalle" class="btn-info">Cerrar</button>
        </div>
    </div>
</div>

<!-- Modal Crear Factura -->
<div id="modalCrearFactura" class="modal">
    <div class="modal-content">
        <div class="modal-header">💰 Nueva factura</div>
        <input type="hidden" id="facturaClienteId">
        <div class="row-flex">
            <div class="grupo">
                <label>📅 Fecha</label>
                <input type="date" id="facturaFecha">
            </div>
            <div class="grupo">
                <label>💶 Importe (€)</label>
                <input type="number" step="0.01" id="facturaImporte" placeholder="0.00">
            </div>
        </div>
        <div class="row-flex">
            <div class="grupo">
                <label>📝 Concepto</label>
                <input type="text" id="facturaConcepto" placeholder="Suscripción mensual">
            </div>
        </div>
        <div class="btn-group">
            <button id="btnGuardarFactura" class="btn-success">💾 Crear factura</button>
            <button id="btnCancelarFactura" class="btn-danger">✖ Cancelar</button>
        </div>
    </div>
</div>

<script>
    // ========== CONFIGURACIÓN ==========
    const SUPABASE_URL = "https://idbdkxhhqeuarcqcaweo.supabase.co";
    const SUPABASE_KEY = "sb_publishable_uNWQl8gDfrmrPWS_1uEVcg_gMeqjO2U";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;
    let empresasData = [];

    function mostrarMensaje(texto, tipo = 'exito') {
        const msg = document.createElement('div');
        msg.className = 'mensaje';
        msg.style.background = tipo === 'exito' ? '#2c7a4d' : '#c2410c';
        msg.innerHTML = texto;
        document.body.appendChild(msg);
        setTimeout(() => msg.remove(), 3000);
    }

    function formatDate(date) {
        if (!date) return '';
        return new Date(date).toLocaleDateString('es-ES');
    }

    // ========== LOGIN ==========
    async function hacerLogin() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        
        if (!email || !password) {
            document.getElementById('errorMsg').innerText = "Introduce email y contraseña";
            return false;
        }
        
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) {
            document.getElementById('errorMsg').innerText = error.message;
            return false;
        }
        
        const { data: perfil } = await sb
            .from('perfiles')
            .select('rol, nombre')
            .eq('id', data.user.id)
            .maybeSingle();
        
        if (!perfil || perfil.rol !== 'super_admin') {
            await sb.auth.signOut();
            document.getElementById('errorMsg').innerText = "Acceso no autorizado";
            return false;
        }
        
        currentUser = data.user;
        document.getElementById('nombreAdmin').innerHTML = perfil.nombre || 'Super Admin';
        document.getElementById('emailAdmin').innerHTML = currentUser.email;
        return true;
    }

    // ========== ESTADÍSTICAS ==========
    async function cargarStats() {
        const { data: empresas } = await sb.from('empresas').select('*');
        const { data: facturas } = await sb.from('facturas').select('*');
        
        const totalClientes = empresas?.length || 0;
        const clientesActivos = empresas?.filter(e => e.activo).length || 0;
        const ingresosTotales = facturas?.reduce((sum, f) => sum + (f.total || 0), 0) || 0;
        
        document.getElementById('statsPanel').innerHTML = `
            <div class="stat-card"><div class="stat-number">${totalClientes}</div><div class="stat-label">Total Clientes</div></div>
            <div class="stat-card"><div class="stat-number">${clientesActivos}</div><div class="stat-label">Activos</div></div>
            <div class="stat-card"><div class="stat-number">${ingresosTotales.toFixed(2)}€</div><div class="stat-label">Ingresos</div></div>
        `;
    }

    // ========== CLIENTES ==========
    async function cargarClientes() {
        const container = document.getElementById('listaClientes');
        container.innerHTML = '<div style="text-align: center; padding: 40px;">🔄 Cargando...</div>';
        
        const { data: empresas, error } = await sb
            .from('empresas')
            .select('*')
            .order('created_at', { ascending: false });
        
        if (error) {
            container.innerHTML = `<div style="color: red; padding: 20px;">❌ Error: ${error.message}</div>`;
            return;
        }
        
        empresasData = empresas || [];
        
        if (!empresas || empresas.length === 0) {
            container.innerHTML = '<div style="text-align: center; padding: 40px;">📋 No hay clientes</div>';
            return;
        }
        
        let html = `<table><thead><tr><th>Empresa</th><th>Contacto</th><th>Email</th><th>Plan</th><th>Estado</th><th>Acciones</th></thead><tbody>`;
        
        for (const emp of empresas) {
            const { data: perfil } = await sb
                .from('perfiles')
                .select('nombre, email')
                .eq('empresa_id', emp.id)
                .eq('rol', 'gerente')
                .maybeSingle();
            
            html += `<tr>
                <td><strong>${emp.nombre}</strong><br><small>${emp.nif || ''}</small></td>
                <td>${perfil?.nombre || '-'}</td>
                <td>${perfil?.email || emp.email || '-'}</td>
                <td><span class="badge">${emp.plan || 'BASICO'}</span></td>
                <td><span class="badge ${emp.activo ? 'badge-activo' : 'badge-inactivo'}">${emp.activo ? 'Activo' : 'Inactivo'}</span></td>
                <td>
                    <button class="btn-sm btn-view ver-cliente" data-id="${emp.id}" style="background:#0284c7;">👁️</button>
                    <button class="btn-sm btn-edit editar-cliente" data-id="${emp.id}" style="background:#e67e22;">✏️</button>
                    <button class="btn-sm facturar-cliente" data-id="${emp.id}" data-nombre="${emp.nombre}" style="background:#2c7a4d;">💰</button>
                    <button class="btn-sm toggle-cliente" data-id="${emp.id}" data-activo="${emp.activo}" style="background:#c2410c;">${emp.activo ? '❌' : '✅'}</button>
                </td>
            </tr>`;
        }
        
        html += '</tbody></table>';
        container.innerHTML = html;
        
        document.querySelectorAll('.toggle-cliente').forEach(btn => {
            btn.onclick = async () => {
                const id = btn.dataset.id;
                const activo = btn.dataset.activo === 'true';
                await sb.from('empresas').update({ activo: !activo }).eq('id', id);
                mostrarMensaje(activo ? 'Desactivado' : 'Activado');
                await cargarClientes();
                await cargarStats();
            };
        });
        
        document.querySelectorAll('.editar-cliente').forEach(btn => {
            btn.onclick = () => editarCliente(btn.dataset.id);
        });
        
        document.querySelectorAll('.ver-cliente').forEach(btn => {
            btn.onclick = () => verCliente(btn.dataset.id);
        });
        
        document.querySelectorAll('.facturar-cliente').forEach(btn => {
            btn.onclick = () => mostrarModalFactura(btn.dataset.id, btn.dataset.nombre);
        });
    }

    async function editarCliente(id) {
        const empresa = empresasData.find(e => e.id === id);
        if (!empresa) return;
        
        const { data: perfil } = await sb
            .from('perfiles')
            .select('nombre, email, telefono')
            .eq('empresa_id', id)
            .eq('rol', 'gerente')
            .maybeSingle();
        
        document.getElementById('editClienteId').value = id;
        document.getElementById('editNombre').value = empresa.nombre || '';
        document.getElementById('editEmail').value = perfil?.email || empresa.email || '';
        document.getElementById('editNif').value = empresa.nif || '';
        document.getElementById('editTelefono').value = perfil?.telefono || empresa.telefono || '';
        document.getElementById('editDireccion').value = empresa.direccion || '';
        document.getElementById('editPlan').value = empresa.plan || 'BASICO';
        document.getElementById('editContacto').value = perfil?.nombre || '';
        document.getElementById('editWhatsapp').value = empresa.whatsapp_contacto || '';
        document.getElementById('editSaldo').value = empresa.saldo_pendiente || 0;
        
        document.getElementById('modalEditarCliente').style.display = 'flex';
    }

    async function guardarEdicionCliente() {
        const id = document.getElementById('editClienteId').value;
        
        await sb.from('empresas').update({
            nombre: document.getElementById('editNombre').value,
            nif: document.getElementById('editNif').value,
            direccion: document.getElementById('editDireccion').value,
            telefono: document.getElementById('editTelefono').value,
            email: document.getElementById('editEmail').value,
            plan: document.getElementById('editPlan').value,
            whatsapp_contacto: document.getElementById('editWhatsapp').value,
            saldo_pendiente: parseFloat(document.getElementById('editSaldo').value) || 0
        }).eq('id', id);
        
        const contacto = document.getElementById('editContacto').value;
        if (contacto) {
            await sb
                .from('perfiles')
                .update({ nombre: contacto, telefono: document.getElementById('editTelefono').value })
                .eq('empresa_id', id)
                .eq('rol', 'gerente');
        }
        
        mostrarMensaje("✅ Cliente actualizado");
        document.getElementById('modalEditarCliente').style.display = 'none';
        await cargarClientes();
        await cargarStats();
    }

    async function verCliente(id) {
        const empresa = empresasData.find(e => e.id === id);
        if (!empresa) return;
        
        const { data: perfil } = await sb
            .from('perfiles')
            .select('*')
            .eq('empresa_id', id)
            .eq('rol', 'gerente')
            .maybeSingle();
        
        const { data: facturas } = await sb
            .from('facturas')
            .select('*')
            .eq('empresa_id', id)
            .order('created_at', { ascending: false })
            .limit(5);
        
        const totalFacturado = facturas?.reduce((sum, f) => sum + (f.total || 0), 0) || 0;
        
        document.getElementById('detalleCliente').innerHTML = `
            <div class="detalle-info">
                <p><strong>🏢 ${empresa.nombre}</strong></p>
                <p>📋 NIF: ${empresa.nif || '-'}</p>
                <p>📍 ${empresa.direccion || '-'}</p>
                <p>📞 ${empresa.telefono || '-'}</p>
                <p>📧 ${perfil?.email || empresa.email || '-'}</p>
                <p>👤 Contacto: ${perfil?.nombre || '-'}</p>
                <p>🏷️ Plan: ${empresa.plan || 'BASICO'}</p>
                <p>💰 Saldo: ${(empresa.saldo_pendiente || 0).toFixed(2)}€</p>
                <p>📅 Alta: ${formatDate(empresa.created_at)}</p>
            </div>
            <div class="detalle-info">
                <p><strong>💰 Facturación</strong></p>
                <p>📊 Total facturado: ${totalFacturado.toFixed(2)}€</p>
                ${facturas?.length ? facturas.map(f => `<p>📄 ${formatDate(f.fecha)} - ${f.total?.toFixed(2)}€ - ${f.pagada ? '✅ Pagada' : '⏳ Pendiente'}</p>`).join('') : '<p>No hay facturas</p>'}
            </div>
        `;
        
        document.getElementById('modalVerCliente').style.display = 'flex';
    }

    // ========== NUEVO CLIENTE ==========
    async function crearCliente() {
        const nombre = document.getElementById('empresaNombre').value.trim();
        const email = document.getElementById('empresaEmail').value.trim();
        const contactoNombre = document.getElementById('contactoNombre').value.trim();
        const telefono = document.getElementById('empresaTelefono').value.trim();
        const nif = document.getElementById('empresaNif').value.trim();
        const plan = document.getElementById('empresaPlan').value;
        const direccion = document.getElementById('empresaDireccion').value.trim();
        
        if (!nombre || !email) {
            mostrarMensaje("❌ Nombre y email son obligatorios", 'error');
            return;
        }
        
        const passwordTemp = Math.random().toString(36).substring(2, 10) + "A1!";
        
        const btn = document.getElementById('btnGuardarCliente');
        const textoOriginal = btn.innerHTML;
        btn.innerHTML = '<span class="spinner"></span> Creando...';
        btn.disabled = true;
        
        try {
            const { data: empresa, error: empError } = await sb
                .from('empresas')
                .insert({
                    nombre: nombre,
                    nif: nif || null,
                    direccion: direccion || null,
                    telefono: telefono || null,
                    email: email,
                    plan: plan,
                    activo: true
                })
                .select()
                .single();
            
            if (empError) throw empError;
            
            const response = await fetch(`${SUPABASE_URL}/functions/v1/crear-usuario`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: email,
                    password: passwordTemp,
                    nombre: contactoNombre || nombre,
                    empresa_id: empresa.id,
                    empresa_nombre: nombre
                })
            });
            
            const resultado = await response.json();
            if (!resultado.success) throw new Error(resultado.error);
            
            alert(`✅ Cliente creado\n\nEmpresa: ${nombre}\nEmail: ${email}\nPassword temporal: ${passwordTemp}`);
            
            document.getElementById('empresaNombre').value = '';
            document.getElementById('empresaEmail').value = '';
            document.getElementById('contactoNombre').value = '';
            document.getElementById('empresaTelefono').value = '';
            document.getElementById('empresaNif').value = '';
            document.getElementById('empresaDireccion').value = '';
            document.getElementById('formAlta').style.display = 'none';
            
            await cargarClientes();
            await cargarStats();
            
        } catch (error) {
            mostrarMensaje(`❌ Error: ${error.message}`, 'error');
        } finally {
            btn.innerHTML = textoOriginal;
            btn.disabled = false;
        }
    }

    // ========== FACTURACIÓN ==========
    async function cargarFacturas() {
        const desde = document.getElementById('facturaDesde').value;
        const hasta = document.getElementById('facturaHasta').value;
        const clienteId = document.getElementById('facturaCliente').value;
        
        let query = sb.from('facturas').select('*, empresas(nombre)').order('created_at', { ascending: false });
        if (desde) query = query.gte('fecha', desde);
        if (hasta) query = query.lte('fecha', hasta);
        if (clienteId) query = query.eq('empresa_id', clienteId);
        
        const { data: facturas, error } = await query;
        const container = document.getElementById('listaFacturas');
        
        if (error) {
            container.innerHTML = `<div class="medicion-card">❌ Error: ${error.message}</div>`;
            return;
        }
        
        if (!facturas || facturas.length === 0) {
            container.innerHTML = '<div class="medicion-card">📋 No hay facturas</div>';
            return;
        }
        
        container.innerHTML = `<table><thead><tr><th>Fecha</th><th>Cliente</th><th>Concepto</th><th>Importe</th><th>Estado</th><th>Acciones</th></thead><tbody>${
            facturas.map(f => `<tr>
                <td>${formatDate(f.fecha)}</td>
                <td>${f.empresas?.nombre || '-'}</td>
                <td>${f.concepto || 'Suscripción'}</td>
                <td>${(f.total || f.importe || 0).toFixed(2)}€</td>
                <td><span class="badge ${f.pagada ? 'badge-activo' : 'badge-inactivo'}">${f.pagada ? 'Pagada' : 'Pendiente'}</span></td>
                <td><button class="btn-sm toggle-factura" data-id="${f.id}" data-pagada="${f.pagada}" style="background:#e67e22;">${f.pagada ? '❌' : '✅'}</button></td>
            </tr>`).join('')
        }</tbody>able`;
        
        document.querySelectorAll('.toggle-factura').forEach(btn => {
            btn.onclick = async () => {
                const id = btn.dataset.id;
                const pagada = btn.dataset.pagada === 'true';
                await sb.from('facturas').update({ pagada: !pagada }).eq('id', id);
                mostrarMensaje(pagada ? 'Marcada pendiente' : 'Marcada pagada');
                await cargarFacturas();
                await cargarStats();
            };
        });
    }

    async function crearFactura() {
        const empresaId = document.getElementById('facturaClienteId').value;
        const fecha = document.getElementById('facturaFecha').value;
        const importe = parseFloat(document.getElementById('facturaImporte').value);
        const concepto = document.getElementById('facturaConcepto').value;
        
        if (!empresaId || !importe) {
            mostrarMensaje("❌ Complete los campos", 'error');
            return;
        }
        
        const numero = `F${new Date().getFullYear()}${Math.floor(Math.random() * 10000)}`;
        
        const { error } = await sb.from('facturas').insert({
            empresa_id: empresaId,
            numero: numero,
            fecha: fecha || new Date().toISOString().split('T')[0],
            concepto: concepto || 'Suscripción',
            subtotal: importe,
            iva: importe * 0.21,
            total: importe * 1.21,
            pagada: false
        });
        
        if (error) {
            mostrarMensaje("❌ Error: " + error.message, 'error');
        } else {
            mostrarMensaje("✅ Factura creada");
            document.getElementById('modalCrearFactura').style.display = 'none';
            document.getElementById('facturaImporte').value = '';
            await cargarFacturas();
            await cargarStats();
        }
    }

    function mostrarModalFactura(id, nombre) {
        document.getElementById('facturaClienteId').value = id;
        document.getElementById('facturaFecha').value = new Date().toISOString().split('T')[0];
        document.getElementById('facturaImporte').value = '';
        document.getElementById('facturaConcepto').value = 'Suscripción mensual';
        document.getElementById('modalCrearFactura').style.display = 'flex';
    }

    async function cargarSelectores() {
        const { data: empresas } = await sb.from('empresas').select('id, nombre');
        const selectCliente = document.getElementById('facturaCliente');
        if (selectCliente && empresas) {
            selectCliente.innerHTML = '<option value="">Todos</option>' + empresas.map(e => `<option value="${e.id}">${e.nombre}</option>`).join('');
        }
    }

    // ========== EVENTOS ==========
    document.getElementById('btnLogin').onclick = async () => {
        if (await hacerLogin()) {
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('dashboardPanel').style.display = 'block';
            await cargarStats();
            await cargarClientes();
            await cargarFacturas();
            await cargarSelectores();
        }
    };
    
    document.getElementById('btnMostrarAlta').onclick = () => {
        document.getElementById('formAlta').style.display = 'block';
    };
    document.getElementById('btnCancelarAlta').onclick = () => {
        document.getElementById('formAlta').style.display = 'none';
    };
    document.getElementById('btnGuardarCliente').onclick = crearCliente;
    document.getElementById('btnRefrescar').onclick = () => {
        cargarClientes();
        cargarStats();
        cargarFacturas();
    };
    document.getElementById('btnFiltrarFacturas').onclick = cargarFacturas;
    document.getElementById('btnMostrarCrearFactura').onclick = () => {
        if (empresasData.length === 0) {
            mostrarMensaje("No hay clientes para facturar", 'error');
            return;
        }
        alert("Selecciona un cliente y haz clic en 💰 en la lista");
    };
    document.getElementById('btnGuardarEdicion').onclick = guardarEdicionCliente;
    document.getElementById('btnCancelarEdicion').onclick = () => document.getElementById('modalEditarCliente').style.display = 'none';
    document.getElementById('btnCerrarDetalle').onclick = () => document.getElementById('modalVerCliente').style.display = 'none';
    document.getElementById('btnGuardarFactura').onclick = crearFactura;
    document.getElementById('btnCancelarFactura').onclick = () => document.getElementById('modalCrearFactura').style.display = 'none';
    
    document.getElementById('btnLogout').onclick = async () => {
        await sb.auth.signOut();
        location.reload();
    };
    
    document.querySelectorAll('.tab').forEach(tab => {
        tab.onclick = () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById(`tab${tab.dataset.tab.charAt(0).toUpperCase() + tab.dataset.tab.slice(1)}`).classList.add('active');
            if (tab.dataset.tab === 'facturas') cargarFacturas();
        };
    });
</script>
</body>
