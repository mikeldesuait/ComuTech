    // Funciones auxiliares
    function mostrarMensaje(texto, tipo = 'exito') {
        const msg = document.createElement('div');
        msg.className = 'mensaje';
        msg.style.background = tipo === 'exito' ? '#2c7a4d' : '#dc2626';
        msg.innerHTML = texto;
        document.body.appendChild(msg);
        setTimeout(() => msg.remove(), 3000);
    }

    function formatearFecha(fecha) {
        if (!fecha) return 'Sin fecha';
        const partes = fecha.split('-');
        return `${partes[2]}/${partes[1]}/${partes[0]}`;
    }

    function formatearDuracion(minutos) {
        if (!minutos && minutos !== 0) return 'No registrado';
        if (minutos === 0) return '1 min';
        const horas = Math.floor(minutos / 60);
        const mins = minutos % 60;
        if (horas > 0 && mins > 0) return `${horas}h ${mins}min`;
        if (horas > 0) return `${horas}h`;
        return `${mins}min`;

    // Login
    async function hacerLogin() {
        const identificador = document.getElementById('identificador').value.trim();
        const password = document.getElementById('password').value;
        if (!identificador || !password) { document.getElementById('errorMsg').innerText = "Introduce email/nick y contraseña"; return false; }
        let email = identificador;
        if (!identificador.includes('@')) {
            const { data: perfil } = await sb.from('perfiles').select('email').eq('nick', identificador).maybeSingle();
            if (!perfil) { document.getElementById('errorMsg').innerText = "Usuario no encontrado"; return false; }
            email = perfil.email;
        }
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) { document.getElementById('errorMsg').innerText = error.message; return false; }
        const { data: perfil } = await sb.from('perfiles').select('*').eq('id', data.user.id).maybeSingle();
        if (!perfil || perfil.rol !== 'tecnico') { await sb.auth.signOut(); document.getElementById('errorMsg').innerText = "Acceso solo para técnicos"; return false; }
        currentUser = data.user;
        currentTecnicoId = perfil.id;

    // Cargar tareas
    async function cargarTareas() {
        const { data: todas, error } = await sb.from('tareas')
            .select('*, activos(nombre, direccion, localidad), empresas!cliente_id(nombre)')
            .eq('tecnico_id', currentTecnicoId)
            .order('fecha_asignacion', { ascending: false });
        if (error) return;
        todasTareasCache = todas || [];
        const ordenar = (tareas) => {
            const prioridadOrden = { 'URGENCIA': 1, 'AVERIA': 2, 'MANTENIMIENTO': 3, 'REVISION': 4, 'PRESUPUESTO': 5 };
            return [...tareas].sort((a, b) => {
                const priorA = prioridadOrden[a.tipo] || 99, priorB = prioridadOrden[b.tipo] || 99;
                if (priorA !== priorB) return priorA - priorB;
                return new Date(b.fecha_asignacion) - new Date(a.fecha_asignacion);
            });
        };
        tareasData = {
            nuevas: ordenar(todas.filter(t => t.estado === 'PENDIENTE' && !t.leida)),
            activas: ordenar(todas.filter(t => t.estado === 'ACEPTADA' || t.estado === 'DESPLAZAMIENTO' || t.estado === 'EN_CURSO' || t.estado === 'SUSPENDIDA')),
            completadas: ordenar(todas.filter(t => t.estado === 'COMPLETADA' || t.estado === 'CANCELADA'))
        };
        completadasFiltradas = [...tareasData.completadas];
        document.getElementById('contNuevas').innerText = tareasData.nuevas.length;
        document.getElementById('contActivas').innerText = tareasData.activas.length;
        document.getElementById('contCompletadas').innerText = tareasData.completadas.length;
        renderizarPanel();
    }

    async function verDetalleCompletada(id) {
        // Implementación completa (omitida por brevedad, similar a la anterior)
        const { data: tarea } = await sb.from('tareas').select('*, activos(*), empresas!cliente_id(*)').eq('id', id).single();
        if (!tarea) return;
        const { data: mediciones } = await sb.from('mediciones_dinamicas').select('*').eq('tarea_id', id).order('created_at', { ascending: true });
        const { data: materiales } = await sb.from('gastos_tarea').select('*').eq('tarea_id', id).eq('tipo_gasto', 'MATERIALES');
        const { data: seguimiento } = await sb.from('seguimiento_tareas').select('*').eq('tarea_id', id).order('inicio', { ascending: true });
        let tiempoDesplazamiento = 0, tiempoTrabajo = 0;
        for (let ev of seguimiento) {
            if (ev.evento === 'LLEGADA' && ev.duracion_minutos) tiempoDesplazamiento += ev.duracion_minutos;
            if (ev.evento === 'FIN_TRABAJO' && ev.duracion_minutos) tiempoTrabajo += ev.duracion_minutos;
        }
        let eventosPorDia = new Map();
        for (let ev of seguimiento) {
            const fechaStr = ev.inicio ? ev.inicio.split('T')[0] : 'Sin fecha';
            if (!eventosPorDia.has(fechaStr)) eventosPorDia.set(fechaStr, []);
            eventosPorDia.get(fechaStr).push(ev);
        }
        let html = `<strong>📋 ID:</strong> ${tarea.id}<br><strong>🏢 Cliente:</strong> ${tarea.empresas?.nombre || '-'}<br><strong>🔧 Activo:</strong> ${tarea.activos?.nombre || '-'}<br><strong>📍 Dirección:</strong> ${tarea.activos?.direccion || ''} ${tarea.activos?.localidad || ''}<br><strong>📅 Fecha asignación:</strong> ${formatearFecha(tarea.fecha_asignacion)}<br>`;
        if (tarea.fecha_propuesta) html += `<strong>📅 Fecha propuesta:</strong> ${formatearFecha(tarea.fecha_propuesta)} a las ${tarea.hora_propuesta || '--:--'}<br>`;
        if (tarea.completada_en) html += `<strong>✅ Fecha finalización:</strong> ${new Date(tarea.completada_en).toLocaleString()}<br>`;
        html += `<hr><strong>⏱️ TIEMPOS TOTALES:</strong><br><div class="tiempo-linea"><span class="tiempo-titulo">🚗 Tiempo de desplazamiento:</span><span>${formatearDuracion(tiempoDesplazamiento)}</span></div><div class="tiempo-linea"><span class="tiempo-titulo">⚙️ Tiempo de trabajo efectivo:</span><span>${formatearDuracion(tiempoTrabajo)}</span></div>`;
        html += `<hr><strong>📋 REGISTRO POR DÍAS:</strong><br>`;
        for (let [fecha, eventos] of eventosPorDia) {
            html += `<div class="dia-group"><div class="dia-fecha">📅 ${fecha}</div>`;
            for (let ev of eventos) {
                let eventoTexto = '';
                switch(ev.evento) {
                    case 'INICIO_DESPLAZAMIENTO': eventoTexto = '🚗 Inicio desplazamiento'; break;
                    case 'LLEGADA': eventoTexto = '📍 Llegada'; break;
                    case 'INICIO_TRABAJO': eventoTexto = '⚙️ Inicio trabajo'; break;
                    case 'SUSPENSION': eventoTexto = '⏸️ Suspensión'; break;
                    case 'REANUDACION': eventoTexto = '▶️ Reanudación'; break;
                    case 'FIN_TRABAJO': eventoTexto = '🏁 Fin trabajo'; break;
                    default: eventoTexto = ev.evento;
                }
                html += `<div class="tiempo-linea"><span class="tiempo-titulo">${eventoTexto}</span><span>${ev.inicio ? new Date(ev.inicio).toLocaleString('es-ES') : '-'}</span></div>`;
            }
            let medicionesDia = mediciones.filter(m => m.created_at && m.created_at.split('T')[0] === fecha);
            if (medicionesDia.length > 0) {
                html += `<div style="margin-top:8px;"><strong>🔬 Mediciones del día:</strong><br>`;
                for (let m of medicionesDia) {
                    const params = m.parametros;
                    if (params.cloro) html += `Cloro: ${params.cloro} ppm<br>`;
                    if (params.ph) html += `pH: ${params.ph}<br>`;
                    if (params.temperatura) html += `Temperatura: ${params.temperatura} °C<br>`;
                    if (params.altura) html += `Altura césped: ${params.altura} cm<br>`;
                    if (params.observaciones) html += `Observaciones: ${params.observaciones}<br>`;
                }
                html += `</div>`;
            }
            html += `</div>`;
        }
        if (materiales && materiales.length > 0) {
            html += `<hr><strong>🧰 MATERIALES UTILIZADOS:</strong><br><div>${materiales.map(m => `• ${m.descripcion} - ${m.importe_total}€`).join('<br>')}</div>`;
        }
        html += `<hr><strong>📋 ORDEN DE TRABAJO:</strong><br><div class="detalle-info">${tarea.orden_trabajo || 'Sin instrucciones'}</div>`;
        if (tarea.nota_interna) html += `<hr><strong>📝 NOTA INTERNA:</strong><br><div class="detalle-info">${tarea.nota_interna}</div>`;
        if (tarea.nota_cliente) html += `<hr><strong>📋 INFORME ENVIADO AL CLIENTE:</strong><br><div class="detalle-info">${tarea.nota_cliente}</div>`;
        document.getElementById('detalleTareaContent').innerHTML = html;
        document.getElementById('modalDetalleTarea').style.display = 'flex';
    }

    async function agregarMaterial() {
    const nombre = document.getElementById('selectMaterial')?.value;
    let cantidad = parseFloat(document.getElementById('materialCantidad')?.value);
    let precioUnitario = parseFloat(document.getElementById('materialPrecio')?.value);
    const unidad = document.getElementById('materialUnidad')?.value || 'unidad';

    if (isNaN(cantidad)) cantidad = 0;
    if (isNaN(precioUnitario)) precioUnitario = 0;

    if (!nombre) { mostrarMensaje("❌ Selecciona un material", 'error'); return; }
    if (cantidad <= 0) { mostrarMensaje("❌ Cantidad válida", 'error'); return; }
    
    // Formatear precio unitario a dos decimales para mostrarlo en la descripción
    const precioFormateado = precioUnitario.toFixed(2);
    const importeTotal = cantidad * precioUnitario;
    const importeSinIva = parseFloat((importeTotal / 1.21).toFixed(2));
    const ivaPorcentaje = 21;
    // Descripción con dos decimales en el precio unitario
    const descripcion = `${nombre}: ${cantidad} ${unidad} (${precioFormateado}€/${unidad})`;

    try {
        const { data: gasto, error } = await sb.from('gastos_tarea').insert({
            tarea_id: tareaActual.id,
            tecnico_id: currentTecnicoId,
            tipo_gasto: 'MATERIALES',
            descripcion: descripcion,
            importe_sin_iva: importeSinIva,
            iva_porcentaje: ivaPorcentaje,
            fecha_gasto: new Date().toISOString().split('T')[0],
            estado: 'PENDIENTE'
        }).select().single();
        
        if (error) throw error;
        
        // Calcular total con IVA y redondear a 2 decimales
        const totalConIva = importeSinIva * (1 + ivaPorcentaje / 100);
        const totalCalculado = parseFloat(totalConIva.toFixed(2));
        
        materialesTemp.push({ 
            id: gasto.id, 
            descripcion: descripcion, 
            importe_total: totalCalculado 
        });
        mostrarMensaje(`✅ Material guardado: ${totalCalculado.toFixed(2)}€`, 'exito');
        
        // Limpiar campos
        document.getElementById('selectMaterial').value = '';
        document.getElementById('materialCantidad').value = '1';
        document.getElementById('materialPrecio').value = '';
        document.getElementById('materialUnidad').value = '';
        renderizarPantallaTrabajo();
        guardarProgresoLocal();
    } catch(e) {
        console.error("Error detallado:", e);
        mostrarMensaje("❌ Error al guardar material: " + (e.message || "ver consola"), 'error');
    }
}

            const { data: empresa } = await sb.from('empresas').select('nombre').eq('id', tareaActual.cliente_id).single();
            const empresaNombre = empresa?.nombre || 'La empresa';
            const mediciones = obtenerMediciones();
            const materialesLista = materialesTemp.map(m => m.descripcion).join(', ');
            const response = await fetch(`${SUPABASE_URL}/functions/v1/generar-informe-cliente`, {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
                body: JSON.stringify({
                    servicio: tareaActual.servicio_tipo || 'OTRO',
                    tipo: tareaActual.tipo,
                    activoNombre: tareaActual.activos?.nombre || '',
                    notasTecnico: document.getElementById('notaInterna')?.value || '',
                    mediciones: mediciones,
                    materiales: materialesLista,
                    empresaNombre: empresaNombre
                })

    // Eventos de seguimiento
    async function registrarEvento(evento, motivo = null) {
        const ahoraLocal = new Date();
        const offset = ahoraLocal.getTimezoneOffset();
        const ahoraLocalISO = new Date(ahoraLocal.getTime() - offset * 60000).toISOString().slice(0, 19);
        try {
            let eventoAnterior = null;
            if (evento === 'LLEGADA') {
                const { data: desplazamiento } = await sb.from('seguimiento_tareas')
                    .select('*')
                    .eq('tarea_id', tareaActual.id)
                    .eq('evento', 'INICIO_DESPLAZAMIENTO')
                    .is('fin', null)
                    .maybeSingle();
                if (desplazamiento) eventoAnterior = desplazamiento;
            } else if (evento === 'FIN_TRABAJO' || evento === 'SUSPENSION') {
                const { data: trabajo } = await sb.from('seguimiento_tareas')
                    .select('*')
                    .eq('tarea_id', tareaActual.id)
                    .eq('evento', 'INICIO_TRABAJO')
                    .is('fin', null)
                    .maybeSingle();
                if (trabajo) eventoAnterior = trabajo;
            }
            if (eventoAnterior && eventoAnterior.inicio) {
                const duracion = Math.max(1, Math.floor((new Date(ahoraLocalISO) - new Date(eventoAnterior.inicio)) / 1000 / 60));
                await sb.from('seguimiento_tareas')
                    .update({ fin: ahoraLocalISO, duracion_minutos: duracion })
                    .eq('id', eventoAnterior.id);
            }
            await sb.from('seguimiento_tareas').insert({
                tarea_id: tareaActual.id,
                evento: evento,
                inicio: ahoraLocalISO,
                duracion_minutos: null,
                motivo: motivo
            });
            if (evento === 'INICIO_DESPLAZAMIENTO') {
                await sb.from('tareas').update({ estado: 'DESPLAZAMIENTO', iniciada_en: ahoraLocalISO }).eq('id', tareaActual.id);
                tareaActual.estado = 'DESPLAZAMIENTO';
                pasoActual = 1;
            } else if (evento === 'LLEGADA') {
                await sb.from('tareas').update({ estado: 'EN_CURSO' }).eq('id', tareaActual.id);
                tareaActual.estado = 'EN_CURSO';
                pasoActual = 2;
            } else if (evento === 'INICIO_TRABAJO') {
                pasoActual = 3;
            } else if (evento === 'FIN_TRABAJO') {
                pasoActual = 4;
            }
            mostrarMensaje(`✅ ${evento} registrado`, 'exito');
            renderizarPantallaTrabajo();
            return true;
        } catch (error) {
            console.error(error);
            mostrarMensaje(`❌ Error al registrar ${evento}`, 'error');
            return false;
        }
    }

    async function iniciarDesplazamiento() { await registrarEvento('INICIO_DESPLAZAMIENTO'); }
    async function registrarLlegada() { await registrarEvento('LLEGADA'); }
    async function iniciarTrabajo() { await registrarEvento('INICIO_TRABAJO'); }

    // Suspender y reanudar (corregidos)
    async function suspenderTarea() {
        if (!tareaActual) return;
        if (!confirm("¿Estás seguro de suspender la tarea? Se guardará el progreso y podrás continuar otro día.")) return;
        const ahoraLocal = new Date();
        const offset = ahoraLocal.getTimezoneOffset();
        const ahoraLocalISO = new Date(ahoraLocal.getTime() - offset * 60000).toISOString().slice(0, 19);
        // Cerrar trabajo activo
        const { data: trabajoActivo } = await sb.from('seguimiento_tareas')
            .select('*')
            .eq('tarea_id', tareaActual.id)
            .eq('evento', 'INICIO_TRABAJO')
            .is('fin', null)
            .maybeSingle();
        if (trabajoActivo) {
            const duracion = Math.max(1, Math.floor((new Date(ahoraLocalISO) - new Date(trabajoActivo.inicio)) / 1000 / 60));
            await sb.from('seguimiento_tareas')
                .update({ fin: ahoraLocalISO, duracion_minutos: duracion })
                .eq('id', trabajoActivo.id);
        }
        // Registrar SUSPENSION
        await sb.from('seguimiento_tareas').insert({
            tarea_id: tareaActual.id,
            evento: 'SUSPENSION',
            inicio: ahoraLocalISO,
            motivo: 'Fin de jornada'
        });
        // Guardar mediciones pendientes
        for (const med of medicionesTemp) {
            await sb.from('mediciones_dinamicas').insert({
                tarea_id: tareaActual.id,
                tecnico_id: currentTecnicoId,
                parametros: med.parametros,
                notas_tecnico: document.getElementById('notaInterna')?.value || '',
                created_at: med.fecha
            });
        }
        medicionesTemp = [];
        // Actualizar estado en BD y local
        await sb.from('tareas').update({ estado: 'SUSPENDIDA' }).eq('id', tareaActual.id);
        tareaActual.estado = 'SUSPENDIDA';
        mostrarMensaje("⏸️ Tarea suspendida. Al reanudar, deberás iniciar un nuevo desplazamiento.", 'exito');
        document.getElementById('trabajoScreen').style.display = 'none';
        await cargarTareas();
        document.querySelector('.nav-item[data-tab="activas"]').click();
    }

    async function reanudarTrabajo() {
    // Verificar que hay una tarea activa
    if (!tareaActual || !tareaActual.id) {
        mostrarMensaje("⚠️ No hay tarea activa. Recargando lista...", 'error');
        await cargarTareas();
        return;
    }

    if (!confirm("Reanudar tarea iniciará un nuevo ciclo de desplazamiento/llegada/trabajo para hoy. ¿Continuar?")) return;

    const ahoraLocal = new Date();
    const offset = ahoraLocal.getTimezoneOffset();
    const ahoraLocalISO = new Date(ahoraLocal.getTime() - offset * 60000).toISOString().slice(0, 19);

    try {
        // 1. Registrar evento REANUDACION
        await sb.from('seguimiento_tareas').insert({
            tarea_id: tareaActual.id,
            evento: 'REANUDACION',
            inicio: ahoraLocalISO,
            motivo: 'Nueva jornada'
        });

        // 2. Cambiar estado en base de datos a ACEPTADA
        const { error: updateError } = await sb.from('tareas').update({ estado: 'ACEPTADA' }).eq('id', tareaActual.id);
        if (updateError) throw updateError;

        // 3. Actualizar la variable local tareaActual (solo cambiar el estado, no recargar todo)
        tareaActual.estado = 'ACEPTADA';
        pasoActual = 0;
        
        // Limpiar mediciones temporales (las del día anterior ya se guardaron al suspender)
        medicionesTemp = [];
        
        // 4. Renderizar la pantalla de trabajo actualizada
        renderizarPantallaTrabajo();
        
        // 5. Guardar progreso local y refrescar lista de tareas
        guardarProgresoLocal();
        await cargarTareas();

        mostrarMensaje("✅ Tarea reanudada. Ahora puedes iniciar el desplazamiento.", 'exito');
    } catch (error) {
        console.error("Error en reanudarTrabajo:", error);
        mostrarMensaje("❌ Error al reanudar: " + error.message, 'error');
    }
}

                mostrarMensaje("❌ Debes generar y guardar el informe del cliente antes de finalizar", 'error');
                return;
            }
            const ahoraLocal = new Date();
            const offset = ahoraLocal.getTimezoneOffset();
            const ahoraLocalISO = new Date(ahoraLocal.getTime() - offset * 60000).toISOString().slice(0, 19);
            const { data: trabajo } = await sb.from('seguimiento_tareas')
                .select('*')
                .eq('tarea_id', tareaActual.id)
                .eq('evento', 'INICIO_TRABAJO')
                .is('fin', null)
                .maybeSingle();
            if (trabajo && trabajo.inicio) {
                const duracion = Math.max(1, Math.floor((new Date(ahoraLocalISO) - new Date(trabajo.inicio)) / 1000 / 60));
                await sb.from('seguimiento_tareas')
                    .update({ fin: ahoraLocalISO, duracion_minutos: duracion })
                    .eq('id', trabajo.id);
            }
            await sb.from('seguimiento_tareas').insert({
                tarea_id: tareaActual.id,
                evento: 'FIN_TRABAJO',
                inicio: ahoraLocalISO,
                duracion_minutos: null
            });
            for (const med of medicionesTemp) {
                await sb.from('mediciones_dinamicas').insert({
                    tarea_id: tareaActual.id,
                    tecnico_id: currentTecnicoId,
                    parametros: med.parametros,
                    notas_tecnico: document.getElementById('notaInterna')?.value || '',
                    created_at: med.fecha
                });
            }
            medicionesTemp = [];
            await sb.from('tareas').update({ estado: 'COMPLETADA', completada_en: ahoraLocalISO }).eq('id', tareaActual.id);
            mostrarMensaje("✅ Trabajo finalizado correctamente", 'exito');
            limpiarProgresoLocal(tareaActual.id);
            document.getElementById('trabajoScreen').style.display = 'none';

            document.querySelector('.nav-item[data-tab="activas"]').click();

            console.error(error);
            mostrarMensaje("❌ Error al finalizar: " + error.message, 'error');
        }
    }

    async function cerrarTarea() {
        await sb.from('tareas').update({ estado: 'COMPLETADA', completada_en: new Date().toISOString() }).eq('id', tareaActual.id);
        mostrarMensaje("🏁 Tarea completada");
        document.getElementById('trabajoScreen').style.display = 'none';
        await cargarTareas();
    }

    // Auto-guardado
    function guardarProgresoLocal() {
        if (!tareaActual) return;
        const progreso = {
            tareaId: tareaActual.id,
            pasoActual: pasoActual,
            mediciones: obtenerMediciones(),
            notaInterna: document.getElementById('notaInterna')?.value || '',
            notaCliente: document.getElementById('notaCliente')?.value || '',
            medicionesTemp: medicionesTemp,
            materialesTemp: materialesTemp,
            timestamp: Date.now()
        };
        localStorage.setItem(`progreso_tarea_${tareaActual.id}`, JSON.stringify(progreso));
        const indicator = document.getElementById('btnAutoSaveIndicator');
        if (indicator) {
            indicator.innerHTML = '💾 Guardado automático';
            setTimeout(() => { if(indicator) indicator.innerHTML = '💾 Guardado'; }, 2000);
        }
    }

    function cargarProgresoLocal(tareaId) {
    const stored = localStorage.getItem(`progreso_tarea_${tareaId}`);
    if (!stored) return false;
    try {
        const progreso = JSON.parse(stored);
        // Solo restaurar si la tarea NO está suspendida (evita sobreescribir pasoActual)
        if (progreso.tareaId === tareaId && (Date.now() - progreso.timestamp) < 86400000 && tareaActual?.estado !== 'SUSPENDIDA') {
            pasoActual = progreso.pasoActual;
            // ... resto de restauración (mediciones, notas, etc.)
            mostrarMensaje("📦 Progreso recuperado automáticamente", 'exito');
            return true;
        } else if (tareaActual?.estado === 'SUSPENDIDA') {
            // Limpiar progreso obsoleto
            localStorage.removeItem(`progreso_tarea_${tareaId}`);
        }
    } catch(e) { console.error(e); }
    return false;
}

    function limpiarProgresoLocal(tareaId) { localStorage.removeItem(`progreso_tarea_${tareaId}`); }

    // Adjuntos
    async function subirAdjunto(file) {
        if (!tareaActual) return null;
        const fileExt = file.name.split('.').pop();
        const fileName = `${Date.now()}_${Math.random().toString(36).substring(2)}.${fileExt}`;
        const filePath = `${currentTecnicoId}/${tareaActual.id}/${fileName}`;
        const { error } = await sb.storage.from('tarea-adjuntos').upload(filePath, file);
        if (error) { mostrarMensaje("Error al subir archivo: " + error.message, 'error'); return null; }
        const { data: urlData } = sb.storage.from('tarea-adjuntos').getPublicUrl(filePath);
        const adjunto = {
            tarea_id: tareaActual.id,
            tecnico_id: currentTecnicoId,
            nombre_archivo: file.name,
            tipo_archivo: file.type,
            url: urlData.publicUrl,
            tamano_bytes: file.size,
            subido_en: new Date().toISOString(),
            es_justificante: true
        };
        await sb.from('adjuntos_tarea').insert(adjunto);
        return adjunto;
    }

    async function mostrarAdjuntos() {
        if (!tareaActual) return;
        const { data } = await sb.from('adjuntos_tarea').select('*').eq('tarea_id', tareaActual.id);
        const container = document.getElementById('adjuntosContainer');
        if (!container) return;
        if (!data || data.length === 0) { container.innerHTML = '<div class="adjunto-item">No hay adjuntos</div>'; return; }
        container.innerHTML = data.map(a => `<div class="adjunto-item"><a href="${a.url}" target="_blank">📎 ${a.nombre_archivo}</a> <small>${(a.tamano_bytes/1024).toFixed(1)}KB</small></div>`).join('');
    }

    async function mostrarHistoricoDias() {
        if (!tareaActual) return;
        const { data: seguimiento } = await sb.from('seguimiento_tareas').select('*').eq('tarea_id', tareaActual.id).order('inicio', { ascending: true });
        const { data: mediciones } = await sb.from('mediciones_dinamicas').select('*').eq('tarea_id', tareaActual.id).order('created_at', { ascending: true });
        let eventosPorDia = new Map();
        for (let ev of seguimiento) {
            const fechaStr = ev.inicio ? ev.inicio.split('T')[0] : 'Sin fecha';
            if (!eventosPorDia.has(fechaStr)) eventosPorDia.set(fechaStr, []);
            eventosPorDia.get(fechaStr).push(ev);
        }
        const container = document.getElementById('historicoContainer');
        if (!container) return;
        if (eventosPorDia.size === 0) {
            container.innerHTML = '<summary>📜 Historial de días anteriores</summary><div>No hay jornadas previas</div>';
            return;
        }
        let html = '<summary>📜 Historial de días anteriores (click para ver)</summary>';
        for (let [fecha, eventos] of eventosPorDia) {
            html += `<div style="margin-top:8px;"><strong>📅 ${fecha}</strong><br>`;
            for (let ev of eventos) {
                let eventoTexto = '';
                switch(ev.evento) {
                    case 'INICIO_DESPLAZAMIENTO': eventoTexto = '🚗 Inicio desplazamiento'; break;
                    case 'LLEGADA': eventoTexto = '📍 Llegada'; break;
                    case 'INICIO_TRABAJO': eventoTexto = '⚙️ Inicio trabajo'; break;
                    case 'SUSPENSION': eventoTexto = '⏸️ Suspensión'; break;
                    case 'REANUDACION': eventoTexto = '▶️ Reanudación'; break;
                    case 'FIN_TRABAJO': eventoTexto = '🏁 Fin trabajo'; break;
                    default: eventoTexto = ev.evento;
                }
                html += `<div style="font-size:0.7rem; margin-left:12px;">${eventoTexto} - ${ev.inicio ? new Date(ev.inicio).toLocaleTimeString() : ''}</div>`;
            }
            let medicionesDia = mediciones.filter(m => m.created_at && m.created_at.split('T')[0] === fecha);
            if (medicionesDia.length > 0) html += `<div style="margin-left:12px; font-size:0.7rem; color:#475569;">🔬 Mediciones: ${medicionesDia.length} registro(s)</div>`;
            html += `</div>`;
        }
        container.innerHTML = html;
    }

    // Abrir tarea (modificado para que suspendida vaya a paso 0)
    async function abrirTarea(id) {
    const { data: tarea } = await sb.from('tareas').select('*, activos(*), empresas!cliente_id(*)').eq('id', id).single();
    if (!tarea) return;
    tareaActual = tarea;
    servicioActual = tarea.servicio_tipo || 'OTRO';
    
    if (tarea.estado === 'PENDIENTE' && !tarea.leida) {
        document.getElementById('modalOrdenTrabajo').innerHTML = tareaActual.orden_trabajo || '';
        mostrarModalAceptar();
        return;
    }
    
    // Determinar paso según estado
    if (tarea.estado === 'ACEPTADA') pasoActual = 0;
    else if (tarea.estado === 'DESPLAZAMIENTO') pasoActual = 1;
    else if (tarea.estado === 'EN_CURSO') pasoActual = 3;
    else if (tarea.estado === 'SUSPENDIDA') pasoActual = 0;
    else pasoActual = 0;
    
    const { data: gastos } = await sb.from('gastos_tarea').select('*').eq('tarea_id', id).eq('tipo_gasto', 'MATERIALES');
    materialesTemp = gastos || [];
    medicionesTemp = [];
    
    document.getElementById('trabajoTitulo').innerHTML = tarea.activos?.nombre || 'Tarea';
    document.getElementById('trabajoScreen').style.display = 'block';
    renderizarPantallaTrabajo();  // Aquí se crean los elementos
    
    // Restaurar progreso local solo si no está suspendida y después de renderizar
    if (tarea.estado !== 'SUSPENDIDA') {
        cargarProgresoLocal(id);
    } else {
        limpiarProgresoLocal(id);
    }
    
    mostrarHistoricoDias();
    mostrarAdjuntos();
    
    if (autoSaveInterval) clearInterval(autoSaveInterval);
    autoSaveInterval = setInterval(() => guardarProgresoLocal(), 30000);
}

    // Pantalla de trabajo (con los botones correctos)
    function renderizarPantallaTrabajo() {
        const content = document.getElementById('trabajoContent');
        let html = `<div class="stepper">
            <div class="step ${pasoActual >= 0 ? 'completed' : ''} ${pasoActual === 0 ? 'active' : ''}"><span class="step-icon">✅</span><span>Aceptada</span></div>
            <div class="step ${pasoActual >= 1 ? 'completed' : ''} ${pasoActual === 1 ? 'active' : ''}"><span class="step-icon">🚗</span><span>Desplaz.</span></div>
            <div class="step ${pasoActual >= 2 ? 'completed' : ''} ${pasoActual === 2 ? 'active' : ''}"><span class="step-icon">📍</span><span>Llegada</span></div>
            <div class="step ${pasoActual >= 3 ? 'completed' : ''} ${pasoActual === 3 ? 'active' : ''}"><span class="step-icon">⚙️</span><span>Trabajo</span></div>
            <div class="step ${pasoActual >= 4 ? 'completed' : ''} ${pasoActual === 4 ? 'active' : ''}"><span class="step-icon">📝</span><span>Registros</span></div>
            <div class="step ${pasoActual >= 5 ? 'completed' : ''} ${pasoActual === 5 ? 'active' : ''}"><span class="step-icon">🏁</span><span>Cierre</span></div>
        </div>`;
        html += `<div class="form-group"><label>📋 ORDEN DE TRABAJO</label><button class="btn-orden-trabajo" onclick="verOrdenTrabajo()">📄 Ver orden de trabajo</button></div>`;
        html += `<details class="historico-dias" id="historicoContainer" open><summary>📜 Historial de días anteriores</summary>Cargando...</details>`;

        if (pasoActual === 0) {
            if (tareaActual.estado === 'PENDIENTE') {
                html += `<button class="action-btn" onclick="mostrarModalAceptar()">✅ ACEPTAR TAREA</button>`;
                html += `<button class="action-btn action-btn-danger" onclick="mostrarCancelarModal()">❌ CANCELAR TAREA</button>`;
            } else if (tareaActual.estado === 'ACEPTADA') {
                html += `<button class="action-btn" onclick="iniciarDesplazamiento()">🚗 INICIAR DESPLAZAMIENTO</button>`;
                html += `<button class="action-btn action-btn-danger" onclick="mostrarCancelarModal()">❌ CANCELAR TAREA</button>`;
            } else if (tareaActual.estado === 'SUSPENDIDA') {
                html += `<button class="action-btn" onclick="reanudarTrabajo()">▶️ REANUDAR TRABAJO (nuevo día)</button>`;
            }
        } else if (pasoActual === 1) {
            if (!tareaActual.iniciada_en) {
                html += `<button class="action-btn" onclick="iniciarDesplazamiento()">🚗 INICIAR DESPLAZAMIENTO</button>`;
            } else {
                html += `<button class="action-btn" onclick="registrarLlegada()">📍 REGISTRAR LLEGADA</button>`;
            }
        } else if (pasoActual === 2) {
            html += `<button class="action-btn" onclick="iniciarTrabajo()">▶️ INICIAR TRABAJO</button>`;
        } else if (pasoActual === 3) {
            html += renderizarMediciones();
            html += `<div class="button-group-right"><button class="btn-add-material" onclick="registrarMedicionTemp()">➕ Registrar medición</button></div>`;
            if (medicionesTemp.length > 0) {
                html += `<div class="mediciones-list"><label>📊 Mediciones registradas hoy:</label>`;
                medicionesTemp.forEach((med, idx) => {
                    let texto = `${new Date(med.fecha).toLocaleTimeString()} → `;
                    const params = med.parametros;
                    if (params.cloro) texto += `Cloro: ${params.cloro} ppm, `;
                    if (params.ph) texto += `pH: ${params.ph}, `;
                    if (params.temperatura) texto += `Temp: ${params.temperatura}°C, `;
                    if (params.altura) texto += `Altura: ${params.altura} cm, `;
                    if (params.estado) texto += `Estado: ${params.estado}, `;
                    if (params.observaciones) texto += `Obs: ${params.observaciones}`;
                    texto = texto.replace(/,\s*$/, '');
                    html += `<div class="medicion-listado-item"><span class="medicion-listado-info">${texto}</span><button class="btn-eliminar-medicion-listado" onclick="eliminarMedicionTemp(${idx})">✖</button></div>`;
                });
                html += `</div>`;
            }
            html += `<div class="form-group"><label>🧰 MATERIALES USADOS</label>
                <div class="material-row">
                    <select id="selectMaterial" class="material-select">
                        <option value="">-- Seleccionar material --</option>
                        ${materialesPorServicio[servicioActual].map(m => `<option value="${m.nombre}" data-unidad="${m.unidad}" data-precio="${m.precio_por_unidad}">${m.nombre} (${m.precio_por_unidad}€/${m.unidad})</option>`).join('')}
                    </select>
                    <input type="number" id="materialCantidad" class="material-cantidad" placeholder="Cantidad" step="0.01" value="1">
                    <input type="number" id="materialPrecio" class="material-precio" placeholder="Precio unitario (€)" step="0.01" readonly>
                    <input type="text" id="materialUnidad" class="material-unidad" placeholder="Unidad" readonly>
                    <button class="btn-add-material" onclick="agregarMaterial()">➕ Añadir</button>
                </div>
                <div id="listadoMateriales">${materialesTemp.map((m, idx) => `<div class="material-listado-item"><span class="material-listado-info">${m.descripcion} - ${m.importe_total}€</span><button class="btn-eliminar-material-listado" onclick="eliminarMaterialListado(${idx})">✖</button></div>`).join('')}</div>
            </div>`;
            html += `<div class="form-group"><label>📝 NOTA INTERNA</label>
                <textarea id="notaInterna" rows="2" placeholder="Escribe aquí tus notas...">${tareaActual.nota_interna || ''}</textarea>
                <div class="button-group-right">
                    <button class="btn-ia" onclick="guardarNotaInterna()">💾 Guardar</button>
                    <button class="btn-ia" onclick="mejorarNotaInternaIA(document.getElementById('notaInterna').value)">🤖 IA</button>
                </div>
            </div>`;
            html += `<div class="form-group nota-obligatoria"><label>📝 INFORME PARA CLIENTE</label>
                <textarea id="notaCliente" rows="3" placeholder="El informe se generará automáticamente...">${tareaActual.nota_cliente || ''}</textarea>
                <div class="button-group-right">
                    <button class="btn-ia" onclick="guardarNotaCliente()">💾 Guardar</button>
                    <button class="btn-ia" onclick="mostrarModalInformeCliente()">🤖 Generar informe</button>
                </div>
                <small>⚠️ Debes generar y guardar el informe antes de finalizar la tarea</small>
            </div>`;
            html += `<div class="form-group"><label>📎 ADJUNTAR FOTOS / JUSTIFICANTES</label>
                <div class="upload-area" id="uploadArea">📸 Haz clic o arrastra para subir foto</div>
                <input type="file" id="fileInput" accept="image/*,application/pdf" style="display:none;" multiple>
                <div id="adjuntosContainer" class="adjuntos-list"></div>
            </div>`;
            if (isExterno) html += `<button class="action-btn" onclick="mostrarModalAlbaran()" style="background:#6b21a5;">💰 REGISTRAR ALBARÁN</button>`;
            html += `<button class="action-btn action-btn-secondary" onclick="suspenderTarea()">⏸️ SUSPENDER TAREA</button>`;
            const notaClienteActual = document.getElementById('notaCliente')?.value || tareaActual.nota_cliente || '';
            const disabled = !notaClienteActual.trim() ? 'disabled' : '';
            html += `<button class="action-btn" onclick="finalizarTrabajo()" ${disabled}>🏁 FINALIZAR TRABAJO</button>`;
        } else if (pasoActual === 4) {
            html += renderizarMediciones(true);
            html += `<div class="form-group"><label>🧰 MATERIALES USADOS</label>${materialesTemp.map(m => `<div class="material-listado-item"><span class="material-listado-info">${m.descripcion} - ${m.importe_total}€</span></div>`).join('')}</div>`;
            html += `<div class="form-group"><label>📝 NOTA INTERNA</label><textarea readonly rows="2">${document.getElementById('notaInterna')?.value || ''}</textarea></div>`;
            html += `<div class="form-group"><label>📝 INFORME PARA CLIENTE</label><textarea readonly rows="3">${document.getElementById('notaCliente')?.value || ''}</textarea></div>`;
            html += `<button class="action-btn" onclick="cerrarTarea()">🏁 CERRAR TAREA</button>`;
        }
        document.getElementById('trabajoContent').innerHTML = html;
        const selectMaterial = document.getElementById('selectMaterial');
        if (selectMaterial) {
            selectMaterial.addEventListener('change', function() {
                const selected = this.options[this.selectedIndex];
                const unidad = selected?.dataset?.unidad || '';
                const precio = selected?.dataset?.precio || '';
                document.getElementById('materialUnidad').value = unidad;
                document.getElementById('materialPrecio').value = precio;
            });
        }
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        if (uploadArea && fileInput) {
            uploadArea.onclick = () => fileInput.click();
            fileInput.onchange = async (e) => {
                const files = Array.from(e.target.files);
                for (let file of files) await subirAdjunto(file);
                mostrarAdjuntos();
                fileInput.value = '';
            };
            uploadArea.ondragover = (e) => e.preventDefault();
            uploadArea.ondrop = async (e) => {
                e.preventDefault();
                const files = Array.from(e.dataTransfer.files);
                for (let file of files) await subirAdjunto(file);
                mostrarAdjuntos();
            };
        }
        mostrarAdjuntos();
        mostrarHistoricoDias();
    }

    function verOrdenTrabajo() {
        if (tareaActual && tareaActual.orden_trabajo) {
            document.getElementById('ordenTrabajoContent').innerHTML = tareaActual.orden_trabajo;
            document.getElementById('modalVerOrden').style.display = 'flex';
        } else mostrarMensaje("No hay orden de trabajo disponible", 'error');
    }

    function mostrarModalAceptar() {
        const modal = document.getElementById('modalAceptarTarea');
        document.getElementById('modalFechaPropuesta').value = new Date().toISOString().split('T')[0];
        document.getElementById('modalHoraPropuesta').value = '10:00';
        document.getElementById('modalOrdenTrabajo').innerHTML = tareaActual.orden_trabajo || '';
        modal.style.display = 'flex';
        const confirmar = document.getElementById('btnConfirmarAceptar');
        const cancelar = document.getElementById('btnCancelarAceptar');
        const handlerConfirmar = async () => {
            const fecha = document.getElementById('modalFechaPropuesta').value;
            const hora = document.getElementById('modalHoraPropuesta').value;
            if (!fecha || !hora) { mostrarMensaje("❌ Completa fecha y hora", 'error'); return; }
            const { error } = await sb.from('tareas').update({ estado: 'ACEPTADA', fecha_propuesta: fecha, hora_propuesta: hora + ':00', leida: true }).eq('id', tareaActual.id);
            if (error) { mostrarMensaje("Error: " + error.message, 'error'); return; }
            tareaActual.estado = 'ACEPTADA';
            tareaActual.fecha_propuesta = fecha;
            tareaActual.hora_propuesta = hora;
            mostrarMensaje(`✅ Tarea aceptada. Previsión: ${fecha} a las ${hora}`);
            modal.style.display = 'none';
            document.getElementById('trabajoScreen').style.display = 'block';
            pasoActual = 0;
            renderizarPantallaTrabajo();
            await cargarTareas();
            confirmar.removeEventListener('click', handlerConfirmar);
            cancelar.removeEventListener('click', handlerCancelar);
        };
        const handlerCancelar = () => {
            modal.style.display = 'none';
            confirmar.removeEventListener('click', handlerConfirmar);
            cancelar.removeEventListener('click', handlerCancelar);
        };
        confirmar.addEventListener('click', handlerConfirmar);
        cancelar.addEventListener('click', handlerCancelar);
    }

    function mostrarCancelarModal() { const motivo = prompt("Motivo de cancelación:", "No tengo disponibilidad"); if (motivo) cancelarTarea(motivo); }
    async function cancelarTarea(motivo) { await sb.from('tareas').update({ estado: 'CANCELADA', motivo_cancelacion: motivo }).eq('id', tareaActual.id); mostrarMensaje("❌ Tarea cancelada"); document.getElementById('trabajoScreen').style.display = 'none'; await cargarTareas(); }
    function cerrarSesion() { if(autoSaveInterval) clearInterval(autoSaveInterval); sb.auth.signOut(); location.reload(); }

    // Albarán
    function calcularTotalMateriales() { return materialesTemp.reduce((sum, m) => sum + (m.importe_total || 0), 0); }
    function actualizarTotalAlbaran() {
        const horas = parseFloat(document.getElementById('albaranHoras')?.value) || 0;
        const precioHora = parseFloat(document.getElementById('albaranPrecioHora')?.value) || 0;
        const materiales = calcularTotalMateriales();
        const dietas = parseFloat(document.getElementById('albaranDietas')?.value) || 0;
        const total = (horas * precioHora) + materiales + dietas;
        document.getElementById('albaranMateriales').value = materiales.toFixed(2);
        document.getElementById('albaranTotal').value = total.toFixed(2) + ' €';
    }
    function mostrarModalAlbaran() {
        actualizarTotalAlbaran();
        document.getElementById('modalAlbaran').style.display = 'flex';
        ['albaranHoras', 'albaranPrecioHora', 'albaranDietas'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.addEventListener('input', actualizarTotalAlbaran);
        });
    }
    async function guardarAlbaran() {
        const horas = parseFloat(document.getElementById('albaranHoras')?.value) || 0;
        const precioHora = parseFloat(document.getElementById('albaranPrecioHora')?.value) || 0;
        const materiales = calcularTotalMateriales();
        const dietas = parseFloat(document.getElementById('albaranDietas')?.value) || 0;
        const total = (horas * precioHora) + materiales + dietas;
        try {
            const { error } = await sb.from('facturas_externas').insert({
                tarea_id: tareaActual.id,
                tecnico_id: currentTecnicoId,
                horas_trabajadas: horas,
                precio_hora: precioHora,
                total_materiales: materiales,
                total_dietas: dietas,
                total_general: total,
                pagada: false
            });
            if (error) throw error;
            mostrarMensaje("✅ Albarán guardado correctamente", 'exito');
            document.getElementById('modalAlbaran').style.display = 'none';
        } catch (error) { mostrarMensaje("❌ Error al guardar albarán", 'error'); }
    }

    // Eventos y listeners
    document.getElementById('btnAceptarInforme').onclick = () => { if (pendingInformeCallback) pendingInformeCallback(true); };
    document.getElementById('btnRegenerarInforme').onclick = () => { generarInformeCliente().then(informe => { if (informe) document.getElementById('informePreview').innerText = informe; }); };
    document.getElementById('btnCancelarInforme').onclick = () => { if (pendingInformeCallback) pendingInformeCallback(false); else document.getElementById('modalInformeCliente').style.display = 'none'; };
    document.getElementById('btnAceptarAlbaran').onclick = guardarAlbaran;
    document.getElementById('btnCancelarAlbaran').onclick = () => document.getElementById('modalAlbaran').style.display = 'none';
    document.getElementById('btnCerrarDetalle').onclick = () => document.getElementById('modalDetalleTarea').style.display = 'none';
    document.getElementById('btnCerrarOrden').onclick = () => document.getElementById('modalVerOrden').style.display = 'none';

    document.querySelectorAll('.nav-item').forEach(btn => { btn.onclick = () => { document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active')); btn.classList.add('active'); renderizarPanel(); }; });
    document.getElementById('btnBackTrabajo').onclick = async () => {
        if (autoSaveInterval) clearInterval(autoSaveInterval);
        guardarProgresoLocal();
        if (tareaActual && (tareaActual.estado === 'ACEPTADA' || tareaActual.estado === 'DESPLAZAMIENTO' || tareaActual.estado === 'EN_CURSO' || tareaActual.estado === 'SUSPENDIDA')) {
            document.getElementById('trabajoScreen').style.display = 'none';
            await cargarTareas();
            document.querySelector('.nav-item[data-tab="activas"]').click();
        } else {
            document.getElementById('trabajoScreen').style.display = 'none';
            await cargarTareas();
            renderizarPanel();
        }
    };
    document.getElementById('btnLogin').onclick = async () => { if (await hacerLogin()) { document.getElementById('loginPanel').style.display = 'none'; document.getElementById('dashboardPanel').style.display = 'block'; await cargarTareas(); } };
    document.getElementById('btnLogout').onclick = cerrarSesion;
    document.getElementById('btnRefrescar').onclick = async () => { mostrarMensaje("🔄 Refrescando...", 'exito'); await cargarTareas(); renderizarPanel(); };

    // Exponer funciones globales
    window.abrirTarea = abrirTarea; window.mostrarModalAceptar = mostrarModalAceptar;
    window.iniciarDesplazamiento = iniciarDesplazamiento; window.registrarLlegada = registrarLlegada;
    window.iniciarTrabajo = iniciarTrabajo;
    window.agregarMaterial = agregarMaterial; window.eliminarMaterialListado = eliminarMaterialListado;
    window.cerrarTarea = cerrarTarea; window.mostrarCancelarModal = mostrarCancelarModal;
    window.cerrarSesion = cerrarSesion; window.mejorarNotaInternaIA = mejorarNotaInternaIA;
    window.mostrarModalInformeCliente = mostrarModalInformeCliente; window.mostrarModalAlbaran = mostrarModalAlbaran;
    window.verDetalleCompletada = verDetalleCompletada; window.verOrdenTrabajo = verOrdenTrabajo;
    window.guardarNotaInterna = guardarNotaInterna; window.guardarNotaCliente = guardarNotaCliente;
    window.finalizarTrabajo = finalizarTrabajo; window.suspenderTarea = suspenderTarea; window.reanudarTrabajo = reanudarTrabajo;
    window.registrarMedicionTemp = registrarMedicionTemp; window.eliminarMedicionTemp = eliminarMedicionTemp;
    window.generarSugerencias = generarSugerencias; window.aplicarSugerencia = aplicarSugerencia;
    window.aplicarFiltrosCompletadas = aplicarFiltrosCompletadas; window.limpiarFiltrosCompletadas = limpiarFiltrosCompletadas;
</script>
</body>
</html>
