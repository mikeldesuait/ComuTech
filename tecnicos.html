        .tipo-mantenimiento { background: #16a34a; color: white; }
        .tipo-revision { background: #2563eb; color: white; }
        .tipo-presupuesto { background: #d97706; color: white; }

        .action-btn {

            border-radius: 50px;

        .tiempo-titulo { font-weight: 600; color: #1e4663; }
        .dia-group { background: #f8fafc; border-radius: 12px; margin-bottom: 16px; padding: 12px; border-left: 4px solid #2c7a4d; }

</head>
<body>

<!-- LOGIN -->
<div id="loginPanel" class="container">
    <div class="card-tarea" style="text-align: center; margin-top: 50px;">
        <h2>🔧 Panel del Técnico</h2>
        <p style="margin: 16px 0;">Acceso para técnicos</p>
        <form id="loginForm" onsubmit="return false;">
            <input type="text" id="identificador" placeholder="Email o Nick" autocomplete="username" style="margin-bottom: 12px;">
            <input type="password" id="password" placeholder="Contraseña" autocomplete="current-password" style="margin-bottom: 12px;">
            <button type="button" id="btnLogin" class="action-btn">Iniciar sesión</button>
            <div id="errorMsg" style="color:red; margin-top:12px;"></div>
        </form>
    </div>
</div>

<!-- PANEL PRINCIPAL TÉCNICO -->
<div id="dashboardPanel" style="display: none;">
    <div class="header">
        <h1 id="nombreEmpresaBanner">Cargando...</h1>
        <div class="header-tecnico">
            <span>👨‍🔧 <span id="nombreTecnico">Cargando...</span></span>
            <span>📧 <span id="emailTecnico"></span></span>
            <div style="display: flex; gap: 8px;">
                <button id="btnRefrescar" class="btn-logout">🔄</button>
                <button id="btnLogout" class="btn-logout">🚪 Salir</button>
            </div>
        </div>
        <div class="contadores">
            <div class="contador-item"><span class="contador-numero" id="contNuevas">0</span><span class="contador-label">Nuevas</span></div>
            <div class="contador-item"><span class="contador-numero" id="contActivas">0</span><span class="contador-label">Activas</span></div>
            <div class="contador-item"><span class="contador-numero" id="contCompletadas">0</span><span class="contador-label">Completadas</span></div>
        </div>
    </div>
    <div id="contenidoPanel"></div>
    <div class="bottom-nav">
        <button class="nav-item active" data-tab="nuevas"><span>📋</span><span>Nuevas</span></button>
        <button class="nav-item" data-tab="activas"><span>▶️</span><span>Activas</span></button>
        <button class="nav-item" data-tab="completadas"><span>🏁</span><span>Completadas</span></button>
        <button class="nav-item" data-tab="perfil"><span>👤</span><span>Perfil</span></button>
    </div>
</div>

<!-- PANTALLA DE DETALLE/TRABAJO -->
<div id="trabajoScreen" class="screen">

        <button class="btn-back" id="btnBackTrabajo">←</button>
        <span style="font-weight: 600; flex:1;" id="trabajoTitulo">Cargando...</span>
        <button id="btnAutoSaveIndicator" class="btn-logout" style="background:#e2e8f0; color:#475569;">💾 Guardado</button>
    </div>
    <div class="screen-content" id="trabajoContent"></div>
</div>

<!-- MODAL ACEPTAR TAREA CON ORDEN DE TRABAJO -->
<div id="modalAceptarTarea" class="modal-overlay">

        <h3>✅ Aceptar tarea</h3>
        <div class="form-group">
            <label>📋 ORDEN DE TRABAJO</label>
            <div class="detalle-info" id="modalOrdenTrabajo" style="max-height: 200px; overflow-y: auto; white-space: pre-wrap;"></div>
        </div>
        <div class="form-group"><label>📅 Fecha propuesta</label><input type="date" id="modalFechaPropuesta"></div>
        <div class="form-group"><label>⏰ Hora propuesta</label><input type="time" id="modalHoraPropuesta"></div>
        <div class="modal-buttons">
            <button id="btnConfirmarAceptar" class="btn-aceptar">✅ Aceptar</button>
            <button id="btnCancelarAceptar" class="btn-cancelar">❌ Cancelar</button>
        </div>
    </div>
</div>

<!-- MODAL PREVISUALIZACIÓN INFORME CLIENTE -->
<div id="modalInformeCliente" class="modal-overlay">
    <div class="modal-content">
        <h3>📋 Informe para el cliente</h3>
        <div class="detalle-info" id="informePreview"></div>
        <div class="modal-buttons">
            <button id="btnAceptarInforme" class="btn-aceptar">✅ Aceptar</button>
            <button id="btnRegenerarInforme" class="btn-regenerar">🔄 Generar otro</button>
            <button id="btnCancelarInforme" class="btn-cancelar">✖ Cancelar</button>
        </div>
    </div>
</div>

<!-- MODAL ALBARÁN PARA TÉCNICO EXTERNO -->
<div id="modalAlbaran" class="modal-overlay">
    <div class="modal-content">
        <h3>💰 ALBARÁN DE SERVICIO</h3>
        <div class="form-group"><label>⏱️ Horas trabajadas</label><input type="number" id="albaranHoras" step="0.5" placeholder="0" value="0"></div>
        <div class="form-group"><label>💰 Precio por hora (€)</label><input type="number" id="albaranPrecioHora" step="0.01" placeholder="0.00" value="0"></div>
        <div class="form-group"><label>🧰 Materiales (€)</label><input type="number" id="albaranMateriales" step="0.01" placeholder="0.00" readonly></div>
        <div class="form-group"><label>🚗 Dietas / desplazamiento (€)</label><input type="number" id="albaranDietas" step="0.01" placeholder="0.00" value="0"></div>
        <div class="form-group"><label><strong>💰 TOTAL (€)</strong></label><input type="text" id="albaranTotal" readonly style="font-weight: bold; font-size: 1.1rem;"></div>
        <div class="modal-buttons">
            <button id="btnAceptarAlbaran" class="btn-aceptar">✅ Guardar albarán</button>
            <button id="btnCancelarAlbaran" class="btn-cancelar">✖ Cancelar</button>
        </div>
    </div>
</div>

<!-- MODAL DETALLE TAREA COMPLETADA -->
<div id="modalDetalleTarea" class="modal-overlay">
    <div class="modal-content">
        <h3>📋 Detalle completo de la tarea</h3>
        <div id="detalleTareaContent" class="detalle-info"></div>
        <div class="modal-buttons">
            <button id="btnCerrarDetalle" class="btn-cancelar">✖ Cerrar</button>
        </div>
    </div>
</div>

<!-- MODAL VER ORDEN DE TRABAJO -->
<div id="modalVerOrden" class="modal-overlay">
    <div class="modal-content">
        <h3>📋 ORDEN DE TRABAJO</h3>
        <div class="detalle-info" id="ordenTrabajoContent" style="white-space: pre-wrap;"></div>
        <div class="modal-buttons">
            <button id="btnCerrarOrden" class="btn-cancelar">✖ Cerrar</button>
        </div>
    </div>
</div>

    function mostrarMensaje(texto, tipo = 'exito') {
        const msg = document.createElement('div');
        msg.className = 'mensaje';
        msg.style.background = tipo === 'exito' ? '#2c7a4d' : '#dc2626';
        msg.innerHTML = texto;
        document.body.appendChild(msg);
        setTimeout(() => msg.remove(), 3000);
    }

    function formatearFecha(fecha) {
        if (!fecha) return 'Sin fecha';
        const partes = fecha.split('-');
        return `${partes[2]}/${partes[1]}/${partes[0]}`;
    }

    function formatearDuracion(minutos) {
        if (!minutos && minutos !== 0) return 'No registrado';
        if (minutos === 0) return '0min';
        const horas = Math.floor(minutos / 60);
        const mins = minutos % 60;
        if (horas > 0 && mins > 0) return `${horas}h ${mins}min`;
        if (horas > 0) return `${horas}h`;
        return `${mins}min`;
    }

    function getPrioridadClass(tipo) {
        const prioridades = { 'URGENCIA': 'prioridad-urgente', 'AVERIA': 'prioridad-averia', 'MANTENIMIENTO': 'prioridad-mantenimiento', 'REVISION': 'prioridad-revision', 'PRESUPUESTO': 'prioridad-presupuesto' };
        return prioridades[tipo] || 'prioridad-mantenimiento';
    }

    function getTipoIcono(tipo) {
        const iconos = { 'URGENCIA': '🔴', 'AVERIA': '🟠', 'MANTENIMIENTO': '🟢', 'REVISION': '🔵', 'PRESUPUESTO': '🟡' };
        return iconos[tipo] || '📋';
    }

    function getTipoClass(tipo) { 
        const tipos = { 'URGENCIA': 'tipo-urgente', 'AVERIA': 'tipo-averia', 'MANTENIMIENTO': 'tipo-mantenimiento', 'REVISION': 'tipo-revision', 'PRESUPUESTO': 'tipo-presupuesto' }; 
        return tipos[tipo] || 'tipo-mantenimiento'; 
    }
    
    function getEstadoClass(estado) { 
        const estados = { 
            'PENDIENTE': 'estado-pendiente', 
            'ACEPTADA': 'estado-aceptada', 
            'EN_CURSO': 'estado-curso', 
            'SUSPENDIDA': 'estado-suspendida', 
            'COMPLETADA': 'estado-completada', 
            'CANCELADA': 'estado-cancelada' 
        }; 
        return estados[estado] || 'estado-pendiente'; 
    }
    
    function getEstadoTexto(estado) { 
        const textos = { 
            'PENDIENTE': 'Pendiente', 
            'ACEPTADA': 'Aceptada', 
            'EN_CURSO': 'En curso', 
            'SUSPENDIDA': 'Suspendida', 
            'COMPLETADA': 'Completada', 
            'CANCELADA': 'Cancelada' 
        }; 
        return textos[estado] || estado; 
    }

    // Auto-guardado en localStorage
    function guardarProgresoLocal() {
        if (!tareaActual) return;
        const progreso = {
            tareaId: tareaActual.id,
            pasoActual: pasoActual,
            mediciones: obtenerMediciones(),
            notaInterna: document.getElementById('notaInterna')?.value || '',
            notaCliente: document.getElementById('notaCliente')?.value || '',
            materiales: materialesTemp,
            timestamp: Date.now()
        };
        localStorage.setItem(`progreso_tarea_${tareaActual.id}`, JSON.stringify(progreso));
        const indicator = document.getElementById('btnAutoSaveIndicator');
        if (indicator) {
            indicator.innerHTML = '💾 Guardado automático';
            setTimeout(() => { if(indicator) indicator.innerHTML = '💾 Guardado'; }, 2000);
        }
    }

    function cargarProgresoLocal(tareaId) {
        const stored = localStorage.getItem(`progreso_tarea_${tareaId}`);
        if (!stored) return false;
        try {
            const progreso = JSON.parse(stored);
            // Solo restaurar si es de la misma tarea y no ha pasado más de 24h
            if (progreso.tareaId === tareaId && (Date.now() - progreso.timestamp) < 86400000) {
                pasoActual = progreso.pasoActual;
                if (progreso.mediciones) {
                    if (progreso.mediciones.cloro) document.getElementById('medCloro').value = progreso.mediciones.cloro;
                    if (progreso.mediciones.ph) document.getElementById('medPh').value = progreso.mediciones.ph;
                    if (progreso.mediciones.temperatura) document.getElementById('medTemp').value = progreso.mediciones.temperatura;
                    if (progreso.mediciones.altura) document.getElementById('medAltura').value = progreso.mediciones.altura;
                    if (progreso.mediciones.estado) document.getElementById('medEstado').value = progreso.mediciones.estado;
                    if (progreso.mediciones.observaciones) document.getElementById('medObservaciones').value = progreso.mediciones.observaciones;
                }
                if (progreso.notaInterna) document.getElementById('notaInterna').value = progreso.notaInterna;
                if (progreso.notaCliente) document.getElementById('notaCliente').value = progreso.notaCliente;
                if (progreso.materiales) materialesTemp = progreso.materiales;
                mostrarMensaje("📦 Progreso recuperado automáticamente", 'exito');
                return true;
            }
        } catch(e) { console.error(e); }
        return false;
    }

    function limpiarProgresoLocal(tareaId) {
        localStorage.removeItem(`progreso_tarea_${tareaId}`);
    }

    // Subida de fotos
    async function subirAdjunto(file) {
        if (!tareaActual) return null;
        const fileExt = file.name.split('.').pop();
        const fileName = `${Date.now()}_${Math.random().toString(36).substring(2)}.${fileExt}`;
        const filePath = `${currentTecnicoId}/${tareaActual.id}/${fileName}`;
        const { error } = await sb.storage.from('tarea-adjuntos').upload(filePath, file);
        if (error) {
            mostrarMensaje("Error al subir archivo: " + error.message, 'error');
            return null;
        }
        const { data: urlData } = sb.storage.from('tarea-adjuntos').getPublicUrl(filePath);
        const adjunto = {
            tarea_id: tareaActual.id,
            tecnico_id: currentTecnicoId,
            nombre_archivo: file.name,
            tipo_archivo: file.type,
            url: urlData.publicUrl,
            tamano_bytes: file.size,
            subido_en: new Date().toISOString(),
            es_justificante: true
        };
        const { error: insertError } = await sb.from('adjuntos_tarea').insert(adjunto);
        if (insertError) console.error("Error guardar adjunto en BD:", insertError);
        return adjunto;
    }

    async function hacerLogin() {
        const identificador = document.getElementById('identificador').value.trim();
        const password = document.getElementById('password').value;
        if (!identificador || !password) { document.getElementById('errorMsg').innerText = "Introduce email/nick y contraseña"; return false; }
        let email = identificador;
        if (!identificador.includes('@')) {
            const { data: perfil } = await sb.from('perfiles').select('email').eq('nick', identificador).maybeSingle();
            if (!perfil) { document.getElementById('errorMsg').innerText = "Usuario no encontrado"; return false; }
            email = perfil.email;
        }
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) { document.getElementById('errorMsg').innerText = error.message; return false; }
        const { data: perfil } = await sb.from('perfiles').select('*').eq('id', data.user.id).maybeSingle();
        if (!perfil || perfil.rol !== 'tecnico') { await sb.auth.signOut(); document.getElementById('errorMsg').innerText = "Acceso solo para técnicos"; return false; }
        
        currentUser = data.user;
        currentTecnicoId = perfil.id;
        currentEmpresaId = perfil.empresa_id;
        isExterno = perfil.tipo_externo !== null;
        
        document.getElementById('nombreTecnico').innerHTML = perfil.nombre || 'Técnico';
        document.getElementById('emailTecnico').innerHTML = currentUser.email;
        
        const { data: empresa } = await sb.from('empresas').select('nombre').eq('id', currentEmpresaId).single();
        document.getElementById('nombreEmpresaBanner').innerHTML = empresa?.nombre || 'Mi Empresa';
        
        return true;
    }

    async function cargarTareas() {
        const { data: todas, error } = await sb.from('tareas')
            .select('*, activos(nombre, direccion, localidad), empresas!cliente_id(nombre)')
            .eq('tecnico_id', currentTecnicoId)
            .order('fecha_asignacion', { ascending: false });
        
        if (error) return;
        
        todasTareasCache = todas || [];
        
        const ordenar = (tareas) => {
            const prioridadOrden = { 'URGENCIA': 1, 'AVERIA': 2, 'MANTENIMIENTO': 3, 'REVISION': 4, 'PRESUPUESTO': 5 };
            return [...tareas].sort((a, b) => {
                const priorA = prioridadOrden[a.tipo] || 99, priorB = prioridadOrden[b.tipo] || 99;
                if (priorA !== priorB) return priorA - priorB;
                return new Date(b.fecha_asignacion) - new Date(a.fecha_asignacion);
            });
        };
        
        tareasData = {
            nuevas: ordenar(todas.filter(t => t.estado === 'PENDIENTE' && !t.leida)),
            activas: ordenar(todas.filter(t => t.estado === 'ACEPTADA' || t.estado === 'DESPLAZAMIENTO' || t.estado === 'EN_CURSO' || t.estado === 'SUSPENDIDA')),
            completadas: ordenar(todas.filter(t => t.estado === 'COMPLETADA' || t.estado === 'CANCELADA'))
        };
        
        completadasFiltradas = [...tareasData.completadas];
        
        document.getElementById('contNuevas').innerText = tareasData.nuevas.length;
        document.getElementById('contActivas').innerText = tareasData.activas.length;
        document.getElementById('contCompletadas').innerText = tareasData.completadas.length;
        
        renderizarPanel();
    }

    function generarSugerencias(texto) {
        if (!texto || texto.length < 2) {
            document.getElementById('sugerenciasLista').style.display = 'none';
            return;
        }
        const textoLower = texto.toLowerCase();
        const sugerencias = new Set();
        
        todasTareasCache.forEach(t => {
            if (t.empresas?.nombre?.toLowerCase().includes(textoLower)) sugerencias.add(t.empresas.nombre);
            if (t.activos?.nombre?.toLowerCase().includes(textoLower)) sugerencias.add(t.activos.nombre);
            if (t.id?.toLowerCase().includes(textoLower)) sugerencias.add(t.id);
        });
        
        const sugerenciasArray = Array.from(sugerencias).slice(0, 5);
        if (sugerenciasArray.length > 0) {
            const sugerenciasHtml = sugerenciasArray.map(s => `<div class="sugerencia-item" onclick="aplicarSugerencia('${s.replace(/'/g, "\\'")}')">${s}</div>`).join('');
            document.getElementById('sugerenciasLista').innerHTML = sugerenciasHtml;
            document.getElementById('sugerenciasLista').style.display = 'block';
        } else {
            document.getElementById('sugerenciasLista').style.display = 'none';
        }
    }

    function aplicarSugerencia(texto) {
        document.getElementById('filtroBuscar').value = texto;
        document.getElementById('sugerenciasLista').style.display = 'none';
        aplicarFiltrosCompletadas();
    }

    function renderizarPanel() {
        const tabActiva = document.querySelector('.nav-item.active')?.dataset.tab || 'nuevas';
        let contenido = '';
        if (tabActiva === 'nuevas') contenido = renderizarTareas(tareasData.nuevas, 'nueva');
        else if (tabActiva === 'activas') contenido = renderizarTareas(tareasData.activas, 'activa');
        else if (tabActiva === 'completadas') contenido = renderizarCompletadas();
        else if (tabActiva === 'perfil') contenido = renderizarPerfil();
        document.getElementById('contenidoPanel').innerHTML = contenido;
        
        if (tabActiva === 'completadas') {
            const inputBuscar = document.getElementById('filtroBuscar');
            if (inputBuscar) {
                inputBuscar.addEventListener('input', (e) => generarSugerencias(e.target.value));
            }
        }
    }

    function aplicarFiltrosCompletadas() {
        const buscar = document.getElementById('filtroBuscar')?.value.toLowerCase() || '';
        const tipo = document.getElementById('filtroTipo')?.value || '';
        const fechaDesde = document.getElementById('filtroFechaDesde')?.value || '';
        const fechaHasta = document.getElementById('filtroFechaHasta')?.value || '';
        
        completadasFiltradas = tareasData.completadas.filter(t => {
            if (tipo && t.tipo !== tipo) return false;
            if (fechaDesde && t.completada_en && t.completada_en.split('T')[0] < fechaDesde) return false;
            if (fechaHasta && t.completada_en && t.completada_en.split('T')[0] > fechaHasta) return false;
            if (buscar) {
                const texto = `${t.empresas?.nombre} ${t.activos?.nombre} ${t.id}`.toLowerCase();
                if (!texto.includes(buscar)) return false;
            }
            return true;
        });
        
        renderizarPanel();
    }

    function limpiarFiltrosCompletadas() {
        document.getElementById('filtroBuscar').value = '';
        document.getElementById('filtroTipo').value = '';
        document.getElementById('filtroFechaDesde').value = '';
        document.getElementById('filtroFechaHasta').value = '';
        document.getElementById('sugerenciasLista').style.display = 'none';
        completadasFiltradas = [...tareasData.completadas];
        renderizarPanel();
    }

    async function verDetalleCompletada(id) {
        const { data: tarea } = await sb.from('tareas')
            .select('*, activos(*), empresas!cliente_id(*)')
            .eq('id', id)
            .single();
        
        if (!tarea) return;
        
        const { data: mediciones } = await sb.from('mediciones_dinamicas').select('*').eq('tarea_id', id).order('created_at', { ascending: true });
        const { data: materiales } = await sb.from('gastos_tarea').select('*').eq('tarea_id', id).eq('tipo_gasto', 'MATERIALES');
        const { data: seguimiento } = await sb.from('seguimiento_tareas').select('*').eq('tarea_id', id).order('inicio', { ascending: true });
        
        let eventosPorDia = new Map();
        for (let ev of seguimiento) {
            const fechaStr = ev.inicio ? ev.inicio.split('T')[0] : 'Sin fecha';
            if (!eventosPorDia.has(fechaStr)) eventosPorDia.set(fechaStr, []);
            eventosPorDia.get(fechaStr).push(ev);
        }
        
        let tiempoDesplazamientoTotal = 0;
        let tiempoTrabajoTotal = 0;
        for (let ev of seguimiento) {
            if (ev.evento === 'LLEGADA' && ev.duracion_minutos) tiempoDesplazamientoTotal += ev.duracion_minutos;
            if (ev.evento === 'FIN_TRABAJO' && ev.duracion_minutos) tiempoTrabajoTotal += ev.duracion_minutos;
        }
        
        let html = `<strong>📋 ID:</strong> ${tarea.id}<br>`;
        html += `<strong>🏢 Cliente:</strong> ${tarea.empresas?.nombre || '-'}<br>`;
        html += `<strong>🔧 Activo:</strong> ${tarea.activos?.nombre || '-'}<br>`;
        html += `<strong>📍 Dirección:</strong> ${tarea.activos?.direccion || ''} ${tarea.activos?.localidad || ''}<br>`;
        html += `<strong>📅 Fecha asignación:</strong> ${formatearFecha(tarea.fecha_asignacion)}<br>`;
        if (tarea.fecha_propuesta) html += `<strong>📅 Fecha propuesta:</strong> ${formatearFecha(tarea.fecha_propuesta)} a las ${tarea.hora_propuesta || '--:--'}<br>`;
        if (tarea.completada_en) html += `<strong>✅ Fecha finalización:</strong> ${new Date(tarea.completada_en).toLocaleString('es-ES', { timeZone: 'Europe/Madrid' })}<br>`;
        
        html += `<hr><strong>⏱️ TIEMPOS TOTALES:</strong><br>`;
        html += `<div class="tiempo-linea"><span class="tiempo-titulo">🚗 Tiempo de desplazamiento:</span><span>${formatearDuracion(tiempoDesplazamientoTotal)}</span></div>`;
        html += `<div class="tiempo-linea"><span class="tiempo-titulo">⚙️ Tiempo de trabajo efectivo:</span><span>${formatearDuracion(tiempoTrabajoTotal)}</span></div>`;
        
        html += `<hr><strong>📋 REGISTRO POR DÍAS:</strong><br>`;
        for (let [fecha, eventos] of eventosPorDia) {
            html += `<div class="dia-group"><div class="dia-fecha">📅 ${fecha}</div>`;
            for (let ev of eventos) {
                let eventoTexto = '';
                let duracionTexto = '';
                switch(ev.evento) {
                    case 'INICIO_DESPLAZAMIENTO': eventoTexto = '🚗 Inicio desplazamiento'; break;
                    case 'LLEGADA': eventoTexto = '📍 Llegada'; duracionTexto = ev.duracion_minutos ? ` (${ev.duracion_minutos} min)` : ''; break;
                    case 'INICIO_TRABAJO': eventoTexto = '⚙️ Inicio trabajo'; break;
                    case 'SUSPENSION': eventoTexto = '⏸️ Suspensión'; break;
                    case 'REANUDACION': eventoTexto = '▶️ Reanudación'; break;
                    case 'FIN_TRABAJO': eventoTexto = '🏁 Fin trabajo'; duracionTexto = ev.duracion_minutos ? ` (${ev.duracion_minutos} min)` : ''; break;
                    default: eventoTexto = ev.evento;
                }
                const fechaHora = ev.inicio ? new Date(ev.inicio).toLocaleString('es-ES', { timeZone: 'Europe/Madrid' }) : '-';
                html += `<div class="tiempo-linea"><span class="tiempo-titulo">${eventoTexto}</span><span>${fechaHora}${duracionTexto}</span></div>`;
            }
            let medicionesDia = mediciones.filter(m => m.created_at && m.created_at.split('T')[0] === fecha);
            if (medicionesDia.length > 0) {
                html += `<div style="margin-top:8px;"><strong>🔬 Mediciones del día:</strong><br>`;
                for (let m of medicionesDia) {
                    const params = m.parametros;
                    html += `<small>📝 ${new Date(m.created_at).toLocaleTimeString()}</small><br>`;
                    if (params.cloro) html += `Cloro: ${params.cloro} ppm<br>`;
                    if (params.ph) html += `pH: ${params.ph}<br>`;
                    if (params.temperatura) html += `Temperatura: ${params.temperatura} °C<br>`;
                    if (params.altura) html += `Altura césped: ${params.altura} cm<br>`;
                    if (params.observaciones) html += `Observaciones: ${params.observaciones}<br>`;
                }
                html += `</div>`;
            }
            html += `</div>`;
        }
        
        html += `<hr><strong>📋 ORDEN DE TRABAJO:</strong><br><div style="background:#f0f0f0; padding:8px; border-radius:8px; margin-top:4px;">${tarea.orden_trabajo || 'Sin instrucciones'}</div><br>`;
        
        if (materiales && materiales.length > 0) {
            html += `<strong>🧰 MATERIALES UTILIZADOS:</strong><br><div style="background:#f0f0f0; padding:8px; border-radius:8px; margin-top:4px;">`;
            materiales.forEach(m => html += `• ${m.descripcion} - ${m.importe_total}€<br>`);
            html += `</div><br>`;
        }
        
        if (tarea.nota_interna) {
            html += `<strong>📝 NOTA INTERNA (técnico):</strong><br><div style="background:#f0f0f0; padding:8px; border-radius:8px; margin-top:4px;">${tarea.nota_interna}</div><br>`;
        }
        
        if (tarea.nota_cliente) {
            html += `<strong>📋 INFORME ENVIADO AL CLIENTE:</strong><br><div style="background:#f0f0f0; padding:8px; border-radius:8px; margin-top:4px;">${tarea.nota_cliente}</div><br>`;
        }
        
        document.getElementById('detalleTareaContent').innerHTML = html;
        document.getElementById('modalDetalleTarea').style.display = 'flex';
    }

    async function abrirTarea(id) {
        if (autoSaveInterval) clearInterval(autoSaveInterval);
        const { data: tarea } = await sb.from('tareas').select('*, activos(*), empresas!cliente_id(*)').eq('id', id).single();
        if (!tarea) return;
        tareaActual = tarea;
        servicioActual = tarea.servicio_tipo || 'OTRO';
        
        if (tarea.estado === 'PENDIENTE' && !tarea.leida) {
            const ordenDiv = document.getElementById('modalOrdenTrabajo');
            if (ordenDiv && tareaActual.orden_trabajo) ordenDiv.innerHTML = tareaActual.orden_trabajo;
            mostrarModalAceptar();
            return;
        }
        
        // Determinar paso según estado
        if (tarea.estado === 'ACEPTADA') pasoActual = 0;
        else if (tarea.estado === 'DESPLAZAMIENTO') pasoActual = 1;
        else if (tarea.estado === 'EN_CURSO') pasoActual = 3;
        else if (tarea.estado === 'SUSPENDIDA') pasoActual = 3;
        else pasoActual = 0;
        
        const { data: gastos } = await sb.from('gastos_tarea').select('*').eq('tarea_id', id).eq('tipo_gasto', 'MATERIALES');
        materialesTemp = gastos || [];
        
        document.getElementById('trabajoTitulo').innerHTML = tarea.activos?.nombre || 'Tarea';
        document.getElementById('trabajoScreen').style.display = 'block';
        
        // Restaurar progreso local si existe
        const restaurado = cargarProgresoLocal(id);
        if (!restaurado) {
            // Cargar datos desde la BD si no hay progreso local
            if (tarea.nota_interna) document.getElementById('notaInterna').value = tarea.nota_interna;
            if (tarea.nota_cliente) document.getElementById('notaCliente').value = tarea.nota_cliente;
        }
        
        renderizarPantallaTrabajo();
        // Mostrar histórico de días anteriores
        mostrarHistoricoDias();
        // Mostrar adjuntos existentes
        mostrarAdjuntos();
        
        // Iniciar auto-guardado cada 30 segundos
        autoSaveInterval = setInterval(() => guardarProgresoLocal(), 30000);
    }

    async function mostrarHistoricoDias() {
        if (!tareaActual) return;
        const { data: seguimiento } = await sb.from('seguimiento_tareas').select('*').eq('tarea_id', tareaActual.id).order('inicio', { ascending: true });
        const { data: mediciones } = await sb.from('mediciones_dinamicas').select('*').eq('tarea_id', tareaActual.id).order('created_at', { ascending: true });
        
        let eventosPorDia = new Map();
        for (let ev of seguimiento) {
            if (ev.evento === 'INICIO_DESPLAZAMIENTO' || ev.evento === 'LLEGADA' || ev.evento === 'INICIO_TRABAJO' || ev.evento === 'SUSPENSION' || ev.evento === 'REANUDACION' || ev.evento === 'FIN_TRABAJO') {
                const fechaStr = ev.inicio ? ev.inicio.split('T')[0] : 'Sin fecha';
                if (!eventosPorDia.has(fechaStr)) eventosPorDia.set(fechaStr, []);
                eventosPorDia.get(fechaStr).push(ev);
            }
        }
        
        const container = document.getElementById('historicoContainer');
        if (!container) return;
        if (eventosPorDia.size === 0) {
            container.innerHTML = '<summary>📜 Historial de días anteriores</summary><div>No hay jornadas previas</div>';
            return;
        }
        let html = '<summary>📜 Historial de días anteriores (click para ver)</summary>';
        for (let [fecha, eventos] of eventosPorDia) {
            html += `<div style="margin-top:8px;"><strong>📅 ${fecha}</strong><br>`;
            for (let ev of eventos) {
                let eventoTexto = '';
                switch(ev.evento) {
                    case 'INICIO_DESPLAZAMIENTO': eventoTexto = '🚗 Inicio desplazamiento'; break;
                    case 'LLEGADA': eventoTexto = '📍 Llegada'; break;
                    case 'INICIO_TRABAJO': eventoTexto = '⚙️ Inicio trabajo'; break;
                    case 'SUSPENSION': eventoTexto = '⏸️ Suspensión'; break;
                    case 'REANUDACION': eventoTexto = '▶️ Reanudación'; break;
                    case 'FIN_TRABAJO': eventoTexto = '🏁 Fin trabajo'; break;
                    default: eventoTexto = ev.evento;
                }
                html += `<div style="font-size:0.7rem; margin-left:12px;">${eventoTexto} - ${ev.inicio ? new Date(ev.inicio).toLocaleTimeString() : ''}</div>`;
            }
            let medicionesDia = mediciones.filter(m => m.created_at && m.created_at.split('T')[0] === fecha);
            if (medicionesDia.length > 0) {
                html += `<div style="margin-left:12px; font-size:0.7rem; color:#475569;">🔬 Mediciones: ${medicionesDia.length} registro(s)</div>`;
            }
            html += `</div>`;
        }
        container.innerHTML = html;
    }

    async function registrarEvento(evento, motivo = null) {
        const ahoraLocal = new Date();
        const offset = ahoraLocal.getTimezoneOffset();
        const ahoraLocalISO = new Date(ahoraLocal.getTime() - offset * 60000).toISOString().slice(0, 19);
        let duracion = null;
        
        try {
            // Verificar si ya existe un evento activo del mismo tipo
            const { data: eventoExistente } = await sb.from('seguimiento_tareas')
                .select('*')
                .eq('tarea_id', tareaActual.id)
                .eq('evento', evento)
                .is('fin', null)
                .maybeSingle();
            
            if (eventoExistente && evento !== 'SUSPENSION' && evento !== 'FIN_TRABAJO') {
                mostrarMensaje(`⚠️ Ya hay un evento ${evento} activo. Continuando con el flujo.`, 'exito');
                if (evento === 'INICIO_DESPLAZAMIENTO') {
                    tareaActual.estado = 'DESPLAZAMIENTO';
                    pasoActual = 1;
                } else if (evento === 'LLEGADA') {
                    tareaActual.estado = 'EN_CURSO';
                    pasoActual = 2;
                } else if (evento === 'INICIO_TRABAJO') {
                    pasoActual = 3;
                }
                renderizarPantallaTrabajo();
                return true;
            }
            
            let eventoAnterior = null;
            
            if (evento === 'LLEGADA') {
                const { data: desplazamiento } = await sb.from('seguimiento_tareas')
                    .select('*')
                    .eq('tarea_id', tareaActual.id)
                    .eq('evento', 'INICIO_DESPLAZAMIENTO')
                    .is('fin', null)
                    .maybeSingle();
                if (desplazamiento) eventoAnterior = desplazamiento;
            } else if (evento === 'FIN_TRABAJO' || evento === 'SUSPENSION') {
                const { data: trabajo } = await sb.from('seguimiento_tareas')
                    .select('*')
                    .eq('tarea_id', tareaActual.id)
                    .eq('evento', 'INICIO_TRABAJO')
                    .is('fin', null)
                    .maybeSingle();
                if (trabajo) eventoAnterior = trabajo;
            }
            
            if (eventoAnterior && eventoAnterior.inicio) {
                const inicio = new Date(eventoAnterior.inicio);
                const fin = new Date(ahoraLocalISO);
                duracion = Math.floor((fin - inicio) / 1000 / 60);
                if (duracion === 0) duracion = 1;
                
                await sb.from('seguimiento_tareas')
                    .update({ fin: ahoraLocalISO, duracion_minutos: duracion })
                    .eq('id', eventoAnterior.id);
            }
            
            const nuevoEvento = {
                tarea_id: tareaActual.id,
                evento: evento,
                inicio: ahoraLocalISO,
                duracion_minutos: null,
                motivo: motivo
            };
            
            const { error } = await sb.from('seguimiento_tareas').insert(nuevoEvento);
            if (error) throw error;
            
            if (evento === 'INICIO_DESPLAZAMIENTO') {
                await sb.from('tareas').update({ estado: 'DESPLAZAMIENTO', iniciada_en: ahoraLocalISO }).eq('id', tareaActual.id);
                tareaActual.estado = 'DESPLAZAMIENTO';
                pasoActual = 1;
            } else if (evento === 'LLEGADA') {
                await sb.from('tareas').update({ estado: 'EN_CURSO' }).eq('id', tareaActual.id);
                tareaActual.estado = 'EN_CURSO';
                pasoActual = 2;
            } else if (evento === 'INICIO_TRABAJO') {
                pasoActual = 3;
            } else if (evento === 'FIN_TRABAJO') {
                pasoActual = 4;
            }
            
            mostrarMensaje(`✅ ${evento} registrado`, 'exito');
            renderizarPantallaTrabajo();
            return true;
            
        } catch (error) {
            console.error("Error:", error);
            mostrarMensaje(`❌ Error al registrar ${evento}`, 'error');
            return false;
        }
    }

    async function mejorarNotaInternaIA(texto) {
        if (!texto || texto.trim() === "") { mostrarMensaje("❌ Escribe algo antes de usar la IA", 'error'); return null; }
        const iaLoading = document.createElement('div'); iaLoading.className = 'ia-loading'; iaLoading.innerHTML = '⏳ Mejorando nota...';
        const textarea = document.getElementById('notaInterna'); textarea.insertAdjacentElement('afterend', iaLoading);
        try {
            const { data: session } = await sb.auth.getSession();
            const response = await fetch(`${SUPABASE_URL}/functions/v1/mejorar-nota-interna`, {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
                body: JSON.stringify({ texto: texto })
            });
            const resultado = await response.json();
            if (resultado.success) { document.getElementById('notaInterna').value = resultado.texto; mostrarMensaje("✅ Nota mejorada", 'exito'); return resultado.texto; }
            else throw new Error(resultado.error);
        } catch (error) { mostrarMensaje("❌ Error al mejorar", 'error'); return null; }
        finally { iaLoading.remove(); }
    }

        const textarea = document.getElementById('notaCliente'); textarea.insertAdjacentElement('afterend', iaLoading);

                method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },

            <div class="step ${pasoActual >= 3 ? 'completed' : ''} ${pasoActual === 3 ? 'active' : ''}"><span class="step-icon">⚙️</span><span>Trabajo</span></div>

                html += `<button class="action-btn" onclick="registrarLlegada()">📍 REGISTRAR LLEGADA</button>`;

        if (selectMaterial) {
            selectMaterial.addEventListener('change', function() {
                const selected = this.options[this.selectedIndex];
                const unidad = selected?.dataset?.unidad || '';
                const precio = selected?.dataset?.precio || '';
                document.getElementById('materialUnidad').value = unidad;
                document.getElementById('materialPrecio').value = precio;
            });
        }
        
        // Configurar subida de fotos
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        if (uploadArea && fileInput) {
            uploadArea.onclick = () => fileInput.click();
            fileInput.onchange = async (e) => {
                const files = Array.from(e.target.files);
                for (let file of files) {
                    await subirAdjunto(file);
                }
                mostrarAdjuntos();
                fileInput.value = '';
            };
            uploadArea.ondragover = (e) => e.preventDefault();
            uploadArea.ondrop = async (e) => {
                e.preventDefault();
                const files = Array.from(e.dataTransfer.files);
                for (let file of files) {
                    await subirAdjunto(file);
                }
                mostrarAdjuntos();
            };
        }
        
        mostrarAdjuntos();
        mostrarHistoricoDias();
    }

            nota_interna: notaInterna, 
            nota_cliente: notaCliente 
        }).eq('id', tareaActual.id);
        
        for (const m of materialesTemp) {
            const { data: existente } = await sb.from('gastos_tarea')
                .select('id')
                .eq('tarea_id', tareaActual.id)
                .eq('descripcion', m.descripcion)
                .maybeSingle();
            if (!existente) {
                try {
                    await sb.from('gastos_tarea').insert({
                        tarea_id: tareaActual.id,
                        tecnico_id: currentTecnicoId,
                        tipo_gasto: 'MATERIALES',
                        descripcion: m.descripcion,
                        importe_total: m.importe_total,
                        fecha_gasto: new Date().toISOString().split('T')[0],
                        estado: 'PENDIENTE'
                    });
                } catch(e) { console.error("Error material:", e); }
            }
        }
        
        mostrarMensaje("✅ Registros guardados correctamente", 'exito');
        pasoActual = 3;
        renderizarPantallaTrabajo();
        limpiarProgresoLocal(tareaActual.id);
    }

    function agregarMaterial() {
        const nombre = document.getElementById('selectMaterial')?.value;
        const cantidad = parseFloat(document.getElementById('materialCantidad')?.value) || 0;
        const precioUnitario = parseFloat(document.getElementById('materialPrecio')?.value) || 0;
        const unidad = document.getElementById('materialUnidad')?.value || 'unidad';
        if (!nombre) { mostrarMensaje("❌ Selecciona un material", 'error'); return; }
        if (cantidad <= 0) { mostrarMensaje("❌ Cantidad válida", 'error'); return; }
        const importeTotal = cantidad * precioUnitario;
        materialesTemp.push({ 
            descripcion: `${nombre}: ${cantidad} ${unidad} (${precioUnitario}€/${unidad})`, 
            tipo_gasto: 'MATERIALES',
            importe_total: importeTotal
        });
        document.getElementById('selectMaterial').value = '';
        document.getElementById('materialCantidad').value = '1';
        document.getElementById('materialPrecio').value = '';
        document.getElementById('materialUnidad').value = '';
        renderizarPantallaTrabajo();
        guardarProgresoLocal();
    }

    function eliminarMaterialListado(idx) { materialesTemp.splice(idx, 1); renderizarPantallaTrabajo(); guardarProgresoLocal(); }

    async function iniciarDesplazamiento() {
        const btn = document.querySelector('button[onclick="iniciarDesplazamiento()"]');
        if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Registrando...'; }
        const resultado = await registrarEvento('INICIO_DESPLAZAMIENTO');
        if (resultado) {
            pasoActual = 1;
            renderizarPantallaTrabajo();
            await cargarTareas();
        }
        if (btn) btn.disabled = false;
    }

    async function registrarLlegada() {
        const btn = document.querySelector('button[onclick="registrarLlegada()"]');
        if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Registrando...'; }
        const resultado = await registrarEvento('LLEGADA');
        if (resultado) {
            pasoActual = 2;
            renderizarPantallaTrabajo();
            await cargarTareas();
        }
        if (btn) btn.disabled = false;
    }

    async function iniciarTrabajo() {
        const btn = document.querySelector('button[onclick="iniciarTrabajo()"]');
        if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Registrando...'; }
        const resultado = await registrarEvento('INICIO_TRABAJO');
        if (resultado) {
            pasoActual = 3;
            renderizarPantallaTrabajo();
            await cargarTareas();
        }
        if (btn) btn.disabled = false;
    }

    async function suspenderTarea() {
        if (!confirm("¿Estás seguro de suspender la tarea? Se guardará el progreso y podrás continuar otro día.")) return;
        if (!tareaActual) return;
        
        const btn = document.querySelector('button[onclick="suspenderTarea()"]');
        if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Suspendiendo...'; }
        
        const notaInterna = document.getElementById('notaInterna')?.value || '';
        const notaCliente = document.getElementById('notaCliente')?.value || '';
        const mediciones = obtenerMediciones();
        
        if (mediciones && Object.values(mediciones).some(v => v && v !== '')) {
            await sb.from('mediciones_dinamicas').insert({
                tarea_id: tareaActual.id,
                tecnico_id: currentTecnicoId,
                parametros: mediciones,
                notas_tecnico: notaInterna
            });
        }
        
        await sb.from('tareas').update({
            nota_interna: notaInterna,
            nota_cliente: notaCliente
        }).eq('id', tareaActual.id);
        
        const ahoraLocal = new Date();
        const offset = ahoraLocal.getTimezoneOffset();
        const ahoraLocalISO = new Date(ahoraLocal.getTime() - offset * 60000).toISOString().slice(0, 19);
        
        const { data: trabajoActivo } = await sb.from('seguimiento_tareas')
            .select('*')
            .eq('tarea_id', tareaActual.id)
            .eq('evento', 'INICIO_TRABAJO')
            .is('fin', null)
            .maybeSingle();
        if (trabajoActivo) {
            const duracion = Math.max(1, Math.floor((new Date(ahoraLocalISO) - new Date(trabajoActivo.inicio)) / 1000 / 60));
            await sb.from('seguimiento_tareas')
                .update({ fin: ahoraLocalISO, duracion_minutos: duracion })
                .eq('id', trabajoActivo.id);
        }
        
        await sb.from('seguimiento_tareas').insert({
            tarea_id: tareaActual.id,
            evento: 'SUSPENSION',
            inicio: ahoraLocalISO,
            motivo: 'Fin de jornada'
        });
        
        await sb.from('tareas').update({ estado: 'SUSPENDIDA' }).eq('id', tareaActual.id);
        tareaActual.estado = 'SUSPENDIDA';
        
        limpiarProgresoLocal(tareaActual.id);
        mostrarMensaje("⏸️ Tarea suspendida. Puedes continuar otro día.", 'exito');
        document.getElementById('trabajoScreen').style.display = 'none';
        await cargarTareas();
        document.querySelector('.nav-item[data-tab="activas"]').click();
        if (btn) btn.disabled = false;
    }

    async function reanudarTrabajo() {
        if (!confirm("Reanudar tarea iniciará un nuevo ciclo de desplazamiento/llegada/trabajo para hoy. ¿Continuar?")) return;
        if (!tareaActual) return;
        
        const ahoraLocal = new Date();
        const offset = ahoraLocal.getTimezoneOffset();
        const ahoraLocalISO = new Date(ahoraLocal.getTime() - offset * 60000).toISOString().slice(0, 19);
        
        await sb.from('seguimiento_tareas').insert({
            tarea_id: tareaActual.id,
            evento: 'REANUDACION',
            inicio: ahoraLocalISO,
            motivo: 'Nueva jornada'
        });
        
        await sb.from('tareas').update({ estado: 'ACEPTADA' }).eq('id', tareaActual.id);
        tareaActual.estado = 'ACEPTADA';
        pasoActual = 0;
        renderizarPantallaTrabajo();
        guardarProgresoLocal();
        
        mostrarMensaje("✅ Tarea reanudada. Inicia el desplazamiento para hoy.", 'exito');
        await cargarTareas();
    }

    async function finalizarTrabajo() {
        try {
            if (!tareaActual || !tareaActual.id) {
                mostrarMensaje("❌ Error: No hay tarea activa", 'error');
                return;
            }

            let notaCliente = document.getElementById('notaCliente')?.value || '';
            
            if (!notaCliente.trim()) {
                mostrarMensaje("📝 Generando informe automático...", 'exito');
                const informe = await generarInformeCliente();
                if (informe && informe.trim()) {
                    let textoLimpio = informe.replace(/\*\*/g, '').replace(/\*/g, '').replace(/#/g, '');
                    document.getElementById('notaCliente').value = textoLimpio;
                    notaCliente = textoLimpio;
                } else {
                    mostrarMensaje("❌ No se pudo generar el informe. Por favor, genera el informe manualmente.", 'error');
                    return;
                }
            }
            
            const { data: medicionesExistentes } = await sb.from('mediciones_dinamicas')
                .select('id')
                .eq('tarea_id', tareaActual.id)
                .limit(1);
            
            if (!medicionesExistentes || medicionesExistentes.length === 0) {
                const notaInterna = document.getElementById('notaInterna')?.value || '';
                const mediciones = obtenerMediciones();
                
                if (mediciones && Object.values(mediciones).some(v => v && v !== '')) {
                    await sb.from('mediciones_dinamicas').insert({
                        tarea_id: tareaActual.id,
                        tecnico_id: currentTecnicoId,
                        parametros: mediciones,
                        notas_tecnico: notaInterna
                    });
                }
                
                await sb.from('tareas').update({ 
                    nota_interna: notaInterna, 
                    nota_cliente: notaCliente 
                }).eq('id', tareaActual.id);
                
                for (const m of materialesTemp) {
                    const { data: existente } = await sb.from('gastos_tarea')
                        .select('id')
                        .eq('tarea_id', tareaActual.id)
                        .eq('descripcion', m.descripcion)
                        .maybeSingle();
                    if (!existente) {
                        await sb.from('gastos_tarea').insert({
                            tarea_id: tareaActual.id,
                            tecnico_id: currentTecnicoId,
                            tipo_gasto: 'MATERIALES',
                            descripcion: m.descripcion,
                            importe_total: m.importe_total || 0,
                            fecha_gasto: new Date().toISOString().split('T')[0],
                            estado: 'PENDIENTE'
                        });
                    }
                }
                mostrarMensaje("✅ Registros guardados automáticamente", 'exito');
            } else {
                await sb.from('tareas').update({ nota_cliente: notaCliente }).eq('id', tareaActual.id);
            }
            
            const ahoraLocal = new Date();
            const offset = ahoraLocal.getTimezoneOffset();
            const ahoraLocalISO = new Date(ahoraLocal.getTime() - offset * 60000).toISOString().slice(0, 19);
            
            const { data: trabajo } = await sb.from('seguimiento_tareas')
                .select('*')
                .eq('tarea_id', tareaActual.id)
                .eq('evento', 'INICIO_TRABAJO')
                .is('fin', null)
                .maybeSingle();
            
            if (trabajo && trabajo.inicio) {
                const duracion = Math.max(1, Math.floor((new Date(ahoraLocalISO) - new Date(trabajo.inicio)) / 1000 / 60));
                await sb.from('seguimiento_tareas')
                    .update({ fin: ahoraLocalISO, duracion_minutos: duracion })
                    .eq('id', trabajo.id);
            }
            
            const { data: finExistente } = await sb.from('seguimiento_tareas')
                .select('id')
                .eq('tarea_id', tareaActual.id)
                .eq('evento', 'FIN_TRABAJO')
                .maybeSingle();
            
            if (!finExistente) {
                await sb.from('seguimiento_tareas').insert({
                    tarea_id: tareaActual.id,
                    evento: 'FIN_TRABAJO',
                    inicio: ahoraLocalISO,
                    duracion_minutos: null
                });
            }
            
            mostrarMensaje("✅ Trabajo finalizado correctamente", 'exito');
            pasoActual = 4;
            renderizarPantallaTrabajo();
            limpiarProgresoLocal(tareaActual.id);
            await cargarTareas();
            
        } catch (error) {
            console.error("Error en finalizarTrabajo:", error);
            mostrarMensaje("❌ Error al finalizar: " + error.message, 'error');
        }
    }

    async function cerrarTarea() {
        await sb.from('tareas').update({ estado: 'COMPLETADA', completada_en: new Date().toISOString() }).eq('id', tareaActual.id);
        mostrarMensaje("🏁 Tarea completada");
        document.getElementById('trabajoScreen').style.display = 'none';
        limpiarProgresoLocal(tareaActual.id);
        await cargarTareas();
    }

    function mostrarModalAceptar() {
        const modal = document.getElementById('modalAceptarTarea');
        const hoy = new Date();
        const fechaDefault = hoy.toISOString().split('T')[0];
        document.getElementById('modalFechaPropuesta').value = fechaDefault;
        document.getElementById('modalHoraPropuesta').value = '10:00';
        
        const ordenDiv = document.getElementById('modalOrdenTrabajo');
        if (ordenDiv && tareaActual && tareaActual.orden_trabajo) ordenDiv.innerHTML = tareaActual.orden_trabajo;
        
        modal.style.display = 'flex';
        
        const confirmar = document.getElementById('btnConfirmarAceptar');
        const cancelar = document.getElementById('btnCancelarAceptar');
        
        const handlerConfirmar = async () => {
            const fechaPropuesta = document.getElementById('modalFechaPropuesta').value;
            const horaPropuesta = document.getElementById('modalHoraPropuesta').value;
            
            if (!fechaPropuesta || !horaPropuesta) {
                mostrarMensaje("❌ Completa fecha y hora", 'error');
                return;
            }
            
            const { error } = await sb.from('tareas').update({ 
                estado: 'ACEPTADA',
                fecha_propuesta: fechaPropuesta,
                hora_propuesta: horaPropuesta + ':00',
                leida: true
            }).eq('id', tareaActual.id);
            
            if (error) {
                mostrarMensaje("❌ Error al aceptar: " + error.message, 'error');
                return;
            }
            
            tareaActual.estado = 'ACEPTADA';
            tareaActual.fecha_propuesta = fechaPropuesta;
            tareaActual.hora_propuesta = horaPropuesta;
            
            mostrarMensaje(`✅ Tarea aceptada. Previsión: ${fechaPropuesta} a las ${horaPropuesta}`);
            
            modal.style.display = 'none';
            
            document.getElementById('trabajoScreen').style.display = 'block';
            pasoActual = 0;
            renderizarPantallaTrabajo();
            
            await cargarTareas();
            
            confirmar.removeEventListener('click', handlerConfirmar);
            cancelar.removeEventListener('click', handlerCancelar);
        };
        
        const handlerCancelar = () => {
            modal.style.display = 'none';
            confirmar.removeEventListener('click', handlerConfirmar);
            cancelar.removeEventListener('click', handlerCancelar);
        };
        
        confirmar.addEventListener('click', handlerConfirmar);
        cancelar.addEventListener('click', handlerCancelar);
    }

    function mostrarCancelarModal() { const motivo = prompt("Motivo de cancelación:", "No tengo disponibilidad"); if (motivo) cancelarTarea(motivo); }
    async function cancelarTarea(motivo) { await sb.from('tareas').update({ estado: 'CANCELADA', motivo_cancelacion: motivo }).eq('id', tareaActual.id); mostrarMensaje("❌ Tarea cancelada"); document.getElementById('trabajoScreen').style.display = 'none'; limpiarProgresoLocal(tareaActual.id); await cargarTareas(); }
    function cerrarSesion() { if(autoSaveInterval) clearInterval(autoSaveInterval); sb.auth.signOut(); location.reload(); }

    function calcularTotalMateriales() { return materialesTemp.reduce((sum, m) => sum + (m.importe_total || 0), 0); }
    function actualizarTotalAlbaran() {
        const horas = parseFloat(document.getElementById('albaranHoras')?.value) || 0;
        const precioHora = parseFloat(document.getElementById('albaranPrecioHora')?.value) || 0;
        const materiales = calcularTotalMateriales();
        const dietas = parseFloat(document.getElementById('albaranDietas')?.value) || 0;
        const total = (horas * precioHora) + materiales + dietas;
        document.getElementById('albaranMateriales').value = materiales.toFixed(2);
        document.getElementById('albaranTotal').value = total.toFixed(2) + ' €';
    }
    function mostrarModalAlbaran() {
        actualizarTotalAlbaran();
        document.getElementById('modalAlbaran').style.display = 'flex';
        const inputs = ['albaranHoras', 'albaranPrecioHora', 'albaranDietas'];
        inputs.forEach(id => { const el = document.getElementById(id); if (el) el.addEventListener('input', actualizarTotalAlbaran); });
    }
    async function guardarAlbaran() {
        const horas = parseFloat(document.getElementById('albaranHoras')?.value) || 0;
        const precioHora = parseFloat(document.getElementById('albaranPrecioHora')?.value) || 0;
        const materiales = calcularTotalMateriales();
        const dietas = parseFloat(document.getElementById('albaranDietas')?.value) || 0;
        const total = (horas * precioHora) + materiales + dietas;
        try {
            const { error } = await sb.from('facturas_externas').insert({
                tarea_id: tareaActual.id,
                tecnico_id: currentTecnicoId,
                horas_trabajadas: horas,
                precio_hora: precioHora,
                total_materiales: materiales,
                total_dietas: dietas,
                total_general: total,
                pagada: false
            });
            if (error) throw error;
            mostrarMensaje("✅ Albarán guardado correctamente", 'exito');
            document.getElementById('modalAlbaran').style.display = 'none';
        } catch (error) { mostrarMensaje("❌ Error al guardar albarán", 'error'); }
    }

    document.getElementById('btnAceptarInforme').onclick = () => { if (pendingInformeCallback) pendingInformeCallback(true); };
    document.getElementById('btnRegenerarInforme').onclick = () => {
        generarInformeCliente().then(informe => {
            if (informe) document.getElementById('informePreview').innerText = informe;
        });
    };
    document.getElementById('btnCancelarInforme').onclick = () => { if (pendingInformeCallback) pendingInformeCallback(false); else document.getElementById('modalInformeCliente').style.display = 'none'; };
    document.getElementById('btnAceptarAlbaran').onclick = guardarAlbaran;
    document.getElementById('btnCancelarAlbaran').onclick = () => document.getElementById('modalAlbaran').style.display = 'none';
    document.getElementById('btnCerrarDetalle').onclick = () => document.getElementById('modalDetalleTarea').style.display = 'none';
    document.getElementById('btnCerrarOrden').onclick = () => document.getElementById('modalVerOrden').style.display = 'none';

    document.querySelectorAll('.nav-item').forEach(btn => { btn.onclick = () => { document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active')); btn.classList.add('active'); renderizarPanel(); }; });
    document.getElementById('btnBackTrabajo').onclick = async () => {
        if (autoSaveInterval) clearInterval(autoSaveInterval);
        guardarProgresoLocal();
        if (tareaActual && (tareaActual.estado === 'ACEPTADA' || tareaActual.estado === 'DESPLAZAMIENTO' || tareaActual.estado === 'EN_CURSO' || tareaActual.estado === 'SUSPENDIDA')) {
            document.getElementById('trabajoScreen').style.display = 'none';
            await cargarTareas();
            document.querySelector('.nav-item[data-tab="activas"]').click();
        } else {
            document.getElementById('trabajoScreen').style.display = 'none';
            await cargarTareas();
            renderizarPanel();
        }
    };
    document.getElementById('btnLogin').onclick = async () => { if (await hacerLogin()) { document.getElementById('loginPanel').style.display = 'none'; document.getElementById('dashboardPanel').style.display = 'block'; await cargarTareas(); } };
    document.getElementById('btnLogout').onclick = cerrarSesion;
    document.getElementById('btnRefrescar').onclick = async () => { mostrarMensaje("🔄 Refrescando...", 'exito'); await cargarTareas(); renderizarPanel(); };

    window.abrirTarea = abrirTarea; window.mostrarModalAceptar = mostrarModalAceptar;
    window.iniciarDesplazamiento = iniciarDesplazamiento; window.registrarLlegada = registrarLlegada;
    window.iniciarTrabajo = iniciarTrabajo;
    window.agregarMaterial = agregarMaterial;
    window.eliminarMaterialListado = eliminarMaterialListado;
    window.cerrarTarea = cerrarTarea; window.mostrarCancelarModal = mostrarCancelarModal;
    window.cerrarSesion = cerrarSesion; window.mejorarNotaInternaIA = mejorarNotaInternaIA;
    window.mostrarModalInformeCliente = mostrarModalInformeCliente; window.mostrarModalAlbaran = mostrarModalAlbaran;
    window.aplicarFiltrosCompletadas = aplicarFiltrosCompletadas; window.limpiarFiltrosCompletadas = limpiarFiltrosCompletadas;
    window.verDetalleCompletada = verDetalleCompletada; window.aplicarSugerencia = aplicarSugerencia;
    window.verOrdenTrabajo = verOrdenTrabajo;
    window.guardarRegistros = guardarRegistros;
    window.finalizarTrabajo = finalizarTrabajo;
    window.suspenderTarea = suspenderTarea;
    window.reanudarTrabajo = reanudarTrabajo;
</script>
</body>
</html>
