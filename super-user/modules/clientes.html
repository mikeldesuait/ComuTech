<!-- modules/clientes.html -->

<!-- SUBPESTAÑA: BÚSQUEDA -->
<div class="search-bar">
    <input type="text" id="buscadorCliente" placeholder="🔍 Buscar por nombre, email, NIF...">
    <select id="filtroPlan">
        <option value="">Todos los planes</option>
        <option value="BASICO">Básico</option>
        <option value="PRO">Profesional</option>
        <option value="EMPRESA">Empresa</option>
    </select>
    <select id="filtroEstado">
        <option value="">Todos los estados</option>
        <option value="activo">Activos</option>
        <option value="inactivo">Inactivos</option>
    </select>
    <select id="filtroProvincia">
        <option value="">Todas las provincias</option>
    </select>
</div>

<!-- SUBPESTAÑA: TABLA CLIENTES -->
<div style="overflow-x: auto;">
    <table class="clientes-tabla" id="clientesTabla">
        <thead>
            <tr><th>Tipo</th><th>Empresa</th><th>Contacto</th><th>Email</th><th>Plan</th><th>Estado</th><th>Consentimiento</th><th>Acciones</th>
        </thead>
        <tbody id="clientesBody"></tbody>
    </table>
</div>

<!-- SUBPESTAÑA: PAGINACIÓN -->
<div id="paginacion" class="pagination"></div>
<div id="totalClientes" style="text-align: center; margin-top: 16px; font-size: 0.75rem; color: #64748b;"></div>
