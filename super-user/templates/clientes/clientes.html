<!-- templates/clientes/clientes.html -->
<!-- 📋 HABITACIÓN DE CLIENTES - LISTADO PRINCIPAL -->

<!-- BARRA DE BÚSQUEDA Y FILTROS -->
<div class="search-bar">
    <input type="text" id="buscadorCliente" placeholder="🔍 Buscar por nombre, email, NIF...">
    <select id="filtroPlan">
        <option value="">Todos los planes</option>
        <option value="BASICO">📒 Básico</option>
        <option value="PRO">📘 Pro</option>
        <option value="EMPRESA">📕 Empresa</option>
    </select>
    <select id="filtroEstado">
        <option value="">Todos los estados</option>
        <option value="activo">✅ Activos</option>
        <option value="inactivo">❌ Inactivos</option>
    </select>
    <select id="filtroProvincia">
        <option value="">Todas las provincias</option>
    </select>
</div>

<!-- BOTÓN NUEVO CLIENTE -->
<div style="margin-bottom: 20px;">
    <button id="btnNuevoCliente" class="btn-success">➕ Nuevo cliente</button>
</div>

<!-- TABLA DE CLIENTES -->
<div style="overflow-x: auto;">
    <table class="clientes-tabla">
        <thead>
            <tr>
                <th>Tipo</th>
                <th>Empresa / Nombre</th>
                <th>Contacto</th>
                <th>Email</th>
                <th>Plan</th>
                <th>Estado</th>
                <th>RGPD</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="clientesBody">
            <tr><td colspan="8" style="text-align:center; padding:40px;">
                <div class="spinner"></div>
                Cargando clientes...
            </td></tr>
        </tbody>
    </table>
</div>

<!-- PAGINACIÓN -->
<div id="paginacion" class="pagination"></div>
<div id="totalClientes" style="text-align: center; margin-top: 16px; font-size: 0.75rem; color: #64748b;"></div>
