<!-- templates/clientes/alta-autonomo.html -->
<!-- 👤 MANIQUÍ - FORMULARIO DE ALTA DE AUTÓNOMO -->

<!-- ALERTA INFORMATIVA -->
<div class="alert-info">
    <strong>👤 Estás dando de alta a un AUTÓNOMO</strong>
    <p>Los campos marcados con * son obligatorios</p>
</div>

<!-- DATOS PERSONALES -->
<div class="card-header">📋 Datos personales</div>

<div class="row-flex">
    <div class="grupo">
        <label>👤 Nombre *</label>
        <input type="text" id="nombreFisica" placeholder="Nombre" autocomplete="off">
    </div>
    <div class="grupo">
        <label>Primer Apellido</label>
        <input type="text" id="primerApellido" placeholder="Primer apellido" autocomplete="off">
    </div>
    <div class="grupo">
        <label>Segundo Apellido</label>
        <input type="text" id="segundoApellido" placeholder="Segundo apellido" autocomplete="off">
    </div>
</div>

<div class="row-flex">
    <div class="grupo">
        <label>📧 Email *</label>
        <input type="email" id="emailFisica" placeholder="email@ejemplo.com" autocomplete="off">
    </div>
    <div class="grupo">
        <label>📋 NIF</label>
        <input type="text" id="nifFisica" placeholder="12345678A" autocomplete="off">
    </div>
    <div class="grupo">
        <label>📞 Teléfono</label>
        <input type="tel" id="telefonoFisica" placeholder="Teléfono" autocomplete="off">
    </div>
</div>

<div class="row-flex">
    <div class="grupo">
        <label>📱 WhatsApp</label>
        <input type="tel" id="whatsappContactoFisica" placeholder="Número de WhatsApp" autocomplete="off">
    </div>
    <div class="grupo" style="display: flex; align-items: center; justify-content: center;">
        <label style="display: flex; align-items: center; gap: 8px; margin-top: 24px;">
            <input type="checkbox" id="mismoWhatsappFisica"> Usar mismo que teléfono
        </label>
    </div>
</div>

<!-- OFICIO / PROFESIÓN -->
<div class="card-header">🔧 Oficio / Actividad profesional</div>

<div class="row-flex">
    <div class="grupo">
        <label>🔧 Oficio *</label>
        <select id="oficioSelect">
            <option value="">Selecciona tu oficio</option>
            <option value="electricidad">⚡ Electricidad</option>
            <option value="fontaneria">🔧 Fontanería</option>
            <option value="pintura">🎨 Pintura</option>
            <option value="albañileria">🏗️ Albañilería</option>
            <option value="jardineria">🌳 Jardinería</option>
            <option value="limpieza">🧹 Limpieza</option>
            <option value="cerrajeria">🔒 Cerrajería</option>
            <option value="piscinas">🏊 Piscinas</option>
            <option value="climatizacion">❄️ Climatización</option>
            <option value="reformas">🔨 Reformas</option>
            <option value="informatica">💻 Informática</option>
            <option value="transporte">🚚 Transporte</option>
            <option value="fotografia">📸 Fotografía</option>
            <option value="estetica">💇 Estética</option>
            <option value="consultoria">📊 Consultoría</option>
            <option value="otro">📋 Otro</option>
        </select>
    </div>
    <div class="grupo">
        <label>📅 Fecha inicio actividad</label>
        <input type="date" id="fechaInicioActividad">
    </div>
</div>

<div id="otroOficioDiv" style="display: none; margin-bottom: 16px;">
    <label>📝 Especificar otro oficio</label>
    <input type="text" id="otroOficioTexto" placeholder="¿Cuál es tu oficio?" style="width: 100%;">
</div>

<!-- DOMICILIO -->
<div class="card-header">📍 Datos de domicilio</div>

<div class="row-flex">
    <div class="grupo"><label>Calle</label><input type="text" id="direccionCalle" placeholder="Calle" autocomplete="off"></div>
    <div class="grupo"><label>Número</label><input type="text" id="direccionNumero" placeholder="Número" autocomplete="off"></div>
    <div class="grupo"><label>Piso/Puerta</label><input type="text" id="direccionPiso" placeholder="Piso/Puerta" autocomplete="off"></div>
</div>

<div class="row-flex">
    <div class="grupo"><label>Código postal</label><input type="text" id="codigoPostal" placeholder="Código postal" autocomplete="off"></div>
    <div class="grupo"><label>Municipio</label><input type="text" id="municipio" placeholder="Municipio" autocomplete="off"></div>
    <div class="grupo"><label>Provincia</label><input type="text" id="provincia" placeholder="Provincia" autocomplete="off"></div>
</div>

<!-- DATOS BANCARIOS (opcionales) -->
<div class="card-header">🏦 Datos bancarios (opcional)</div>

<div class="row-flex">
    <div class="grupo"><label>IBAN</label><input type="text" id="ibanCuenta" placeholder="ES00 0000 0000 0000 0000 0000" autocomplete="off"></div>
    <div class="grupo"><label>Banco</label><input type="text" id="bancoNombre" placeholder="Nombre del banco" autocomplete="off"></div>
    <div class="grupo"><label>SWIFT/BIC</label><input type="text" id="swiftCodigo" placeholder="Código SWIFT" autocomplete="off"></div>
</div>

<!-- PLAN Y ACTIVIDAD -->
<div class="card-header">🏷️ Plan de suscripción</div>

<div class="row-flex">
    <div class="grupo">
        <label>🏷️ Plan *</label>
        <select id="planSeleccionado">
            <option value="BASICO">📒 Básico (49€/mes) - Hasta 50 facturas</option>
            <option value="PRO">📘 Pro (99€/mes) - Facturas ilimitadas + soporte</option>
            <option value="EMPRESA">📕 Empresa (199€/mes) - Todo incluido + API</option>
        </select>
    </div>
    <div class="grupo">
        <label>📋 CNAE</label>
        <input type="text" id="cnaeCodigo" placeholder="Código CNAE (opcional)" autocomplete="off">
    </div>
</div>

<!-- BOTONES - ALTA -->
<div class="btn-group">
    <button id="btnGuardarAutonomo" class="btn-success">💾 Guardar autónomo</button>
    <button id="btnCancelarAlta" class="btn-danger">✖ Cancelar</button>
</div>

<!-- SCRIPT PARA FUNCIONALIDADES DINÁMICAS -->
<script>
    (function() {
        const oficioSelect = document.getElementById('oficioSelect')
        const otroDiv = document.getElementById('otroOficioDiv')
        
        if (oficioSelect && otroDiv) {
            oficioSelect.addEventListener('change', function() {
                otroDiv.style.display = this.value === 'otro' ? 'block' : 'none'
            })
        }
        
        const mismoWhatsapp = document.getElementById('mismoWhatsappFisica')
        const telefonoInput = document.getElementById('telefonoFisica')
        const whatsappInput = document.getElementById('whatsappContactoFisica')
        
        if (mismoWhatsapp && telefonoInput && whatsappInput) {
            mismoWhatsapp.addEventListener('change', function() {
                if (this.checked) {
                    whatsappInput.value = telefonoInput.value
                    whatsappInput.disabled = true
                } else {
                    whatsappInput.disabled = false
                }
            })
            
            telefonoInput.addEventListener('input', function() {
                if (mismoWhatsapp.checked) {
                    whatsappInput.value = this.value
                }
            })
        }
    })()
</script>
