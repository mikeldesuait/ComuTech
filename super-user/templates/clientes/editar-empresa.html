<!-- templates/clientes/editar-empresa.html -->
<!-- 🏢 MANIQUÍ - FORMULARIO DE EDICIÓN DE EMPRESA -->

<input type="hidden" id="editClienteId">
<input type="hidden" id="editPerfilId">

<!-- ALERTA INFORMATIVA -->
<div class="alert-info">
    <strong>🏢 Editando EMPRESA</strong>
    <p>Modifica los datos de la empresa</p>
</div>

<!-- DATOS DE LA EMPRESA -->
<div class="card-header">🏢 Datos de la empresa</div>

<div class="row-flex">
    <div class="grupo">
        <label>🏢 Razón Social</label>
        <input type="text" id="editRazonSocial" placeholder="Razón Social">
    </div>
    <div class="grupo">
        <label>📧 Email</label>
        <input type="email" id="editEmail" placeholder="Email">
    </div>
</div>

<div class="row-flex">
    <div class="grupo">
        <label>📋 NIF/CIF</label>
        <input type="text" id="editNif" placeholder="NIF/CIF">
    </div>
    <div class="grupo">
        <label>📞 Teléfono</label>
        <input type="tel" id="editTelefono" placeholder="Teléfono">
    </div>
</div>

<div class="row-flex">
    <div class="grupo">
        <label>📱 WhatsApp</label>
        <input type="tel" id="editWhatsapp" placeholder="Número de WhatsApp">
    </div>
    <div class="grupo">
        <label>👤 Nombre contacto</label>
        <input type="text" id="editNombreContacto" placeholder="Persona de contacto">
    </div>
</div>

<div class="row-flex">
    <div class="grupo">
        <label>📋 Forma Social</label>
        <select id="editFormaSocial">
            <option value="">Selecciona</option>
            <option value="A">Sociedad Anónima (S.A.)</option>
            <option value="B">Sociedad Limitada (S.L.)</option>
            <option value="C">Sociedad Colectiva</option>
            <option value="D">Sociedad Comanditaria</option>
            <option value="J">Sociedad Civil</option>
        </select>
    </div>
    <div class="grupo">
        <label>📅 Fecha constitución</label>
        <input type="date" id="editFechaConstitucion">
    </div>
</div>

<div class="row-flex">
    <div class="grupo">
        <label>📋 Registro Mercantil</label>
        <input type="text" id="editRegistroMercantil" placeholder="Registro Mercantil">
    </div>
    <div class="grupo">
        <label>👤 Representante legal</label>
        <input type="text" id="editRepresentante" placeholder="Nombre del representante">
    </div>
</div>

<!-- DOMICILIO -->
<div class="card-header">📍 Datos de domicilio</div>

<div class="row-flex">
    <div class="grupo"><label>Calle</label><input type="text" id="editCalle" placeholder="Calle"></div>
    <div class="grupo"><label>Número</label><input type="text" id="editNumero" placeholder="Número"></div>
    <div class="grupo"><label>Piso</label><input type="text" id="editPiso" placeholder="Piso/Puerta"></div>
</div>

<div class="row-flex">
    <div class="grupo"><label>CP</label><input type="text" id="editCp" placeholder="Código postal"></div>
    <div class="grupo"><label>Ciudad</label><input type="text" id="editCiudad" placeholder="Ciudad/Municipio"></div>
    <div class="grupo"><label>Provincia</label><input type="text" id="editProvincia" placeholder="Provincia"></div>
</div>

<!-- DATOS BANCARIOS -->
<div class="card-header">🏦 Datos bancarios</div>

<div class="row-flex">
    <div class="grupo"><label>IBAN</label><input type="text" id="editIban" placeholder="IBAN"></div>
    <div class="grupo"><label>Banco</label><input type="text" id="editBanco" placeholder="Nombre del banco"></div>
    <div class="grupo"><label>SWIFT</label><input type="text" id="editSwift" placeholder="Código SWIFT"></div>
</div>

<!-- DATOS DE ACTIVIDAD -->
<div class="card-header">📊 Datos de actividad</div>

<div class="row-flex">
    <div class="grupo">
        <label>🏷️ Plan</label>
        <select id="editPlan">
            <option value="BASICO">📒 Básico (49€/mes)</option>
            <option value="PRO">📘 Pro (99€/mes)</option>
            <option value="EMPRESA">📕 Empresa (199€/mes)</option>
        </select>
    </div>
    <div class="grupo">
        <label>📋 CNAE</label>
        <input type="text" id="editCnae" placeholder="Código CNAE">
    </div>
</div>

<div class="row-flex">
    <div class="grupo">
        <label>📅 Fecha inicio actividad</label>
        <input type="date" id="editFechaInicioActividad">
    </div>
</div>

<!-- SEGURIDAD -->
<div class="card-header">🔐 Seguridad</div>

<div class="row-flex">
    <div class="grupo">
        <button id="btnResetPassword" class="btn-warning" style="width: 100%;">🔄 Resetear contraseña del gerente</button>
    </div>
</div>

<!-- BOTONES -->
<div class="btn-group">
    <button id="btnGuardarEdicion" class="btn-success">💾 Guardar cambios</button>
    <button id="btnCancelarEdicion" class="btn-danger">✖ Cancelar</button>
</div>
